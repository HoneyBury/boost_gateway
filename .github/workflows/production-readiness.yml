name: Production Readiness

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner JSON string or array, for example "ubuntu-latest" or ["self-hosted","Linux","X64"]'
        required: true
        default: '"ubuntu-latest"'
      production_candidate_run_id:
        description: "Production candidate run ID whose artifact contains the R0 summaries"
        required: true
      long_soak_run_id:
        description: "Long soak run ID whose artifact contains the real 2h soak summary"
        required: true
      capacity_run_id:
        description: "Capacity run ID whose artifact contains current R4 capacity summaries"
        required: true
      preprod_evidence_run_id:
        description: "R5/R6 pre-production evidence run ID"
        required: true
      require_fixed_runner:
        description: "Require all fixed-runner and pre-production manifest entries"
        required: true
        default: true
        type: boolean

permissions:
  actions: read
  contents: read

jobs:
  production-readiness:
    runs-on: ${{ fromJSON(inputs.runner || '"ubuntu-latest"') }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Import production evidence artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PRODUCTION_CANDIDATE_RUN_ID: ${{ inputs.production_candidate_run_id }}
          LONG_SOAK_RUN_ID: ${{ inputs.long_soak_run_id }}
          CAPACITY_RUN_ID: ${{ inputs.capacity_run_id }}
          PREPROD_EVIDENCE_RUN_ID: ${{ inputs.preprod_evidence_run_id }}
        run: |
          set -euo pipefail
          mkdir -p runtime/validation runtime/readiness-import/production-candidate runtime/readiness-import/long-soak runtime/readiness-import/capacity runtime/readiness-import/preprod
          gh run download "$PRODUCTION_CANDIDATE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "production-candidate-evidence-$PRODUCTION_CANDIDATE_RUN_ID" \
            --dir runtime/readiness-import/production-candidate
          gh run download "$LONG_SOAK_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "long-soak-capacity-$LONG_SOAK_RUN_ID" \
            --dir runtime/readiness-import/long-soak
          gh run download "$CAPACITY_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "long-soak-capacity-$CAPACITY_RUN_ID" \
            --dir runtime/readiness-import/capacity
          gh run download "$PREPROD_EVIDENCE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "preprod-evidence-$PREPROD_EVIDENCE_RUN_ID" \
            --dir runtime/readiness-import/preprod
          find runtime/readiness-import -type f \( -name '*.json' -o -name '*.md' \) -print0 |
            while IFS= read -r -d '' path; do
              case "$path" in
                *.json) cp "$path" runtime/validation/"$(basename "$path")" ;;
              esac
            done
          find runtime/readiness-import/long-soak -name long-soak-capacity-summary.json -type f -print -quit |
            xargs -r -I{} cp {} runtime/validation/long-soak-capacity-summary.json
          test -f runtime/validation/r0-production-candidate-evidence-summary.json
          test -f runtime/validation/long-soak-capacity-summary.json
          test -f runtime/validation/fixed-runner-release-capacity-summary.json
          test -f runtime/validation/preprod-recovery-drill-summary.json
          test -f runtime/validation/tls-preprod-multi-run-summary.json

      - name: R2 bounded manifest
        id: r2-bounded
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          python scripts/check_production_evidence_manifest.py \
            --summary-path runtime/validation/r2-production-evidence-manifest-summary.json

      - name: R2 fixed-runner manifest
        id: r2-fixed
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          args=(
            scripts/check_production_evidence_manifest.py
            --summary-path runtime/validation/r2-production-evidence-manifest-fixed-runner-summary.json
          )
          if [ "${{ inputs.require_fixed_runner }}" = "true" ]; then
            args+=(--require-fixed-runner)
          fi
          python "${args[@]}"

      - name: R3 production readiness report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          args=(
            scripts/render_production_readiness_report.py
            --manifest-summary runtime/validation/r2-production-evidence-manifest-summary.json
            --fixed-runner-summary runtime/validation/r2-production-evidence-manifest-fixed-runner-summary.json
            --r0-summary runtime/validation/r0-production-candidate-evidence-summary.json
            --output runtime/validation/r3-production-readiness-report.md
            --summary-path runtime/validation/r3-production-readiness-report-summary.json
          )
          if [ "${{ inputs.require_fixed_runner }}" = "true" ]; then
            args+=(--require-fixed-runner)
          fi
          python "${args[@]}"

      - name: Evaluate readiness decision
        if: always()
        shell: bash
        env:
          REQUIRE_FIXED_RUNNER: ${{ inputs.require_fixed_runner }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("runtime/validation/r3-production-readiness-report-summary.json")
          summary = json.loads(path.read_text(encoding="utf-8"))
          require_fixed_runner = os.environ.get("REQUIRE_FIXED_RUNNER", "").lower() == "true"
          decision = (
              summary.get("final_production_ready")
              if require_fixed_runner
              else summary.get("overall_pass")
          )
          print(json.dumps({
              "overall_pass": summary.get("overall_pass"),
              "final_production_ready": summary.get("final_production_ready"),
              "decision": decision,
              "failed_step": summary.get("failed_step", ""),
          }, sort_keys=True))
          raise SystemExit(0 if decision is True else 1)
          PY

      - name: Upload production readiness evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-readiness-${{ github.run_id }}
          path: |
            runtime/validation/r0-*-summary.json
            runtime/validation/long-soak-*-summary.json
            runtime/validation/*capacity*summary.json
            runtime/validation/r2-production-evidence-manifest-summary.json
            runtime/validation/r2-production-evidence-manifest-fixed-runner-summary.json
            runtime/validation/r3-production-readiness-report.md
            runtime/validation/r3-production-readiness-report-summary.json
          retention-days: 90
          if-no-files-found: warn
