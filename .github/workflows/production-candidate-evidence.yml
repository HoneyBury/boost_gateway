name: Production / Candidate Evidence

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BOOST_GATEWAY_CANDIDATE_REVISION: ${{ github.sha }}

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Native production platform"
        required: true
        default: linux-x64
        type: choice
        options:
          - linux-x64
          - linux-arm64
          - macos-arm64
      runner:
        description: 'Runner JSON string or array, for example "ubuntu-latest" or ["self-hosted","Linux","X64"]'
        required: false
        default: ""
      configuration:
        description: "Build configuration"
        required: true
        default: "Release"
      include_redis_live:
        description: "Run Redis live evidence"
        required: true
        default: false
        type: boolean
      include_kind:
        description: "Run Operator kind evidence"
        required: true
        default: false
        type: boolean
      include_runtime_http:
        description: "Run runtime HTTP observability evidence"
        required: true
        default: false
        type: boolean
      include_release_baseline:
        description: "Collect release baseline evidence"
        required: true
        default: false
        type: boolean
      include_capacity_baseline:
        description: "Collect capacity baseline evidence"
        required: true
        default: false
        type: boolean
      step_timeout_seconds:
        description: "Timeout for each R0 child gate"
        required: true
        default: "5400"
      conan_build_type:
        description: "Conan validation build type"
        required: true
        default: "Release"
        type: choice
        options:
          - Release

permissions:
  contents: read

jobs:
  production-candidate-evidence:
    runs-on: ${{ fromJSON(inputs.runner || (inputs.platform == 'linux-x64' && '["self-hosted","Linux","X64","node-aoi-omen-gaming-laptop-16-am0xxx"]' || inputs.platform == 'linux-arm64' && '["self-hosted","Linux","ARM64","node-honeybury-m4-linux-arm64"]' || '["self-hosted","macOS","ARM64","macos-arm64-candidate"]')) }}
    timeout-minutes: 720
    concurrency:
      group: production-candidate-evidence-${{ inputs.platform }}-${{ inputs.runner || 'fixed-runner' }}
      cancel-in-progress: false
    steps:
      - name: Normalize stale Go cache permissions
        if: inputs.platform != 'macos-arm64'
        shell: bash
        run: |
          set -euo pipefail
          cache="$GITHUB_WORKSPACE/runtime/go-cache"
          if [ -d "$cache" ]; then
            docker run --rm --pull=never --network=none \
              -v "$cache:/cache" ubuntu:24.04 chmod -R a+rwX /cache
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve native production platform
        uses: ./.github/actions/resolve-production-platform
        with:
          platform: ${{ inputs.platform }}
          build-type: ${{ inputs.configuration }}

      - name: Reject Linux-only R0 capabilities on macOS
        if: inputs.platform == 'macos-arm64'
        shell: bash
        run: test "${{ inputs.include_kind }}" != true

      - name: Setup Ninja
        if: runner.os != 'Linux' || runner.arch != 'ARM64'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        if: runner.os != 'Linux' || runner.arch != 'ARM64'
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/boostgateway-operator/go.mod
          cache-dependency-path: operator/boostgateway-operator/go.sum

      - name: Setup Python
        if: runner.os == 'Linux' && runner.arch != 'ARM64'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bootstrap pinned kind and kubectl
        if: inputs.include_kind
        shell: bash
        run: |
          python3 scripts/tools/bootstrap_kind_tools.py \
            --install-dir "/opt/boost-gateway/tools/kubernetes-v0.32.0-v1.36.1" \
            --github-path "$GITHUB_PATH"

      - name: Verify pinned offline Conan virtual environment
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/tools/ensure_conan_venv.py \
            --venv "$BOOST_GATEWAY_CONAN_VENV" \
            --conan-version 2.8.1 \
            --offline \
            --github-env "$GITHUB_ENV" \
            --github-path "$GITHUB_PATH"

      - name: Resolve persistent runner caches
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/tools/resolve_runner_cache.py \
            --build-type Release \
            --profile "$PRODUCTION_CONAN_PROFILE" \
            --lockfile "$PRODUCTION_RELEASE_LOCKFILE" \
            --cache-root "$PRODUCTION_CACHE_ROOT" \
            --github-env "$GITHUB_ENV" \
            --summary-path runtime/validation/runner-cache-identity.json

      - name: Fixed runner preflight
        shell: bash
        run: |
          set -euo pipefail
          args=(
            scripts/gates/infrastructure/check_fixed_runner_environment.py
            --profile production-evidence
            --build-dir "$PRODUCTION_BUILD_DIR"
            --summary-path runtime/validation/r0-fixed-runner-preflight-summary.json
          )
          if [ "${{ inputs.include_redis_live }}" = "true" ]; then args+=(--require-redis); fi
          if [ "${{ inputs.include_kind }}" = "true" ]; then args+=(--require-kind); fi
          python3 "${args[@]}"

      - name: Conan lockfile install preflight
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/bootstrap_conan.py --conan-home "$CONAN_HOME" --no-remote
          test "${{ inputs.conan_build_type || 'Release' }}" = Release
          args=(conan install . --output-folder=build/conan-production-candidate --build=never --no-remote -s build_type=Release --profile:host "$PRODUCTION_CONAN_PROFILE" --profile:build "$PRODUCTION_CONAN_PROFILE" --lockfile "$PRODUCTION_RELEASE_LOCKFILE" -o "&:with_grpc=False" -o "&:with_raft_protobuf=True" -o "&:with_sqlite=False")
          "${args[@]}"

      - name: Configure Conan validation build
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build/conan-production-candidate-cmake -G Ninja \
            -DBOOST_DEPENDENCY_PROVIDER=conan \
            -DENABLE_TESTING=OFF \
            -DCMAKE_BUILD_TYPE=${{ inputs.conan_build_type || 'Release' }} \
            -DCMAKE_TOOLCHAIN_FILE=build/conan-production-candidate/build/${{ inputs.conan_build_type || 'Release' }}/generators/conan_toolchain.cmake

      - name: Build Conan validation target
        run: cmake --build build/conan-production-candidate-cmake --parallel --target project_v2

      # The R0 main build may use a different build type from the Release
      # Conan validation preflight, so resolve a distinct native package home.
      - name: Resolve main-build persistent runner cache
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/tools/resolve_runner_cache.py \
            --build-type "$PRODUCTION_BUILD_TYPE" \
            --profile "$PRODUCTION_CONAN_PROFILE" \
            --lockfile "$PRODUCTION_CONAN_LOCKFILE" \
            --cache-root "$PRODUCTION_CACHE_ROOT" \
            --github-env "$GITHUB_ENV" \
            --summary-path runtime/validation/runner-cache-main-identity.json

      - name: Conan install for main build
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/bootstrap_conan.py --conan-home "$CONAN_HOME" --no-remote
          conan install . \
            --output-folder=build/conan-production-candidate-main \
            --build=never \
            --no-remote \
            -s build_type="$PRODUCTION_BUILD_TYPE" \
            --profile:host "$PRODUCTION_CONAN_PROFILE" \
            --profile:build "$PRODUCTION_CONAN_PROFILE" \
            --lockfile "$PRODUCTION_CONAN_LOCKFILE" \
            -o "&:with_grpc=False" \
            -o "&:with_raft_protobuf=True" \
            -o "&:with_sqlite=False"

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p runtime/validation
          # Each Conan install emits this generated user preset. This job performs
          # two installs, so avoid importing stale duplicate Conan presets.
          rm -f CMakeUserPresets.json
          cmake --preset "$PRODUCTION_CONFIGURE_PRESET" \
            -DBOOST_DEPENDENCY_PROVIDER=conan \
            -DCMAKE_TOOLCHAIN_FILE="build/conan-production-candidate-main/build/${PRODUCTION_BUILD_TYPE}/generators/conan_toolchain.cmake" \
          2>&1 | tee runtime/validation/r0-configure.log
          grep -F "Using Conan-provided dependency graph" runtime/validation/r0-configure.log

      - name: Build validation targets
        shell: bash
        run: cmake --build "$PRODUCTION_BUILD_DIR" --config "$PRODUCTION_BUILD_TYPE" --parallel

      - name: R0 production candidate aggregate
        shell: bash
        run: |
          set -euo pipefail
          args=(
            scripts/verify_production_candidate_evidence.py
            --build-dir "$PRODUCTION_BUILD_DIR"
            --configuration "$PRODUCTION_BUILD_TYPE"
            --skip-build
            --step-timeout-seconds "${{ inputs.step_timeout_seconds || '5400' }}"
            --summary-path runtime/validation/r0-production-candidate-evidence-summary.json
          )
          if [ "${{ inputs.include_redis_live }}" = "true" ]; then args+=(--include-redis-live); fi
          if [ "${{ inputs.include_kind }}" = "true" ]; then args+=(--include-kind); fi
          if [ "${{ inputs.include_runtime_http }}" = "true" ]; then args+=(--include-runtime-http); fi
          if [ "${{ inputs.include_release_baseline }}" = "true" ]; then args+=(--include-release-baseline); fi
          if [ "${{ inputs.include_capacity_baseline }}" = "true" ]; then args+=(--include-capacity-baseline); fi
          python3 "${args[@]}"

      - name: Render candidate summary
        if: always()
        shell: bash
        run: |
          summaries=()
          for path in runtime/validation/r0-*-summary.json runtime/validation/n5-*-summary.json; do
            if [ -f "$path" ]; then summaries+=("$path"); fi
          done
          if [ "${#summaries[@]}" -gt 0 ]; then
            python3 scripts/tools/render_validation_summary.py "${summaries[@]}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload production candidate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-candidate-evidence-${{ inputs.platform }}-${{ github.run_id }}
          path: |
            runtime/validation/r0-*-summary.json
            runtime/validation/p5-*-summary.json
            runtime/validation/p6-*-summary.json
            runtime/validation/n5-*-summary.json
            runtime/validation/r0-fixed-runner-preflight-summary.json
            runtime/validation/r0-configure.log
            runtime/validation/production-platform-summary.json
            runtime/perf/**
          retention-days: 90
          if-no-files-found: warn
