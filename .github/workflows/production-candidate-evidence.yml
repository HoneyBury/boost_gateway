name: Production Candidate Evidence

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CONAN_HOME: ${{ github.workspace }}/../.conan2-local

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner JSON string or array, for example "ubuntu-latest" or ["self-hosted","Linux","X64"]'
        required: true
        default: '["self-hosted","Linux","X64"]'
      configure_preset:
        description: "CMake configure preset"
        required: true
        default: "default"
      build_dir:
        description: "CMake build directory"
        required: true
        default: "build/default"
      configuration:
        description: "Build configuration"
        required: true
        default: "Debug"
      include_redis_live:
        description: "Run Redis live evidence"
        required: true
        default: false
        type: boolean
      include_kind:
        description: "Run Operator kind evidence"
        required: true
        default: false
        type: boolean
      include_runtime_http:
        description: "Run runtime HTTP observability evidence"
        required: true
        default: false
        type: boolean
      include_release_baseline:
        description: "Collect release baseline evidence"
        required: true
        default: false
        type: boolean
      include_capacity_baseline:
        description: "Collect capacity baseline evidence"
        required: true
        default: false
        type: boolean
      step_timeout_seconds:
        description: "Timeout for each R0 child gate"
        required: true
        default: "5400"
      conan_profile:
        description: "Repository Conan profile"
        required: true
        default: "conan/profiles/linux-gcc-x64"
      conan_lockfile:
        description: "Repository Conan lockfile"
        required: true
        default: "conan/locks/linux-gcc-x64-release-nogrpc-nosqlite.lock"
      conan_build_type:
        description: "Conan validation build type"
        required: true
        default: "Release"
        type: choice
        options:
          - Release

permissions:
  contents: read

jobs:
  production-candidate-evidence:
    runs-on: ${{ fromJSON(inputs.runner || '["self-hosted","Linux","X64"]') }}
    timeout-minutes: 720
    concurrency:
      group: production-candidate-evidence-${{ inputs.runner || 'self-hosted-linux-x64' }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/boostgateway-operator/go.mod

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<2.9"
          conan --version

      - name: Fixed runner preflight
        shell: bash
        run: |
          set -euo pipefail
          args=(
            scripts/check_fixed_runner_environment.py
            --profile production-evidence
            --build-dir "${{ inputs.build_dir || 'build/default' }}"
            --summary-path runtime/validation/r0-fixed-runner-preflight-summary.json
          )
          if [ "${{ inputs.include_redis_live }}" = "true" ]; then args+=(--require-redis); fi
          if [ "${{ inputs.include_kind }}" = "true" ]; then args+=(--require-kind); fi
          python "${args[@]}"

      - name: Conan lockfile install preflight
        shell: bash
        run: |
          set -euo pipefail
          python scripts/bootstrap_conan.py
          args=(conan install . --output-folder=build/conan-production-candidate --build=missing -s build_type=${{ inputs.conan_build_type || 'Release' }} --profile:host "${{ inputs.conan_profile }}" --profile:build "${{ inputs.conan_profile }}" -o "&:with_grpc=False" -o "&:with_sqlite=False")
          if [ -n "${{ inputs.conan_lockfile }}" ]; then
            test -f "${{ inputs.conan_lockfile }}"
            args+=(--lockfile "${{ inputs.conan_lockfile }}")
          fi
          "${args[@]}"

      - name: Configure Conan validation build
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build/conan-production-candidate-cmake -G Ninja \
            -DBOOST_USE_CONAN_DEPS=ON \
            -DENABLE_TESTING=OFF \
            -DCMAKE_BUILD_TYPE=${{ inputs.conan_build_type || 'Release' }} \
            -DCMAKE_TOOLCHAIN_FILE=build/conan-production-candidate/build/${{ inputs.conan_build_type || 'Release' }}/generators/conan_toolchain.cmake

      - name: Build Conan validation target
        run: cmake --build build/conan-production-candidate-cmake --parallel --target project_v2

      - name: Conan install for main build
        shell: bash
        run: |
          set -euo pipefail
          build_type="${{ inputs.configuration || 'Debug' }}"
          lockfile=conan/locks/linux-gcc-x64-debug-nogrpc-nosqlite.lock
          if [ "$build_type" = "Release" ]; then lockfile=conan/locks/linux-gcc-x64-release-nogrpc-nosqlite.lock; fi
          conan install . \
            --output-folder=build/conan-production-candidate-main \
            --build=missing \
            -s build_type="$build_type" \
            --profile:host "${{ inputs.conan_profile }}" \
            --profile:build "${{ inputs.conan_profile }}" \
            --lockfile "$lockfile" \
            -o "&:with_grpc=False" \
            -o "&:with_sqlite=False"

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p runtime/validation
          build_type="${{ inputs.configuration || 'Debug' }}"
          cmake --preset "${{ inputs.configure_preset || 'default' }}" \
            -DBOOST_USE_CONAN_DEPS=ON \
            -DCMAKE_TOOLCHAIN_FILE="build/conan-production-candidate-main/build/${build_type}/generators/conan_toolchain.cmake" \
          2>&1 | tee runtime/validation/r0-configure.log
          grep -F "Using Conan-provided dependency graph" runtime/validation/r0-configure.log

      - name: Build validation targets
        shell: bash
        run: cmake --build "${{ inputs.build_dir || 'build/default' }}" --config "${{ inputs.configuration || 'Debug' }}" --parallel

      - name: R0 production candidate aggregate
        shell: bash
        run: |
          set -euo pipefail
          args=(
            scripts/verify_production_candidate_evidence.py
            --build-dir "${{ inputs.build_dir || 'build/default' }}"
            --configuration "${{ inputs.configuration || 'Debug' }}"
            --skip-build
            --step-timeout-seconds "${{ inputs.step_timeout_seconds || '5400' }}"
            --summary-path runtime/validation/r0-production-candidate-evidence-summary.json
          )
          if [ "${{ inputs.include_redis_live }}" = "true" ]; then args+=(--include-redis-live); fi
          if [ "${{ inputs.include_kind }}" = "true" ]; then args+=(--include-kind); fi
          if [ "${{ inputs.include_runtime_http }}" = "true" ]; then args+=(--include-runtime-http); fi
          if [ "${{ inputs.include_release_baseline }}" = "true" ]; then args+=(--include-release-baseline); fi
          if [ "${{ inputs.include_capacity_baseline }}" = "true" ]; then args+=(--include-capacity-baseline); fi
          python "${args[@]}"

      - name: Render candidate summary
        if: always()
        shell: bash
        run: |
          summaries=()
          for path in runtime/validation/r0-*-summary.json runtime/validation/n5-*-summary.json; do
            if [ -f "$path" ]; then summaries+=("$path"); fi
          done
          if [ "${#summaries[@]}" -gt 0 ]; then
            python scripts/render_validation_summary.py "${summaries[@]}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload production candidate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-candidate-evidence-${{ github.run_id }}
          path: |
            runtime/validation/r0-*-summary.json
            runtime/validation/n5-*-summary.json
            runtime/validation/r0-fixed-runner-preflight-summary.json
            runtime/validation/r0-configure.log
            runtime/perf/**
          retention-days: 90
          if-no-files-found: warn
