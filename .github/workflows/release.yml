name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SCCACHE_DIR: ${{ github.workspace }}/.sccache

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  runner-matrix:
    runs-on: ["self-hosted","Windows","X64"]
    outputs:
      release: ${{ steps.matrix.outputs.release }}
      release_publish_runs_on: ${{ steps.matrix.outputs.release_publish_runs_on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read runner matrix
        id: matrix
        shell: bash
        run: |
          echo "release=$(python scripts/tools/read_runner_matrix.py --path matrices.ci.release)" >> "$GITHUB_OUTPUT"
          echo "release_publish_runs_on=$(python scripts/tools/read_runner_matrix.py --path jobs.release_publish.runs_on)" >> "$GITHUB_OUTPUT"

  package:
    needs: runner-matrix
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.runner-matrix.outputs.release) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore sccache cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{ runner.os }}-release-${{ matrix.configure_preset }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'sdk/CMakeLists.txt', 'proto/CMakeLists.txt') }}
          restore-keys: |
            sccache-${{ runner.os }}-release-${{ matrix.configure_preset }}-
            sccache-${{ runner.os }}-

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/boostgateway-operator/go.mod

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install sccache
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Windows" ]; then
            choco install sccache -y --no-progress
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install sccache
          else
            sudo apt-get update
            sudo apt-get install -y sccache
          fi
          sccache --version

      - name: Configure
        run: cmake --preset ${{ matrix.configure_preset }} -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset ${{ matrix.build_preset }} --parallel

      - name: Test
        run: ctest --preset ${{ matrix.test_preset }} --timeout 300

      - name: R4 release contract gate
        run: python scripts/verify_r4_contract.py --build-dir build/${{ matrix.configure_preset }} --skip-build --skip-arch-baseline --configuration Release --baseline-profile release

      - name: Security release gate
        run: python scripts/check_security_release_gate.py

      - name: Monitoring operability gate
        run: python scripts/check_monitoring_operability.py --summary-path runtime/validation/release-monitoring-operability-summary.json

      - name: Observability release gate
        run: python scripts/verify_observability_gate.py --build-dir build/${{ matrix.configure_preset }} --configuration Release --skip-build

      - name: Control-plane operator gate
        run: python scripts/verify_control_plane_gate.py

      - name: Release candidate bounded gate
        run: python scripts/verify_release_candidate.py --build-dir build/${{ matrix.configure_preset }} --configuration Release --baseline-profile release --soak-profile smoke --skip-build --skip-release-baseline --timeout-seconds 120

      - name: Install
        shell: bash
        run: |
          set -euo pipefail
          install_dir="${GITHUB_WORKSPACE}/dist/boost-gateway-${GITHUB_REF_NAME}-${{ matrix.artifact_suffix }}"
          if [ -n "${{ matrix.install_config }}" ]; then
            cmake --install "build/${{ matrix.configure_preset }}" --config "${{ matrix.install_config }}" --prefix "$install_dir"
          else
            cmake --install "build/${{ matrix.configure_preset }}" --prefix "$install_dir"
          fi
          cp README.md "$install_dir/"
          cp CHANGELOG.md "$install_dir/"

      - name: Archive package
        shell: bash
        run: |
          set -euo pipefail
          archive_basename="boost-gateway-${GITHUB_REF_NAME}-${{ matrix.artifact_suffix }}"
          cmake -E tar ${{ matrix.archive_flags }} "${archive_basename}.${{ matrix.archive_ext }}" --format=${{ matrix.archive_format }} "dist/${archive_basename}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: boost-gateway-${{ matrix.artifact_suffix }}
          path: boost-gateway-${{ github.ref_name }}-${{ matrix.artifact_suffix }}.${{ matrix.archive_ext }}

      - name: Show sccache stats
        if: always()
        shell: bash
        run: sccache --show-stats || true

  publish:
    runs-on: ${{ fromJSON(needs.runner-matrix.outputs.release_publish_runs_on) }}
    needs: [runner-matrix, package]

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          find . -maxdepth 2 -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/SHA256SUMS.txt
