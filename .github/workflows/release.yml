name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            configure_preset: release
            build_preset: release
            test_preset: release
            install_config: ""
            archive_ext: tar.gz
            archive_format: gnutar
            archive_flags: cfvz
            artifact_suffix: linux-x86_64
          - os: macos-latest
            configure_preset: release
            build_preset: release
            test_preset: release
            install_config: ""
            archive_ext: tar.gz
            archive_format: gnutar
            archive_flags: cfvz
            artifact_suffix: macos
          - os: windows-latest
            configure_preset: windows-ninja-release
            build_preset: windows-ninja-release
            test_preset: windows-ninja-release
            install_config: ""
            archive_ext: zip
            archive_format: zip
            archive_flags: cfv
            artifact_suffix: windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset ${{ matrix.configure_preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.build_preset }} --parallel

      - name: Test
        run: ctest --preset ${{ matrix.test_preset }}

      - name: Install
        shell: bash
        run: |
          set -euo pipefail
          install_dir="${GITHUB_WORKSPACE}/dist/boost-gateway-${GITHUB_REF_NAME}-${{ matrix.artifact_suffix }}"
          if [ -n "${{ matrix.install_config }}" ]; then
            cmake --install "build/${{ matrix.configure_preset }}" --config "${{ matrix.install_config }}" --prefix "$install_dir"
          else
            cmake --install "build/${{ matrix.configure_preset }}" --prefix "$install_dir"
          fi
          cp README.md "$install_dir/"
          cp CHANGELOG.md "$install_dir/"

      - name: Archive package
        shell: bash
        run: |
          set -euo pipefail
          archive_basename="boost-gateway-${GITHUB_REF_NAME}-${{ matrix.artifact_suffix }}"
          cmake -E tar ${{ matrix.archive_flags }} "${archive_basename}.${{ matrix.archive_ext }}" --format=${{ matrix.archive_format }} "dist/${archive_basename}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: boost-gateway-${{ matrix.artifact_suffix }}
          path: boost-gateway-${{ github.ref_name }}-${{ matrix.artifact_suffix }}.${{ matrix.archive_ext }}

  publish:
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          find . -maxdepth 2 -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/SHA256SUMS.txt
