name: Release / Package & Publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BOOST_GATEWAY_CANDIDATE_REVISION: ${{ github.sha }}
  BOOST_GATEWAY_CONAN_LOCKFILE: ${{ inputs.conan_lockfile || 'conan/locks/linux-gcc-x64-release-nogrpc-nosqlite.lock' }}
  BOOST_GATEWAY_CONAN_VENV: /opt/boost-gateway/tools/conan-2.8.1-py3.12

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner JSON string or array, for example "ubuntu-latest" or ["self-hosted","Linux","X64"]'
        required: true
        default: '["self-hosted","Linux","X64"]'
      conan_lockfile:
        description: "Conan lockfile path for dependency preflight"
        type: string
        default: conan/locks/linux-gcc-x64-release-nogrpc-nosqlite.lock
      perf_preset:
        description: "Performance baseline preset (smoke/baseline/capacity)"
        type: string
        default: smoke
      perf_repetitions:
        description: "Performance test repetitions for baseline"
        type: number
        default: 3

permissions:
  contents: write

jobs:
  package:
    runs-on: ${{ fromJSON(inputs.runner || vars.RELEASE_RUNNER || '["self-hosted","Linux","X64"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail
          release_version="$(python - <<'PY'
          import pathlib
          import re

          text = pathlib.Path("CMakeLists.txt").read_text(encoding="utf-8")
          match = re.search(r"project\(boost_gateway\s+VERSION\s+(\d+\.\d+\.\d+)", text)
          if match is None:
              raise SystemExit("unable to resolve project version from CMakeLists.txt")
          print(match.group(1))
          PY
          )"
          release_label="v${release_version}"
          if [[ "$GITHUB_REF" == refs/tags/v* && "$GITHUB_REF_NAME" != "$release_label" ]]; then
            echo "tag $GITHUB_REF_NAME does not match project version $release_label" >&2
            exit 1
          fi
          printf 'RELEASE_VERSION=%s\nRELEASE_LABEL=%s\n' "$release_version" "$release_label" >> "$GITHUB_ENV"

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/boostgateway-operator/go.mod

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ensure Conan
        shell: bash
        run: |
          set -euo pipefail
          python scripts/tools/ensure_conan_venv.py \
            --venv "$BOOST_GATEWAY_CONAN_VENV" \
            --conan-version 2.8.1 \
            --offline \
            --github-env "$GITHUB_ENV" \
            --github-path "$GITHUB_PATH"
          "$BOOST_GATEWAY_CONAN_VENV/bin/conan" --version

      - name: Resolve persistent runner caches
        shell: bash
        run: |
          set -euo pipefail
          python scripts/tools/resolve_runner_cache.py \
            --build-type Release \
            --profile conan/profiles/linux-gcc-x64 \
            --lockfile "${{ inputs.conan_lockfile || 'conan/locks/linux-gcc-x64-release-nogrpc-nosqlite.lock' }}" \
            --github-env "$GITHUB_ENV" \
            --summary-path runtime/validation/runner-cache-identity.json

      - name: Install sccache
        shell: bash
        run: |
          set -euo pipefail
          sccache --version || sudo apt-get install -y sccache
          echo "SCCACHE_BIN=$(command -v sccache)" >> "$GITHUB_ENV"
          mkdir -p "$SCCACHE_DIR"
          sccache --version

      - name: Bootstrap Conan home
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$BOOST_GATEWAY_CONAN_VENV/bin:$PATH"
          python scripts/bootstrap_conan.py --conan-home "$CONAN_HOME" --no-remote

      - name: Conan lockfile preflight
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$BOOST_GATEWAY_CONAN_VENV/bin:$PATH"
          conan --version
          conan install . \
            --profile:host conan/profiles/linux-gcc-x64 \
            --profile:build conan/profiles/linux-gcc-x64 \
            --lockfile "${{ inputs.conan_lockfile || 'conan/locks/linux-gcc-x64-release-nogrpc-nosqlite.lock' }}" \
            -o "&:with_grpc=False" -o "&:with_sqlite=False" \
            --output-folder=build/conan-preflight \
            --build=never --no-remote -s build_type=Release

      - name: Reset sccache stats
        shell: bash
        run: sccache --zero-stats || true

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          : "${SCCACHE_BIN:?missing sccache path}"
          mkdir -p runtime/validation
          cmake --preset release \
            -DBOOST_DEPENDENCY_PROVIDER=conan \
            -DCMAKE_TOOLCHAIN_FILE=build/conan-preflight/build/Release/generators/conan_toolchain.cmake \
            -DCMAKE_C_COMPILER_LAUNCHER="$SCCACHE_BIN" \
            -DCMAKE_CXX_COMPILER_LAUNCHER="$SCCACHE_BIN" \
            2>&1 | tee runtime/validation/release-configure.log

      - name: Verify Conan dependency provider
        shell: bash
        run: |
          set -euo pipefail
          grep -F "Using Conan-provided dependency graph" runtime/validation/release-configure.log
          grep -F "BOOST_DEPENDENCY_PROVIDER:STRING=conan" build/release/CMakeCache.txt
          grep -F "CMAKE_TOOLCHAIN_FILE:FILEPATH=" build/release/CMakeCache.txt \
            | grep -F "build/conan-preflight/build/Release/generators/conan_toolchain.cmake"

      - name: Verify sccache wiring
        shell: bash
        run: |
          : "${SCCACHE_BIN:?missing sccache path}"
          grep -F -n "$SCCACHE_BIN" build/release/CMakeCache.txt build/release/build.ninja

      - name: Record build start time
        shell: bash
        run: echo "BUILD_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        run: |
          cmake --build --preset release --parallel
          mkdir -p runtime/perf/build-times
          sccache --show-stats --stats-format json > runtime/perf/build-times/sccache-stats.json

      - name: List tests
        shell: bash
        run: |
          mkdir -p runtime/validation
          ctest --preset release -N | tee runtime/validation/release-ctest-list.log

      - name: Test
        shell: bash
        run: |
          mkdir -p runtime/validation
          ctest --preset release --progress --output-on-failure --timeout 300 \
            | tee runtime/validation/release-ctest.log

      - name: R4 release contract gate
        run: python scripts/verify_r4_contract.py --build-dir build/release --skip-build --skip-arch-baseline --configuration Release --baseline-profile release

      - name: Security release gate
        run: python scripts/check_security_release_gate.py

      - name: Monitoring operability gate
        run: python scripts/check_monitoring_operability.py --summary-path runtime/validation/release-monitoring-operability-summary.json

      - name: Observability release gate
        run: python scripts/verify_observability_gate.py --build-dir build/release --configuration Release --skip-build

      - name: Control-plane operator gate
        run: python scripts/verify_control_plane_gate.py

      - name: Workflow Python CLI contract gate
        run: python scripts/check_workflow_python_cli_contracts.py

      - name: Workflow catalog gate
        run: python scripts/check_workflow_catalog.py

      - name: Evidence provenance contract gate
        run: python scripts/check_evidence_provenance_contract.py

      - name: R5 Docker image policy contract gate
        run: python scripts/check_r5_docker_image_policy_contract.py

      - name: Legacy/helper inventory gate
        run: python scripts/gates/governance/check_legacy_helper_inventory.py

      - name: Release candidate bounded gate
        run: python scripts/verify_release_candidate.py --build-dir build/release --configuration Release --baseline-profile release --soak-profile smoke --skip-build --skip-release-baseline --timeout-seconds 120

      - name: Collect release baseline
        run: |
          python scripts/collect_release_baseline.py \
            --build-dir build/release \
            --perf-preset ${{ inputs.perf_preset || 'smoke' }} \
            --perf-repetitions ${{ inputs.perf_repetitions || '3' }} \
            --skip-build \
            --perf-output-root runtime/perf/release-baseline \
            --summary-path runtime/validation/release-baseline-summary.json

      - name: Upload release baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-perf-baseline
          path: |
            runtime/perf/release-baseline/**
            runtime/validation/release-baseline-summary.json
            runtime/validation/release-ctest*.log
            runtime/perf/build-times/**
          if-no-files-found: warn

      - name: Install
        shell: bash
        run: |
          set -euo pipefail
          install_dir="${GITHUB_WORKSPACE}/dist/boost-gateway-${RELEASE_LABEL}-linux-x64"
          cmake --install "build/release" --prefix "$install_dir"
          cp README.md CHANGELOG.md LICENSE "$install_dir/"

      - name: Archive package
        shell: bash
        run: |
          set -euo pipefail
          archive_basename="boost-gateway-${RELEASE_LABEL}-linux-x64"
          (cd dist && cmake -E tar czfv "../${archive_basename}.tar.gz" --format=gnutar "${archive_basename}")

      - name: Verify release archive layout
        shell: bash
        run: |
          python scripts/tools/verify_release_archive.py \
            --archive "boost-gateway-${RELEASE_LABEL}-linux-x64.tar.gz" \
            --expected-root "boost-gateway-${RELEASE_LABEL}-linux-x64"

      - name: Render release notes
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: python scripts/tools/render_release_notes.py --version "$RELEASE_VERSION" --output RELEASE_NOTES.md

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: boost-gateway-linux-x64
          path: |
            boost-gateway-${{ env.RELEASE_LABEL }}-linux-x64.tar.gz
            RELEASE_NOTES.md

      - name: Show sccache stats
        if: always()
        shell: bash
        run: |
          if [ -f runtime/perf/build-times/sccache-stats.json ]; then
            cat runtime/perf/build-times/sccache-stats.json
          else
            sccache --show-stats || true
          fi

      - name: Capture build metrics
        if: always()
        shell: bash
        run: |
          mkdir -p runtime/perf/build-times
          now=$(date +%s)
          iso_now=$(date -Iseconds)
          duration=$(( now - BUILD_START_EPOCH ))
          cat > runtime/perf/build-times/build-time.json << EOF
          {
            "workflow": "release",
            "runner_os": "${{ runner.os }}",
            "timestamp": "${iso_now}",
            "build_duration_seconds": ${duration}
          }
          EOF

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ fromJSON(inputs.runner || vars.RELEASE_RUNNER || '["self-hosted","Linux","X64"]') }}
    needs: package

    steps:
      - name: Prepare isolated release asset directory
        shell: bash
        run: |
          release_asset_dir="$RUNNER_TEMP/boost-gateway-release-${{ github.run_id }}"
          mkdir -p "$release_asset_dir"
          printf 'RELEASE_ASSET_DIR=%s\n' "$release_asset_dir" >> "$GITHUB_ENV"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.RELEASE_ASSET_DIR }}

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' archives < <(find "$RELEASE_ASSET_DIR" -type f -name '*.tar.gz' -print0)
          test "${#archives[@]}" -eq 1
          archive="${archives[0]}"
          digest="$(sha256sum "$archive" | cut -d ' ' -f 1)"
          printf '%s  %s\n' "$digest" "$(basename "$archive")" > "$RELEASE_ASSET_DIR/SHA256SUMS.txt"
          mapfile -d '' notes < <(find "$RELEASE_ASSET_DIR" -type f -name RELEASE_NOTES.md -print0)
          test "${#notes[@]}" -eq 1
          cp "${notes[0]}" "$RELEASE_ASSET_DIR/RELEASE_NOTES.md"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ env.RELEASE_ASSET_DIR }}/RELEASE_NOTES.md
          files: |
            ${{ env.RELEASE_ASSET_DIR }}/**/*.tar.gz
            ${{ env.RELEASE_ASSET_DIR }}/SHA256SUMS.txt
