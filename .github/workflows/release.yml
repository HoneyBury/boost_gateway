name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SCCACHE_DIR: ${{ github.workspace }}/.sccache
  CONAN_HOME: ${{ github.workspace }}/.conan2-local

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner JSON string or array, for example "ubuntu-latest" or ["self-hosted","Linux","X64"]'
        required: true
        default: '["self-hosted","Linux","X64"]'
      enable_conan_validation:
        description: "Run Conan lockfile-based dependency preflight"
        type: boolean
        default: true
      conan_lockfile:
        description: "Conan lockfile path for dependency preflight"
        type: string
        default: conan/locks/linux-gcc-x64-release-nogrpc-nosqlite.lock
      perf_preset:
        description: "Performance baseline preset (smoke/baseline/capacity)"
        type: string
        default: smoke
      perf_repetitions:
        description: "Performance test repetitions for baseline"
        type: number
        default: 3

permissions:
  contents: write

jobs:
  package:
    runs-on: ${{ fromJSON(inputs.runner || vars.RELEASE_RUNNER || '["self-hosted","Linux","X64"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore sccache cache
        id: restore-sccache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{ runner.os }}-release-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'sdk/CMakeLists.txt', 'proto/CMakeLists.txt', 'conanfile.py', 'conan/profiles/**', 'conan/remotes*.json', 'conan/locks/*.lock') }}-${{ github.sha }}
          restore-keys: |
            sccache-${{ runner.os }}-release-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'sdk/CMakeLists.txt', 'proto/CMakeLists.txt', 'conanfile.py', 'conan/profiles/**', 'conan/remotes*.json', 'conan/locks/*.lock') }}-
            sccache-${{ runner.os }}-release-
            sccache-${{ runner.os }}-

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/boostgateway-operator/go.mod

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sccache
        shell: bash
        run: |
          set -euo pipefail
          sccache --version || sudo apt-get install -y sccache
          echo "SCCACHE_BIN=$(command -v sccache)" >> "$GITHUB_ENV"
          mkdir -p "$SCCACHE_DIR"
          sccache --version

      - name: Ensure Conan
        shell: bash
        run: |
          set -euo pipefail
          if command -v conan >/dev/null 2>&1; then
            conan --version
            exit 0
          fi
          python -m venv .venv-release
          . .venv-release/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "conan>=2.0,<2.9"
          echo "$PWD/.venv-release/bin" >> "$GITHUB_PATH"
          conan --version

      - name: Bootstrap Conan home
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$PWD/.venv-release/bin:$PATH"
          python scripts/bootstrap_conan.py --allow-public --disable-example-internal

      - name: Conan lockfile preflight
        if: ${{ inputs.enable_conan_validation != 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$PWD/.venv-release/bin:$PATH"
          conan --version
          conan install . \
            --profile:host conan/profiles/linux-gcc-x64 \
            --profile:build conan/profiles/linux-gcc-x64 \
            --lockfile "${{ inputs.conan_lockfile || 'conan/locks/linux-gcc-x64-release-nogrpc-nosqlite.lock' }}" \
            -o "&:with_grpc=False" -o "&:with_sqlite=False" \
            --output-folder=build/conan-preflight \
            --build=missing -s build_type=Release

      - name: Configure
        shell: bash
        run: |
          : "${SCCACHE_BIN:?missing sccache path}"
          cmake --preset release -DCMAKE_C_COMPILER_LAUNCHER="$SCCACHE_BIN" -DCMAKE_CXX_COMPILER_LAUNCHER="$SCCACHE_BIN"

      - name: Verify sccache wiring
        shell: bash
        run: |
          : "${SCCACHE_BIN:?missing sccache path}"
          grep -F -n "$SCCACHE_BIN" build/release/CMakeCache.txt build/release/build.ninja

      - name: Record build start time
        shell: bash
        run: echo "BUILD_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        run: |
          cmake --build --preset release --parallel
          mkdir -p runtime/perf/build-times
          sccache --show-stats --stats-format json > runtime/perf/build-times/sccache-stats.json

      - name: Test
        run: ctest --preset release --timeout 300

      - name: R4 release contract gate
        run: python scripts/verify_r4_contract.py --build-dir build/release --skip-build --skip-arch-baseline --configuration Release --baseline-profile release

      - name: Security release gate
        run: python scripts/check_security_release_gate.py

      - name: Monitoring operability gate
        run: python scripts/check_monitoring_operability.py --summary-path runtime/validation/release-monitoring-operability-summary.json

      - name: Observability release gate
        run: python scripts/verify_observability_gate.py --build-dir build/release --configuration Release --skip-build

      - name: Control-plane operator gate
        run: python scripts/verify_control_plane_gate.py

      - name: Release candidate bounded gate
        run: python scripts/verify_release_candidate.py --build-dir build/release --configuration Release --baseline-profile release --soak-profile smoke --skip-build --skip-release-baseline --timeout-seconds 120

      - name: Collect release baseline
        run: |
          python scripts/collect_release_baseline.py \
            --build-dir build/release \
            --perf-preset ${{ inputs.perf_preset || 'smoke' }} \
            --skip-build \
            --perf-output-root runtime/perf/release-baseline \
            --summary-path runtime/validation/release-baseline-summary.json

      - name: Upload release baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-perf-baseline
          path: |
            runtime/perf/release-baseline/**
            runtime/validation/release-baseline-summary.json
            runtime/perf/build-times/**
          if-no-files-found: warn

      - name: Install
        shell: bash
        run: |
          set -euo pipefail
          install_dir="${GITHUB_WORKSPACE}/dist/boost-gateway-${GITHUB_REF_NAME}-linux-x64"
          cmake --install "build/release" --prefix "$install_dir"
          cp README.md "$install_dir/"
          cp CHANGELOG.md "$install_dir/"

      - name: Archive package
        shell: bash
        run: |
          set -euo pipefail
          archive_basename="boost-gateway-${GITHUB_REF_NAME}-linux-x64"
          cmake -E tar cfv "${archive_basename}.tar.gz" --format=gnutar "dist/${archive_basename}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: boost-gateway-linux-x64
          path: boost-gateway-${{ github.ref_name }}-linux-x64.tar.gz

      - name: Show sccache stats
        if: always()
        shell: bash
        run: |
          if [ -f runtime/perf/build-times/sccache-stats.json ]; then
            cat runtime/perf/build-times/sccache-stats.json
          else
            sccache --show-stats || true
          fi

      - name: Capture build metrics
        if: always()
        shell: bash
        run: |
          mkdir -p runtime/perf/build-times
          now=$(date +%s)
          iso_now=$(date -Iseconds)
          duration=$(( now - BUILD_START_EPOCH ))
          cat > runtime/perf/build-times/build-time.json << EOF
          {
            "workflow": "release",
            "runner_os": "${{ runner.os }}",
            "timestamp": "${iso_now}",
            "build_duration_seconds": ${duration}
          }
          EOF

      - name: Save sccache cache
        if: always() && steps.restore-sccache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{ runner.os }}-release-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'sdk/CMakeLists.txt', 'proto/CMakeLists.txt', 'conanfile.py', 'conan/profiles/**', 'conan/remotes*.json', 'conan/locks/*.lock') }}-${{ github.sha }}

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ fromJSON(inputs.runner || vars.RELEASE_RUNNER || '["self-hosted","Linux","X64"]') }}
    needs: package

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          find . -maxdepth 2 -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/SHA256SUMS.txt
