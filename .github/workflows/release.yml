name: Release / Package & Publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BOOST_GATEWAY_CANDIDATE_REVISION: ${{ github.sha }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Native production platform"
        required: true
        default: linux-x64
        type: choice
        options:
          - linux-x64
          - linux-arm64
          - macos-arm64
      runner:
        description: 'Runner JSON string or array, for example "ubuntu-latest" or ["self-hosted","Linux","X64"]'
        required: false
        default: ""
      perf_preset:
        description: "Performance baseline preset (smoke/baseline/capacity)"
        type: string
        default: smoke
      perf_repetitions:
        description: "Performance test repetitions for baseline"
        type: number
        default: 3
      prepare_cmake_consumer_image:
        description: "Maintenance only: rebuild the pinned clean compiler image before offline verification"
        required: true
        type: boolean
        default: false
      prepare_legacy_raft_linux_x64_binary:
        description: "Maintenance only: restore the verified v3.5.3 Linux x64 legacy Raft binary"
        required: true
        type: boolean
        default: false
      legacy_raft_binary:
        description: "Pre-provisioned v3.5.3 leaderboard backend used by the real mixed-binary gate"
        type: string
        default: ""
      legacy_raft_revision:
        description: "Full source revision for the pre-provisioned legacy Raft binary"
        type: string
        default: b9c348b4b58fdeeffa9d82ff87a67ed781a96b78
      legacy_raft_sha256:
        description: "Platform-specific SHA-256 for the pre-provisioned legacy Raft binary"
        type: string
        default: ""

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('["{0}"]', inputs.platform) || '["linux-x64","linux-arm64","macos-arm64"]') }}
    runs-on: ${{ fromJSON(inputs.runner || (matrix.platform == 'linux-x64' && '["self-hosted","Linux","X64","node-aoi-omen-gaming-laptop-16-am0xxx"]' || matrix.platform == 'linux-arm64' && '["self-hosted","Linux","ARM64","node-honeybury-m4-linux-arm64"]' || '["self-hosted","macOS","ARM64","macos-arm64-candidate"]')) }}

    steps:
      - name: Normalize stale Go cache permissions
        if: matrix.platform != 'macos-arm64'
        shell: bash
        run: |
          set -euo pipefail
          cache="$GITHUB_WORKSPACE/runtime/go-cache"
          if [ -d "$cache" ]; then
            docker run --rm --pull=never --network=none \
              -v "$cache:/cache" ubuntu:24.04 chmod -R a+rwX /cache
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve native production platform
        uses: ./.github/actions/resolve-production-platform
        with:
          platform: ${{ matrix.platform }}
          build-type: Release

      - name: Resolve release version
        shell: bash
        run: |
          python3 scripts/tools/resolve_release_version.py \
            --github-ref "$GITHUB_REF" \
            --github-ref-name "$GITHUB_REF_NAME" \
            --github-env "$GITHUB_ENV"

      - name: Setup Ninja
        if: runner.os != 'Linux' || runner.arch != 'ARM64'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        if: runner.os != 'Linux' || runner.arch != 'ARM64'
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/boostgateway-operator/go.mod
          cache-dependency-path: operator/boostgateway-operator/go.sum

      - name: Setup Python
        if: runner.os == 'Linux' && runner.arch != 'ARM64'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ensure Conan
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/tools/ensure_conan_venv.py \
            --venv "$BOOST_GATEWAY_CONAN_VENV" \
            --conan-version 2.8.1 \
            --offline \
            --github-env "$GITHUB_ENV" \
            --github-path "$GITHUB_PATH"
          "$BOOST_GATEWAY_CONAN_VENV/bin/conan" --version

      - name: Resolve persistent runner caches
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/tools/resolve_runner_cache.py \
            --build-type Release \
            --profile "$PRODUCTION_CONAN_PROFILE" \
            --lockfile "$PRODUCTION_RELEASE_LOCKFILE" \
            --cache-root "$PRODUCTION_CACHE_ROOT" \
            --github-env "$GITHUB_ENV" \
            --summary-path runtime/validation/runner-cache-identity.json

      - name: Install sccache
        shell: bash
        run: |
          set -euo pipefail
          command -v sccache
          echo "SCCACHE_BIN=$(command -v sccache)" >> "$GITHUB_ENV"
          mkdir -p "$SCCACHE_DIR"
          sccache --version

      - name: Bootstrap Conan home
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$BOOST_GATEWAY_CONAN_VENV/bin:$PATH"
          python3 scripts/bootstrap_conan.py --conan-home "$CONAN_HOME" --no-remote

      - name: Conan lockfile preflight
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$BOOST_GATEWAY_CONAN_VENV/bin:$PATH"
          conan --version
          python3 scripts/tools/verify_conan_offline_install.py \
            --profile "$PRODUCTION_CONAN_PROFILE" \
            --lockfile "$BOOST_GATEWAY_CONAN_LOCKFILE" \
            --output-folder build/conan-preflight \
            --build-type Release \
            --candidate-revision "$GITHUB_SHA" \
            --summary-path runtime/validation/raft-conan-offline-summary.json

      - name: Reset sccache stats
        shell: bash
        run: sccache --zero-stats || true

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          : "${SCCACHE_BIN:?missing sccache path}"
          mkdir -p runtime/validation
          cmake --preset "$PRODUCTION_CONFIGURE_PRESET" \
            -DBOOST_DEPENDENCY_PROVIDER=conan \
            -DCMAKE_TOOLCHAIN_FILE=build/conan-preflight/build/Release/generators/conan_toolchain.cmake \
            -DCMAKE_C_COMPILER_LAUNCHER="$SCCACHE_BIN" \
            -DCMAKE_CXX_COMPILER_LAUNCHER="$SCCACHE_BIN" \
            2>&1 | tee runtime/validation/release-configure.log

      - name: Verify Conan dependency provider
        shell: bash
        run: |
          set -euo pipefail
          grep -F "Using Conan-provided dependency graph" runtime/validation/release-configure.log
          grep -F "BOOST_DEPENDENCY_PROVIDER:STRING=conan" "$PRODUCTION_BUILD_DIR/CMakeCache.txt"
          grep -F "CMAKE_TOOLCHAIN_FILE:FILEPATH=" "$PRODUCTION_BUILD_DIR/CMakeCache.txt" \
            | grep -F "build/conan-preflight/build/Release/generators/conan_toolchain.cmake"

      - name: Verify sccache wiring
        shell: bash
        run: |
          : "${SCCACHE_BIN:?missing sccache path}"
          grep -F -n "$SCCACHE_BIN" "$PRODUCTION_BUILD_DIR/CMakeCache.txt" "$PRODUCTION_BUILD_DIR/build.ninja"

      - name: Record build start time
        shell: bash
        run: echo "BUILD_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        run: |
          cmake --build "$PRODUCTION_BUILD_DIR" --parallel
          mkdir -p runtime/perf/build-times
          sccache --show-stats --stats-format json > runtime/perf/build-times/sccache-stats.json

      - name: List tests
        shell: bash
        run: |
          mkdir -p runtime/validation
          ctest --test-dir "$PRODUCTION_BUILD_DIR" -N | tee runtime/validation/release-ctest-list.log

      - name: Test
        shell: bash
        run: |
          mkdir -p runtime/validation
          ctest --test-dir "$PRODUCTION_BUILD_DIR" --progress --output-on-failure --timeout 300 \
            | tee runtime/validation/release-ctest.log

      - name: Raft Phase B specialized evidence
        run: |
          python3 scripts/verify_specialized_e2e.py \
            --build-dir "$PRODUCTION_BUILD_DIR" \
            --configuration Release \
            --profile raft-ha \
            --skip-build \
            --summary-path runtime/validation/raft-release-specialized-summary.json

      - name: Raft Phase B data recovery evidence
        run: |
          python3 scripts/verify_data_recovery_gate.py \
            --build-dir "$PRODUCTION_BUILD_DIR" \
            --configuration Release \
            --skip-build \
            --summary-path runtime/validation/raft-release-data-recovery-summary.json

      - name: Restore verified Linux x64 legacy Raft binary
        if: github.event_name == 'workflow_dispatch' && inputs.prepare_legacy_raft_linux_x64_binary
        shell: bash
        env:
          EXPECTED_BINARY_SHA256: ${{ vars.LEGACY_RAFT_SHA256_LINUX_X64 || vars.LEGACY_RAFT_SHA256 }}
        run: |
          set -euo pipefail
          test "$PRODUCTION_PLATFORM" = linux-x64
          : "${EXPECTED_BINARY_SHA256:?configure LEGACY_RAFT_SHA256_LINUX_X64}"

          archive_sha256=4ad6945b08b4f7bfceac7e0b8e41a1d61c9ae12c0075d85e4268b209cc4ab4d8
          archive_url=https://github.com/HoneyBury/boost_gateway/releases/download/v3.5.3/boost-gateway-v3.5.3-linux-x64.tar.gz
          destination="$PRODUCTION_CACHE_ROOT/releases/v3.5.3/bin/v2_leaderboard_backend"
          temp_dir="$(mktemp -d "${RUNNER_TEMP:-/tmp}/boost-gateway-v353.XXXXXX")"
          trap 'rm -rf "$temp_dir"' EXIT

          curl --proto '=https' --tlsv1.2 --fail --location --retry 3 \
            --output "$temp_dir/archive.tar.gz" "$archive_url"
          echo "$archive_sha256  $temp_dir/archive.tar.gz" | sha256sum --check --strict
          tar -xzf "$temp_dir/archive.tar.gz" -C "$temp_dir"
          source_binary="$temp_dir/boost-gateway-v3.5.3-linux-x64/bin/v2_leaderboard_backend"
          echo "$EXPECTED_BINARY_SHA256  $source_binary" | sha256sum --check --strict

          install -d -m 0755 "$(dirname "$destination")"
          install -m 0755 "$source_binary" "$destination.tmp"
          mv -f "$destination.tmp" "$destination"
          echo "$EXPECTED_BINARY_SHA256  $destination" | sha256sum --check --strict

      - name: Raft Phase B real mixed-binary evidence
        shell: bash
        env:
          LEGACY_RAFT_BINARY_INPUT: ${{ inputs.legacy_raft_binary }}
          LEGACY_RAFT_REVISION: ${{ inputs.legacy_raft_revision || vars.LEGACY_RAFT_REVISION || 'b9c348b4b58fdeeffa9d82ff87a67ed781a96b78' }}
          LEGACY_RAFT_SHA256_INPUT: ${{ inputs.legacy_raft_sha256 }}
          LEGACY_RAFT_SHA256_LINUX_X64: ${{ vars.LEGACY_RAFT_SHA256_LINUX_X64 || vars.LEGACY_RAFT_SHA256 }}
          LEGACY_RAFT_SHA256_LINUX_ARM64: ${{ vars.LEGACY_RAFT_SHA256_LINUX_ARM64 }}
          LEGACY_RAFT_SHA256_MACOS_ARM64: ${{ vars.LEGACY_RAFT_SHA256_MACOS_ARM64 }}
        run: |
          set -euo pipefail
          legacy_binary="${LEGACY_RAFT_BINARY_INPUT:-$PRODUCTION_CACHE_ROOT/releases/v3.5.3/bin/v2_leaderboard_backend}"
          legacy_sha="$LEGACY_RAFT_SHA256_INPUT"
          if [ -z "$legacy_sha" ]; then
            case "$PRODUCTION_PLATFORM" in
              linux-x64) legacy_sha="$LEGACY_RAFT_SHA256_LINUX_X64" ;;
              linux-arm64) legacy_sha="$LEGACY_RAFT_SHA256_LINUX_ARM64" ;;
              macos-arm64) legacy_sha="$LEGACY_RAFT_SHA256_MACOS_ARM64" ;;
            esac
          fi
          : "${legacy_sha:?configure a platform-specific legacy Raft SHA-256}"
          python3 scripts/verify_raft_mixed_binary.py \
            --legacy-binary "$legacy_binary" \
            --legacy-revision "$LEGACY_RAFT_REVISION" \
            --expected-legacy-sha256 "$legacy_sha" \
            --candidate-binary "$PRODUCTION_BUILD_DIR/examples/v2_leaderboard_backend/v2_leaderboard_backend" \
            --state-tool "$PRODUCTION_BUILD_DIR/tools/raft_state_tool/raft_state_tool" \
            --configuration Release \
            --summary-path runtime/validation/raft-mixed-binary-summary.json

      - name: Upload Raft Phase B runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raft-phase-b-${{ matrix.platform }}-${{ github.run_id }}
          path: |
            runtime/validation/raft-conan-offline-summary.json
            runtime/validation/raft-release-specialized-summary.json
            runtime/validation/raft-release-data-recovery-summary.json
            runtime/validation/raft-mixed-binary-summary.json
            runtime/validation/raft-mixed-binary/**
          if-no-files-found: warn

      - name: R4 release contract gate
        run: python scripts/verify_r4_contract.py --build-dir "$PRODUCTION_BUILD_DIR" --skip-build --skip-arch-baseline --configuration Release --baseline-profile release

      - name: Security release gate
        run: python scripts/check_security_release_gate.py

      - name: Monitoring operability gate
        run: python scripts/check_monitoring_operability.py --summary-path runtime/validation/release-monitoring-operability-summary.json

      - name: Observability release gate
        run: python scripts/verify_observability_gate.py --build-dir "$PRODUCTION_BUILD_DIR" --configuration Release --skip-build

      - name: Control-plane operator gate
        run: python scripts/verify_control_plane_gate.py

      - name: Workflow Python CLI contract gate
        run: python scripts/check_workflow_python_cli_contracts.py

      - name: Workflow catalog gate
        run: python scripts/check_workflow_catalog.py

      - name: Evidence provenance contract gate
        run: python scripts/check_evidence_provenance_contract.py

      - name: R5 Docker image policy contract gate
        run: python scripts/check_r5_docker_image_policy_contract.py

      - name: Legacy/helper inventory gate
        run: python scripts/gates/governance/check_legacy_helper_inventory.py

      - name: Release candidate bounded gate
        run: python scripts/verify_release_candidate.py --build-dir "$PRODUCTION_BUILD_DIR" --configuration Release --baseline-profile release --soak-profile smoke --skip-build --skip-release-baseline --timeout-seconds 120

      - name: Collect release baseline
        run: |
          python3 scripts/collect_release_baseline.py \
            --build-dir "$PRODUCTION_BUILD_DIR" \
            --perf-preset ${{ inputs.perf_preset || 'smoke' }} \
            --perf-repetitions ${{ inputs.perf_repetitions || '3' }} \
            --skip-build \
            --perf-output-root runtime/perf/release-baseline \
            --summary-path runtime/validation/release-baseline-summary.json

      - name: Upload release baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-perf-baseline-${{ matrix.platform }}-${{ github.run_id }}
          path: |
            runtime/perf/release-baseline/**
            runtime/validation/release-baseline-summary.json
            runtime/validation/release-ctest*.log
            runtime/perf/build-times/**
          if-no-files-found: warn

      - name: Install
        shell: bash
        run: |
          set -euo pipefail
          install_dir="${GITHUB_WORKSPACE}/dist/boost-gateway-${RELEASE_LABEL}-${PRODUCTION_ARCHIVE_PLATFORM}"
          cmake --install "$PRODUCTION_BUILD_DIR" --prefix "$install_dir"
          cp README.md CHANGELOG.md LICENSE "$install_dir/"

      - name: Archive package
        shell: bash
        run: |
          set -euo pipefail
          archive_basename="boost-gateway-${RELEASE_LABEL}-${PRODUCTION_ARCHIVE_PLATFORM}"
          (cd dist && cmake -E tar czfv "../${archive_basename}.tar.gz" --format=gnutar "${archive_basename}")

      - name: Verify release archive layout
        shell: bash
        run: |
          python3 scripts/tools/verify_release_archive.py \
            --archive "boost-gateway-${RELEASE_LABEL}-${PRODUCTION_ARCHIVE_PLATFORM}.tar.gz" \
            --expected-root "boost-gateway-${RELEASE_LABEL}-${PRODUCTION_ARCHIVE_PLATFORM}"

      - name: Verify package on clean Ubuntu
        if: matrix.platform != 'macos-arm64'
        shell: bash
        run: |
          python3 scripts/tools/verify_release_package_consumer.py \
            --archive "boost-gateway-${RELEASE_LABEL}-${PRODUCTION_ARCHIVE_PLATFORM}.tar.gz" \
            --expected-root "boost-gateway-${RELEASE_LABEL}-${PRODUCTION_ARCHIVE_PLATFORM}" \
            --image ubuntu:24.04 \
            --expected-platform "$PRODUCTION_PLATFORM" \
            --configuration Release \
            --candidate-revision "$GITHUB_SHA" \
            --lockfile "$BOOST_GATEWAY_CONAN_LOCKFILE"

      - name: Verify native macOS package and CMake consumer
        if: matrix.platform == 'macos-arm64'
        shell: bash
        run: |
          python3 scripts/tools/verify_macos_arm64_package.py \
            --install-root "dist/boost-gateway-${RELEASE_LABEL}-${PRODUCTION_ARCHIVE_PLATFORM}" \
            --lockfile "$PRODUCTION_RELEASE_LOCKFILE" \
            --candidate-revision "$GITHUB_SHA" \
            --summary-path runtime/validation/release-package-consumer-summary.json

      - name: Prepare clean compiler image
        if: matrix.platform != 'macos-arm64' && github.event_name == 'workflow_dispatch' && inputs.prepare_cmake_consumer_image
        shell: bash
        run: |
          set -euo pipefail
          docker build --pull=false \
            -f env/docker/release-cmake-consumer.Dockerfile \
            -t boost-gateway/release-cmake-consumer:ubuntu24.04-gcc13 .
          docker image inspect boost-gateway/release-cmake-consumer:ubuntu24.04-gcc13 \
            --format '{{.Id}} {{.Architecture}}'

      - name: Verify CMake consumer in clean compiler container
        if: matrix.platform != 'macos-arm64'
        shell: bash
        run: |
          python3 scripts/tools/verify_release_cmake_consumer.py \
            --archive "boost-gateway-${RELEASE_LABEL}-${PRODUCTION_ARCHIVE_PLATFORM}.tar.gz" \
            --expected-root "boost-gateway-${RELEASE_LABEL}-${PRODUCTION_ARCHIVE_PLATFORM}" \
            --image boost-gateway/release-cmake-consumer:ubuntu24.04-gcc13 \
            --candidate-revision "$GITHUB_SHA" \
            --target-platform "$PRODUCTION_DOCKER_PLATFORM"

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: dist/boost-gateway-${{ env.RELEASE_LABEL }}-${{ matrix.platform }}
          format: spdx-json
          output-file: boost-gateway-${{ env.RELEASE_LABEL }}-${{ matrix.platform }}-sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Harden and verify SPDX SBOM semantics
        shell: bash
        run: |
          python3 scripts/tools/harden_release_sbom.py enrich \
            --sbom "boost-gateway-${RELEASE_LABEL}-${PRODUCTION_ARCHIVE_PLATFORM}-sbom.spdx.json" \
            --package-root "dist/boost-gateway-${RELEASE_LABEL}-${PRODUCTION_ARCHIVE_PLATFORM}" \
            --lockfile "$BOOST_GATEWAY_CONAN_LOCKFILE" \
            --policy config/release/sbom-policy.json \
            --configuration Release \
            --candidate-revision "$GITHUB_SHA" \
            --summary-path runtime/validation/release-sbom-semantics-summary.json

      - name: Verify Raft Phase B release evidence binding
        shell: bash
        run: |
          python3 scripts/verify_raft_release_evidence.py \
            --specialized-summary runtime/validation/raft-release-specialized-summary.json \
            --data-recovery-summary runtime/validation/raft-release-data-recovery-summary.json \
            --conan-offline-summary runtime/validation/raft-conan-offline-summary.json \
            --sbom-summary runtime/validation/release-sbom-semantics-summary.json \
            --package-consumer-summary runtime/validation/release-package-consumer-summary.json \
            --mixed-binary-summary runtime/validation/raft-mixed-binary-summary.json \
            --candidate-revision "$GITHUB_SHA" \
            --summary-path runtime/validation/raft-release-evidence-summary.json

      - name: Attest release archive provenance
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest@v4
        with:
          subject-path: boost-gateway-${{ env.RELEASE_LABEL }}-${{ matrix.platform }}.tar.gz

      - name: Attest release archive SBOM
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest@v4
        with:
          subject-path: boost-gateway-${{ env.RELEASE_LABEL }}-${{ matrix.platform }}.tar.gz
          sbom-path: boost-gateway-${{ env.RELEASE_LABEL }}-${{ matrix.platform }}-sbom.spdx.json

      - name: Render release notes
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: python scripts/tools/render_release_notes.py --version "$RELEASE_VERSION" --output RELEASE_NOTES.md

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: boost-gateway-${{ matrix.platform }}-${{ github.sha }}
          path: |
            boost-gateway-${{ env.RELEASE_LABEL }}-${{ matrix.platform }}.tar.gz
            boost-gateway-${{ env.RELEASE_LABEL }}-${{ matrix.platform }}-sbom.spdx.json
            RELEASE_NOTES.md
            runtime/validation/release-package-consumer-summary.json
            runtime/validation/release-cmake-consumer-summary.json
            runtime/validation/release-sbom-semantics-summary.json
            runtime/validation/raft-conan-offline-summary.json
            runtime/validation/raft-release-specialized-summary.json
            runtime/validation/raft-release-data-recovery-summary.json
            runtime/validation/raft-mixed-binary-summary.json
            runtime/validation/raft-mixed-binary/**
            runtime/validation/raft-release-evidence-summary.json
            runtime/validation/production-platform-summary.json

      - name: Show sccache stats
        if: always()
        shell: bash
        run: |
          if [ -f runtime/perf/build-times/sccache-stats.json ]; then
            cat runtime/perf/build-times/sccache-stats.json
          else
            sccache --show-stats || true
          fi

      - name: Capture build metrics
        if: always()
        shell: bash
        run: |
          mkdir -p runtime/perf/build-times
          now=$(date +%s)
          iso_now=$(python3 -c 'from datetime import UTC, datetime; print(datetime.now(UTC).isoformat(timespec="seconds").replace("+00:00", "Z"))')
          duration=$(( now - BUILD_START_EPOCH ))
          cat > runtime/perf/build-times/build-time.json << EOF
          {
            "workflow": "release",
            "production_platform": "$PRODUCTION_PLATFORM",
            "runner_os": "${{ runner.os }}",
            "runner_arch": "${{ runner.arch }}",
            "timestamp": "${iso_now}",
            "build_duration_seconds": ${duration}
          }
          EOF

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Prepare isolated release asset directory
        shell: bash
        run: |
          release_asset_dir="$RUNNER_TEMP/boost-gateway-release-${{ github.run_id }}"
          mkdir -p "$release_asset_dir"
          printf 'RELEASE_ASSET_DIR=%s\n' "$release_asset_dir" >> "$GITHUB_ENV"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: boost-gateway-*-${{ github.sha }}
          path: ${{ env.RELEASE_ASSET_DIR }}

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' archives < <(find "$RELEASE_ASSET_DIR" -type f -name '*.tar.gz' -print0)
          test "${#archives[@]}" -eq 3
          mapfile -d '' sboms < <(find "$RELEASE_ASSET_DIR" -type f -name '*-sbom.spdx.json' -print0)
          test "${#sboms[@]}" -eq 3
          for platform in linux-x64 linux-arm64 macos-arm64; do
            find "$RELEASE_ASSET_DIR" -type f -name "boost-gateway-${GITHUB_REF_NAME}-${platform}.tar.gz" -print -quit | grep -q .
            find "$RELEASE_ASSET_DIR" -type f -name "boost-gateway-${GITHUB_REF_NAME}-${platform}-sbom.spdx.json" -print -quit | grep -q .
          done
          : > "$RELEASE_ASSET_DIR/SHA256SUMS.txt"
          for asset in "${archives[@]}" "${sboms[@]}"; do
            digest="$(sha256sum "$asset" | cut -d ' ' -f 1)"
            printf '%s  %s\n' "$digest" "$(basename "$asset")" >> "$RELEASE_ASSET_DIR/SHA256SUMS.txt"
          done
          mapfile -d '' notes < <(find "$RELEASE_ASSET_DIR" -type f -name RELEASE_NOTES.md -print0)
          test "${#notes[@]}" -eq 3
          cp "${notes[0]}" "$RELEASE_ASSET_DIR/RELEASE_NOTES.md"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ env.RELEASE_ASSET_DIR }}/RELEASE_NOTES.md
          files: |
            ${{ env.RELEASE_ASSET_DIR }}/**/*.tar.gz
            ${{ env.RELEASE_ASSET_DIR }}/**/*-sbom.spdx.json
