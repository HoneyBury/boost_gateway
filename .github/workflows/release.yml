name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SCCACHE_DIR: ${{ github.workspace }}/.sccache

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ["self-hosted", "Linux", "X64"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore sccache cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{ runner.os }}-release-release-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'sdk/CMakeLists.txt', 'proto/CMakeLists.txt') }}
          restore-keys: |
            sccache-${{ runner.os }}-release-release-
            sccache-${{ runner.os }}-

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/boostgateway-operator/go.mod
      - name: Install sccache
        shell: bash
        run: |
          set -euo pipefail
          sccache --version || sudo apt-get install -y sccache
          sccache --version

      - name: Configure
        run: cmake --preset release -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset release --parallel

      - name: Test
        run: ctest --preset release --timeout 300

      - name: R4 release contract gate
        run: python scripts/verify_r4_contract.py --build-dir build/release --skip-build --skip-arch-baseline --configuration Release --baseline-profile release

      - name: Security release gate
        run: python scripts/check_security_release_gate.py

      - name: Monitoring operability gate
        run: python scripts/check_monitoring_operability.py --summary-path runtime/validation/release-monitoring-operability-summary.json

      - name: Observability release gate
        run: python scripts/verify_observability_gate.py --build-dir build/release --configuration Release --skip-build

      - name: Control-plane operator gate
        run: python scripts/verify_control_plane_gate.py

      - name: Release candidate bounded gate
        run: python scripts/verify_release_candidate.py --build-dir build/release --configuration Release --baseline-profile release --soak-profile smoke --skip-build --skip-release-baseline --timeout-seconds 120

      - name: Collect release baseline (smoke)
        run: python scripts/collect_release_baseline.py --build-dir build/release --perf-preset smoke --skip-build --output runtime/perf/release-baseline/summary.json

      - name: Install
        shell: bash
        run: |
          set -euo pipefail
          install_dir="${GITHUB_WORKSPACE}/dist/boost-gateway-${GITHUB_REF_NAME}-linux-x64"
          cmake --install "build/release" --prefix "$install_dir"
          cp README.md "$install_dir/"
          cp CHANGELOG.md "$install_dir/"

      - name: Archive package
        shell: bash
        run: |
          set -euo pipefail
          archive_basename="boost-gateway-${GITHUB_REF_NAME}-linux-x64"
          cmake -E tar cfv "${archive_basename}.tar.gz" --format=gnutar "dist/${archive_basename}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: boost-gateway-linux-x64
          path: boost-gateway-${{ github.ref_name }}-linux-x64.tar.gz

      - name: Show sccache stats
        if: always()
        shell: bash
        run: sccache --show-stats || true

  publish:
    runs-on: ["self-hosted", "Linux", "X64"]
    needs: package

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          find . -maxdepth 2 -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/SHA256SUMS.txt
