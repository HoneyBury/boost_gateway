name: Per-Commit Performance Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SCCACHE_DIR: ${{ github.workspace }}/.sccache

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner JSON string or array, for example "ubuntu-latest" or ["self-hosted","Linux","X64"]'
        required: true
        default: '["self-hosted","Linux","X64"]'

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  perf-smoke:
    runs-on: ${{ fromJSON(inputs.runner || vars.PERF_COMMIT_RUNNER || '["self-hosted","Linux","X64"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore sccache cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{ runner.os }}-perf-release-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'sdk/CMakeLists.txt', 'proto/CMakeLists.txt') }}
          restore-keys: |
            sccache-${{ runner.os }}-perf-release-
            sccache-${{ runner.os }}-

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
      - name: Install sccache
        shell: bash
        run: |
          set -euo pipefail
          sccache --version || sudo apt-get install -y sccache
          sccache --version

      - name: Configure (Release)
        run: cmake --preset release -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Record build start time
        shell: bash
        run: echo "BUILD_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build (Release)
        run: cmake --build --preset release --parallel

      - name: Run smoke performance test
        id: perf
        shell: bash
        env:
          V2_RATE_LIMIT_CONNECTION: "100000"
          V2_RATE_LIMIT_MESSAGE_TYPE: "200000"
          V2_RATE_LIMIT_IP: "200000"
          V2_RATE_LIMIT_USER: "100000"
          V2_RATE_LIMIT_LOGIN: "50000"
        run: |
          OUTPUT_DIR="runtime/perf/ci-commit-check-$(date +%Y%m%d-%H%M%S)"
          python scripts/collect_v2_perf_baseline.py \
            --build-dir build/release \
            --run-preset smoke \
            --repetitions 1 \
            --output-root "$OUTPUT_DIR" \
            2>&1 | tee perf_smoke.log

          echo "output_dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Compare with baseline gates
        id: compare
        shell: bash
        run: |
          SUMMARY_PATH="$(find runtime/perf -name 'summary.json' -type f | head -1)"
          GATES_FILE="config/perf/v2_arch_baseline_gates.json"

          echo 'summary_path<<EOF' >> "$GITHUB_OUTPUT"
          echo "$SUMMARY_PATH" >> "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"

          SUMMARY_PATH="$SUMMARY_PATH" GATES_FILE="$GATES_FILE" python - <<'PY' > comparison_result.json
          import json
          import os

          with open(os.environ["SUMMARY_PATH"], encoding="utf-8") as f:
              summary = json.load(f)
          with open(os.environ["GATES_FILE"], encoding="utf-8") as f:
              gates_config = json.load(f)

          scenario_gates = gates_config.get("scenario_gates", {})
          aggregates = summary.get("case_aggregates", [])
          comparison_table = []

          for agg in aggregates:
              case_name = agg.get("case_name", "")
              p99_ms = agg.get("latency_p99_ms", {}).get("median", 0)
              throughput = agg.get("throughput_msg_per_sec", {}).get("median", 0)
              p99_us = p99_ms * 1000

              if "echo" in case_name:
                  gate = scenario_gates.get("echo_p99_us", {})
              elif "login" in case_name:
                  gate = scenario_gates.get("login_p99_us", {})
              elif "battle" in case_name:
                  gate = scenario_gates.get("battle_broadcast_p99_us", {})
              else:
                  comparison_table.append({
                      "case": case_name,
                      "p99_us": p99_us,
                      "throughput": throughput,
                      "warning": "N/A",
                      "critical": "N/A",
                      "status": "info",
                  })
                  continue

              warning_threshold = gate.get("warning", float("inf"))
              critical_threshold = gate.get("critical", float("inf"))

              if p99_us >= critical_threshold:
                  status = "FAIL"
              elif p99_us >= warning_threshold:
                  status = "WARN"
              else:
                  status = "PASS"

              comparison_table.append({
                  "case": case_name,
                  "p99_us": p99_us,
                  "throughput": throughput,
                  "warning": warning_threshold,
                  "critical": critical_threshold,
                  "status": status,
              })

          print(json.dumps(comparison_table))
          PY

      - name: Post PR comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const os = 'linux';
            const comparison = JSON.parse(fs.readFileSync('comparison_result.json', 'utf8'));

            let table = '| Case | P99 (us) | Throughput | Warning | Critical | Status |\n';
            table += '| --- | ---: | ---: | ---: | ---: | --- |\n';

            let allPassed = true;
            for (const row of comparison) {
              table += `| ${row.case} | ${row.p99_us.toLocaleString()} | ${row.throughput.toLocaleString()} msg/s | ${row.warning} | ${row.critical} | ${row.status} |\n`;
              if (row.status === 'FAIL') allPassed = false;
            }

            const header = allPassed
              ? '## Performance Smoke Check (PASS)'
              : '## Performance Smoke Check (REGRESSION DETECTED)';
            const body = `${header}\\n\\n**Platform**: ${os}\\n**Commit**: ${{ github.sha }}\\n\\n${table}\\n\\n_This check runs the smoke preset (~30s). Triggered via workflow_dispatch._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes('Performance Smoke Check'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-smoke
          path: |
            runtime/perf/**
            perf_smoke.log
          if-no-files-found: warn

      - name: Show sccache stats
        if: always()
        shell: bash
        run: sccache --show-stats || true

      - name: Capture build metrics
        if: always()
        shell: bash
        run: |
          mkdir -p runtime/perf/build-times
          now=$(date +%s)
          iso_now=$(date -Iseconds)
          duration=$(( now - BUILD_START_EPOCH ))
          cat > runtime/perf/build-times/build-time.json << EOF
          {
            "workflow": "perf-commit-check",
            "runner_os": "${{ runner.os }}",
            "timestamp": "${iso_now}",
            "build_duration_seconds": ${duration}
          }
          EOF
          sccache --show-stats --stats-format json > runtime/perf/build-times/sccache-stats.json 2>/dev/null || true
