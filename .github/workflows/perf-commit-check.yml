name: Per-Commit Performance Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SCCACHE_DIR: ${{ github.workspace }}/.sccache

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  runner-matrix:
    runs-on: ["self-hosted","Windows","X64"]
    outputs:
      perf_commit: ${{ steps.matrix.outputs.perf_commit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read runner matrix
        id: matrix
        shell: bash
        run: |
          echo "perf_commit=$(python scripts/tools/read_runner_matrix.py --path matrices.ci.perf_commit)" >> "$GITHUB_OUTPUT"

  perf-smoke:
    if: contains(github.event.pull_request.labels.*.name, 'perf') || github.event.action == 'labeled' && contains(github.event.pull_request.labels.*.name, 'perf')
    needs: runner-matrix
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.runner-matrix.outputs.perf_commit) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore sccache cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{ runner.os }}-perf-${{ matrix.configure_preset }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'sdk/CMakeLists.txt', 'proto/CMakeLists.txt') }}
          restore-keys: |
            sccache-${{ runner.os }}-perf-${{ matrix.configure_preset }}-
            sccache-${{ runner.os }}-

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install sccache
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Windows" ]; then
            choco install sccache -y --no-progress
          else
            sudo apt-get update
            sudo apt-get install -y sccache
          fi
          sccache --version

      - name: Configure (Release)
        run: cmake --preset ${{ matrix.configure_preset }} -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build (Release)
        run: cmake --build --preset ${{ matrix.build_preset }} --parallel

      - name: Run smoke performance test
        id: perf
        shell: bash
        env:
          V2_RATE_LIMIT_CONNECTION: "100000"
          V2_RATE_LIMIT_MESSAGE_TYPE: "200000"
          V2_RATE_LIMIT_IP: "200000"
          V2_RATE_LIMIT_USER: "100000"
          V2_RATE_LIMIT_LOGIN: "50000"
        run: |
          OUTPUT_DIR="runtime/perf/ci-commit-check-$(date +%Y%m%d-%H%M%S)"
          python scripts/collect_v2_perf_baseline.py \
            --build-dir ${{ matrix.build_dir }} \
            --run-preset smoke \
            --repetitions 1 \
            --output-root "$OUTPUT_DIR" \
            2>&1 | tee perf_smoke.log

          echo "output_dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Compare with baseline gates
        id: compare
        shell: bash
        run: |
          SUMMARY_PATH="$(find runtime/perf -name 'summary.json' -type f | head -1)"
          GATES_FILE="config/perf/v2_arch_baseline_gates.json"

          echo 'summary_path<<EOF' >> "$GITHUB_OUTPUT"
          echo "$SUMMARY_PATH" >> "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"

          python3 -c "
import json, sys

with open('$SUMMARY_PATH') as f:
    summary = json.load(f)
with open('$GATES_FILE') as f:
    gates_config = json.load(f)

scenario_gates = gates_config.get('scenario_gates', {})
aggregates = summary.get('case_aggregates', [])
comparison_table = []

for agg in aggregates:
    case_name = agg.get('case_name', '')
    p99_ms = agg.get('latency_p99_ms', {}).get('median', 0)
    throughput = agg.get('throughput_msg_per_sec', {}).get('median', 0)
    p99_us = p99_ms * 1000

    if 'echo' in case_name:
        gate = scenario_gates.get('echo_p99_us', {})
    elif 'login' in case_name:
        gate = scenario_gates.get('login_p99_us', {})
    elif 'battle' in case_name:
        gate = scenario_gates.get('battle_broadcast_p99_us', {})
    else:
        comparison_table.append({
            'case': case_name,
            'p99_us': p99_us,
            'throughput': throughput,
            'warning': 'N/A',
            'critical': 'N/A',
            'status': 'info'
        })
        continue

    warning_threshold = gate.get('warning', float('inf'))
    critical_threshold = gate.get('critical', float('inf'))

    if p99_us >= critical_threshold:
        status = 'FAIL'
    elif p99_us >= warning_threshold:
        status = 'WARN'
    else:
        status = 'PASS'

    comparison_table.append({
        'case': case_name,
        'p99_us': p99_us,
        'throughput': throughput,
        'warning': warning_threshold,
        'critical': critical_threshold,
        'status': status
    })

print(json.dumps(comparison_table))
" > comparison_result.json

      - name: Post PR comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const os = '${{ matrix.os }}';
            const comparison = JSON.parse(fs.readFileSync('comparison_result.json', 'utf8'));

            let table = '| Case | P99 (us) | Throughput | Warning | Critical | Status |\n';
            table += '| --- | ---: | ---: | ---: | ---: | --- |\n';

            let allPassed = true;
            for (const row of comparison) {
              table += `| ${row.case} | ${row.p99_us.toLocaleString()} | ${row.throughput.toLocaleString()} msg/s | ${row.warning} | ${row.critical} | ${row.status} |\n`;
              if (row.status === 'FAIL') allPassed = false;
            }

            const header = allPassed
              ? '## Performance Smoke Check (PASS)'
              : '## Performance Smoke Check (REGRESSION DETECTED)';
            const body = `${header}\\n\\n**Platform**: ${os}\\n**Commit**: ${{ github.sha }}\\n\\n${table}\\n\\n_This check runs the smoke preset (~30s). Triggered by the \\`perf\\` label._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            // Find existing perf check comment and update it, or create a new one
            const existing = comments.find(c => c.body && c.body.includes('Performance Smoke Check'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-smoke-${{ matrix.os }}
          path: |
            runtime/perf/**
            perf_smoke.log
          if-no-files-found: warn

      - name: Show sccache stats
        if: always()
        shell: bash
        run: sccache --show-stats || true
