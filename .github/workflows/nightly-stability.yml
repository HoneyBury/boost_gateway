name: Nightly Stability

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      soak_profile:
        description: "Stability soak profile"
        required: true
        default: "short"
        type: choice
        options:
          - smoke
          - short
          - medium

permissions:
  contents: read

jobs:
  stability-soak:
    runs-on: ["self-hosted", "Linux", "X64"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
      - name: Install sccache
        shell: bash
        run: |
          set -euo pipefail
          sccache --version || sudo apt-get install -y sccache
          sccache --version

      - name: Configure
        run: cmake --preset default -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Stability soak
        run: >
          python scripts/verify_stability_soak.py
          --build-dir build/default
          --configuration Debug
          --baseline-profile debug
          --soak-profile ${{ inputs.soak_profile || 'short' }}
          --summary-path runtime/validation/nightly-stability-soak-summary.json

      - name: Render stability summary
        if: always()
        shell: bash
        run: |
          if [ -f runtime/validation/nightly-stability-soak-summary.json ]; then
            python scripts/render_validation_summary.py runtime/validation/nightly-stability-soak-summary.json --title "Nightly Stability" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload stability summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-stability-windows
          path: |
            runtime/validation/nightly-stability-soak-summary.json
            runtime/perf/v2-stability-soak/**
          if-no-files-found: warn

      - name: Show sccache stats
        if: always()
        shell: bash
        run: sccache --show-stats || true
