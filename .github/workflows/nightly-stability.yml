name: Stability / Bounded Soak

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner JSON string or array, for example "ubuntu-latest" or ["self-hosted","Linux","X64"]'
        required: true
        default: '["self-hosted","Linux","X64"]'
      soak_profile:
        description: "Stability soak profile"
        required: true
        default: "short"
        type: choice
        options:
          - smoke
          - short
          - medium

permissions:
  contents: read

jobs:
  stability-soak:
    runs-on: ${{ fromJSON(inputs.runner || vars.NIGHTLY_RUNNER || '["self-hosted","Linux","X64"]') }}

    steps:
      - name: Normalize stale Go cache permissions
        shell: bash
        run: |
          set -euo pipefail
          cache="$GITHUB_WORKSPACE/runtime/go-cache"
          if [ -d "$cache" ]; then
            docker run --rm --pull=never --network=none \
              -v "$cache:/cache" ubuntu:24.04 chmod -R a+rwX /cache
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ensure pinned Conan virtual environment
        shell: bash
        run: |
          set -euo pipefail
          python scripts/tools/ensure_conan_venv.py \
            --venv /opt/boost-gateway/tools/conan-2.8.1-py3.12 \
            --conan-version 2.8.1 \
            --offline \
            --github-env "$GITHUB_ENV" \
            --github-path "$GITHUB_PATH"

      - name: Resolve persistent runner caches
        shell: bash
        run: |
          set -euo pipefail
          python scripts/tools/resolve_runner_cache.py \
            --build-type Release \
            --profile conan/profiles/linux-gcc-x64 \
            --lockfile conan/locks/linux-gcc-x64-release-nogrpc-nosqlite.lock \
            --github-env "$GITHUB_ENV" \
            --summary-path runtime/validation/runner-cache-identity.json

      - name: Bootstrap Conan home
        shell: bash
        run: python scripts/bootstrap_conan.py --conan-home "$CONAN_HOME" --no-remote

      - name: Conan install
        shell: bash
        run: |
          set -euo pipefail
          conan install . \
            --profile:host conan/profiles/linux-gcc-x64 \
            --profile:build conan/profiles/linux-gcc-x64 \
            --lockfile conan/locks/linux-gcc-x64-release-nogrpc-nosqlite.lock \
            -o "&:with_grpc=False" \
            -o "&:with_raft_protobuf=True" \
            -o "&:with_sqlite=False" \
            --output-folder=build/conan-nightly \
            --build=never \
            --no-remote \
            -s build_type=Release

      - name: Install sccache
        shell: bash
        run: |
          set -euo pipefail
          sccache --version || sudo apt-get install -y sccache
          echo "SCCACHE_BIN=$(command -v sccache)" >> "$GITHUB_ENV"
          mkdir -p "$SCCACHE_DIR"
          sccache --version

      - name: Reset sccache stats
        shell: bash
        run: sccache --zero-stats || true

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          : "${SCCACHE_BIN:?missing sccache path}"
          mkdir -p runtime/validation
          cmake --preset release \
            -DBOOST_DEPENDENCY_PROVIDER=conan \
            -DCMAKE_TOOLCHAIN_FILE=build/conan-nightly/build/Release/generators/conan_toolchain.cmake \
            -DCMAKE_C_COMPILER_LAUNCHER="$SCCACHE_BIN" \
            -DCMAKE_CXX_COMPILER_LAUNCHER="$SCCACHE_BIN" \
            2>&1 | tee runtime/validation/nightly-configure.log

      - name: Verify Conan dependency provider
        shell: bash
        run: |
          grep -F "Using Conan-provided dependency graph" runtime/validation/nightly-configure.log

      - name: Verify sccache wiring
        shell: bash
        run: |
          : "${SCCACHE_BIN:?missing sccache path}"
          grep -F -n "$SCCACHE_BIN" build/release/CMakeCache.txt build/release/build.ninja

      - name: Record build start time
        shell: bash
        run: echo "BUILD_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"

      - name: Stability soak
        shell: bash
        run: |
          python scripts/verify_stability_soak.py \
            --build-dir build/release \
            --configuration Release \
            --baseline-profile release \
            --soak-profile ${{ inputs.soak_profile || 'short' }} \
            --build-timeout-seconds 300 \
            --summary-path runtime/validation/nightly-stability-soak-summary.json
          mkdir -p runtime/perf/build-times
          sccache --show-stats --stats-format json > runtime/perf/build-times/sccache-stats.json

      - name: Render stability summary
        if: always()
        shell: bash
        run: |
          if [ -f runtime/validation/nightly-stability-soak-summary.json ]; then
            python scripts/render_validation_summary.py runtime/validation/nightly-stability-soak-summary.json --title "Nightly Stability" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload stability summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-stability
          path: |
            runtime/validation/nightly-stability-soak-summary.json
            runtime/perf/v2-stability-soak/**
            runtime/perf/build-times/**
          if-no-files-found: warn

      - name: Show sccache stats
        if: always()
        shell: bash
        run: |
          if [ -f runtime/perf/build-times/sccache-stats.json ]; then
            cat runtime/perf/build-times/sccache-stats.json
          else
            sccache --show-stats || true
          fi

      - name: Capture build metrics
        if: always()
        shell: bash
        run: |
          mkdir -p runtime/perf/build-times
          now=$(date +%s)
          iso_now=$(date -Iseconds)
          duration=$(( now - BUILD_START_EPOCH ))
          cat > runtime/perf/build-times/build-time.json << EOF
          {
            "workflow": "nightly-stability",
            "runner_os": "${{ runner.os }}",
            "timestamp": "${iso_now}",
            "build_duration_seconds": ${duration}
          }
          EOF
