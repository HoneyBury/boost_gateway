name: Release Baseline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner label"
        required: true
        default: "ubuntu-latest"
      configure_preset:
        description: "CMake configure preset"
        required: true
        default: "release"
      build_dir:
        description: "CMake build directory"
        required: true
        default: "build/release"
      configuration:
        description: "Build configuration"
        required: true
        default: "Release"
      perf_preset:
        description: "Performance preset"
        required: true
        default: "baseline"
        type: choice
        options:
          - smoke
          - baseline
          - capacity
      perf_repetitions:
        description: "Repetitions per performance case"
        required: true
        default: "3"
      perf_timeout_seconds:
        description: "Performance collection timeout"
        required: true
        default: "900"

permissions:
  contents: read

jobs:
  release-baseline:
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Fixed runner preflight
        run: >
          python scripts/check_fixed_runner_environment.py
          --profile release-baseline
          --build-dir ${{ inputs.build_dir }}

      - name: Configure
        run: cmake --preset ${{ inputs.configure_preset }}

      - name: Collect release baseline
        run: >
          python scripts/collect_release_baseline.py
          --build-dir ${{ inputs.build_dir }}
          --configuration ${{ inputs.configuration }}
          --perf-preset ${{ inputs.perf_preset }}
          --perf-repetitions ${{ inputs.perf_repetitions }}
          --perf-timeout-seconds ${{ inputs.perf_timeout_seconds }}
          --summary-path runtime/validation/release-baseline-summary.json

      - name: Render release baseline summary
        if: always()
        shell: bash
        run: |
          summaries=()
          for path in \
            runtime/validation/release-baseline-summary.json \
            runtime/validation/release-r4-contract-summary.json \
            runtime/perf/release-baseline/summary.json; do
            if [ -f "$path" ]; then
              summaries+=("$path")
            fi
          done
          if [ "${#summaries[@]}" -gt 0 ]; then
            python scripts/render_validation_summary.py "${summaries[@]}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload release baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-baseline-${{ inputs.runner }}-${{ inputs.perf_preset }}
          path: |
            runtime/validation/release-baseline-summary.json
            runtime/perf/release-baseline/**
            runtime/perf/v2-arch-baseline/**
          if-no-files-found: warn
