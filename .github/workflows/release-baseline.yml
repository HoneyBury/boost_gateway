name: Release Baseline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SCCACHE_DIR: ${{ github.workspace }}/.sccache
  CONAN_HOME: ${{ github.workspace }}/.conan2-local

on:
  schedule:
    - cron: "10 18 * * 5"
  workflow_dispatch:
    inputs:
      configure_preset:
        description: "CMake configure preset"
        required: true
        default: "release"
      build_dir:
        description: "CMake build directory"
        required: true
        default: "build/release"
      configuration:
        description: "Build configuration"
        required: true
        default: "Release"
      perf_preset:
        description: "Performance preset"
        required: true
        default: "baseline"
        type: choice
        options:
          - smoke
          - baseline
          - capacity
      perf_repetitions:
        description: "Repetitions per performance case"
        required: true
        default: "3"
      baseline_timeout_seconds:
        description: "Timeout for R4 baseline checks"
        required: true
        default: "120"
      perf_timeout_seconds:
        description: "Timeout for performance collection"
        required: true
        default: "1800"
      enable_conan_validation:
        description: "Run an opt-in Conan dependency validation before the main baseline flow"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  release-baseline:
    runs-on: ["self-hosted", "Windows", "X64"]
    timeout-minutes: 720
    concurrency:
      group: release-baseline-self-hosted-windows-x64
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 0

      - name: Restore sccache cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{ runner.os }}-release-baseline-${{ inputs.configure_preset || 'release' }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'sdk/CMakeLists.txt', 'proto/CMakeLists.txt') }}
          restore-keys: |
            sccache-${{ runner.os }}-release-baseline-${{ inputs.configure_preset || 'release' }}-
            sccache-${{ runner.os }}-

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Show CMake version
        run: cmake --version

      - name: Setup Python
        if: inputs.enable_conan_validation
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sccache
        shell: pwsh
        run: |
          choco install sccache -y --no-progress
          sccache --version

      - name: Install Conan
        if: inputs.enable_conan_validation
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install conan
          conan --version

      - name: Conan validation preflight
        if: inputs.enable_conan_validation
        shell: pwsh
        run: |
          python scripts/bootstrap_conan.py
          conan install . --output-folder=build/conan-release-baseline --build=missing -s build_type=${{ inputs.configuration || 'Release' }}
          cmake -S . -B build/windows-ninja-release-conan -G Ninja \
            -DBOOST_USE_CONAN_DEPS=ON \
            -DENABLE_TESTING=OFF \
            -DCMAKE_BUILD_TYPE=${{ inputs.configuration || 'Release' }} \
            -DCMAKE_TOOLCHAIN_FILE=build/conan-release-baseline/build/${{ inputs.configuration || 'Release' }}/generators/conan_toolchain.cmake
          cmake --build build/windows-ninja-release-conan --parallel --target project_v2

      - name: Fixed runner preflight
        shell: pwsh
        run: |
          python scripts/check_fixed_runner_environment.py \
            --profile release-baseline \
            --build-dir "${{ inputs.build_dir || 'build/release' }}" \
            --summary-path runtime/validation/fixed-runner-preflight-summary.json

      - name: Configure
        run: cmake --preset ${{ inputs.configure_preset || 'release' }} -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Release baseline gate
        shell: pwsh
        run: |
          python scripts/collect_release_baseline.py \
            --build-dir "${{ inputs.build_dir || 'build/release' }}" \
            --configuration "${{ inputs.configuration || 'Release' }}" \
            --perf-preset "${{ inputs.perf_preset || 'baseline' }}" \
            --perf-repetitions "${{ inputs.perf_repetitions || '3' }}" \
            --baseline-timeout-seconds "${{ inputs.baseline_timeout_seconds || '120' }}" \
            --perf-timeout-seconds "${{ inputs.perf_timeout_seconds || '1800' }}" \
            --summary-path runtime/validation/release-baseline-summary.json

      - name: R4 fixed-runner release/capacity gate
        if: inputs.perf_preset == 'capacity'
        shell: pwsh
        run: |
          python scripts/verify_fixed_runner_release_capacity.py \
            --build-dir "${{ inputs.build_dir || 'build/release' }}" \
            --configuration "${{ inputs.configuration || 'Release' }}" \
            --release-summary runtime/validation/release-baseline-summary.json \
            --capacity-summary runtime/perf/release-baseline/summary.json \
            --business-capacity-summary runtime/perf/p0-business-capacity-local-r2/summary.json \
            --summary-path runtime/validation/fixed-runner-release-capacity-summary.json

      - name: Render release baseline summary
        if: always()
        shell: pwsh
        run: |
          $summaries = @(
            'runtime/validation/fixed-runner-preflight-summary.json',
            'runtime/validation/release-baseline-summary.json',
            'runtime/validation/release-r4-contract-summary.json',
            'runtime/validation/fixed-runner-release-capacity-summary.json',
            'runtime/perf/release-baseline/summary.json'
          ) | Where-Object { Test-Path $_ }
          if ($summaries.Count -gt 0) {
            python scripts/render_validation_summary.py $summaries | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          fi

      - name: Upload release baseline artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-baseline-${{ github.run_id }}
          path: |
            runtime/validation/fixed-runner-preflight-summary.json
            runtime/validation/release-baseline-summary.json
            runtime/validation/release-r4-contract-summary.json
            runtime/validation/fixed-runner-release-capacity-summary.json
            runtime/perf/release-baseline/**
          retention-days: 90
          if-no-files-found: warn

      - name: Show sccache stats
        if: always()
        shell: pwsh
        run: sccache --show-stats || true
