name: Release Baseline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SCCACHE_DIR: ${{ github.workspace }}/.sccache
  CONAN_HOME: ${{ github.workspace }}/.conan2-local

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner JSON string or array, for example "ubuntu-latest" or ["self-hosted","Linux","X64"]'
        required: true
        default: '["self-hosted","Linux","X64"]'
      configure_preset:
        description: "CMake configure preset"
        required: true
        default: "release"
      build_dir:
        description: "CMake build directory"
        required: true
        default: "build/release"
      configuration:
        description: "Build configuration"
        required: true
        default: "Release"
      perf_preset:
        description: "Performance preset"
        required: true
        default: "baseline"
        type: choice
        options:
          - smoke
          - baseline
          - capacity
      perf_repetitions:
        description: "Repetitions per performance case"
        required: true
        default: "3"
      baseline_timeout_seconds:
        description: "Timeout for R4 baseline checks"
        required: true
        default: "120"
      perf_timeout_seconds:
        description: "Timeout for performance collection"
        required: true
        default: "1800"
      enable_conan_validation:
        description: "Run Conan lockfile validation before the main baseline flow"
        required: true
        default: true
        type: boolean
      conan_profile:
        description: "Repository Conan profile path used by Conan validation"
        required: true
        default: "conan/profiles/linux-gcc-x64"
      conan_lockfile:
        description: "Conan lockfile path relative to repo root"
        required: true
        default: "conan/locks/linux-gcc-x64-release-nogrpc-nosqlite.lock"
      conan_with_sqlite:
        description: "Enable sqlite optional dependency during Conan validation"
        required: true
        default: false
        type: boolean
      use_existing_workspace:
        description: "Skip actions/checkout and reuse the self-hosted runner workspace clone"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  release-baseline:
    runs-on: ${{ fromJSON(inputs.runner || vars.RELEASE_BASELINE_RUNNER || '["self-hosted","Linux","X64"]') }}
    timeout-minutes: 720
    concurrency:
      group: release-baseline-${{ inputs.runner || vars.RELEASE_BASELINE_RUNNER || 'self-hosted-linux-x64' }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        if: inputs.use_existing_workspace != true
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 0

      - name: Verify existing workspace
        if: inputs.use_existing_workspace
        shell: bash
        run: |
          set -euo pipefail
          test -d .git
          git rev-parse --short HEAD
          git status --short --branch

      - name: Restore sccache cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{ runner.os }}-release-baseline-${{ inputs.configure_preset || 'release' }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'sdk/CMakeLists.txt', 'proto/CMakeLists.txt', 'conanfile.py', 'conan/profiles/**', 'conan/remotes*.json', 'conan/locks/*.lock') }}
          restore-keys: |
            sccache-${{ runner.os }}-release-baseline-${{ inputs.configure_preset || 'release' }}-
            sccache-${{ runner.os }}-

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Show CMake version
        run: cmake --version

      - name: Setup Python
        if: github.event_name != 'workflow_dispatch' || inputs.enable_conan_validation
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sccache
        shell: pwsh
        run: |
          sccache --version || sudo apt-get install -y sccache
          sccache --version

      - name: Install sccache (Linux)
        shell: bash
        run: |
          set -euo pipefail
          if command -v sccache >/dev/null 2>&1; then
            sccache --version
            exit 0
          fi
          cargo install sccache
          sccache --version

      - name: Install Conan
        if: github.event_name != 'workflow_dispatch' || inputs.enable_conan_validation
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install conan
          conan --version

      - name: Conan validation preflight
        if: github.event_name != 'workflow_dispatch' || inputs.enable_conan_validation
        shell: bash
        run: |
          set -euo pipefail
          python scripts/bootstrap_conan.py
          args=(conan install . --output-folder=build/conan-release-baseline --build=missing -s build_type=${{ inputs.configuration || 'Release' }} --profile:host "${{ inputs.conan_profile }}" --profile:build "${{ inputs.conan_profile }}" -o "&:with_grpc=False" -o "&:with_sqlite=${{ inputs.conan_with_sqlite && 'True' || 'False' }}")
          if [ -n "${{ inputs.conan_lockfile }}" ]; then
            args+=(--lockfile "${{ inputs.conan_lockfile }}")
          fi
          "${args[@]}"
          cmake -S . -B build/conan-release-baseline-cmake -G Ninja \
            -DBOOST_USE_CONAN_DEPS=ON \
            -DENABLE_TESTING=OFF \
            -DCMAKE_BUILD_TYPE=${{ inputs.configuration || 'Release' }} \
            -DCMAKE_TOOLCHAIN_FILE=build/conan-release-baseline/build/${{ inputs.configuration || 'Release' }}/generators/conan_toolchain.cmake
          cmake --build build/conan-release-baseline-cmake --parallel --target project_v2

      - name: Fixed runner preflight
        shell: bash
        run: |
          set -euo pipefail
          python scripts/check_fixed_runner_environment.py \
            --profile release-baseline \
            --build-dir "${{ inputs.build_dir || 'build/release' }}" \
            --summary-path runtime/validation/fixed-runner-preflight-summary.json

      - name: Configure
        run: cmake --preset ${{ inputs.configure_preset || 'release' }} -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Release baseline gate
        shell: bash
        run: |
          set -euo pipefail
          python scripts/collect_release_baseline.py \
            --build-dir "${{ inputs.build_dir || 'build/release' }}" \
            --configuration "${{ inputs.configuration || 'Release' }}" \
            --perf-preset "${{ inputs.perf_preset || 'baseline' }}" \
            --perf-repetitions "${{ inputs.perf_repetitions || '3' }}" \
            --baseline-timeout-seconds "${{ inputs.baseline_timeout_seconds || '120' }}" \
            --perf-timeout-seconds "${{ inputs.perf_timeout_seconds || '1800' }}" \
            --summary-path runtime/validation/release-baseline-summary.json

      - name: R4 fixed-runner release/capacity gate
        if: inputs.perf_preset == 'capacity'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/verify_fixed_runner_release_capacity.py \
            --build-dir "${{ inputs.build_dir || 'build/release' }}" \
            --configuration "${{ inputs.configuration || 'Release' }}" \
            --release-summary runtime/validation/release-baseline-summary.json \
            --capacity-summary runtime/perf/release-baseline/summary.json \
            --business-capacity-summary runtime/perf/p0-business-capacity-local-r2/summary.json \
            --summary-path runtime/validation/fixed-runner-release-capacity-summary.json

      - name: Render release baseline summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          summaries=()
          for path in \
            runtime/validation/fixed-runner-preflight-summary.json \
            runtime/validation/release-baseline-summary.json \
            runtime/validation/release-r4-contract-summary.json \
            runtime/validation/fixed-runner-release-capacity-summary.json \
            runtime/perf/release-baseline/summary.json; do
            if [ -f "$path" ]; then
              summaries+=("$path")
            fi
          done
          if [ "${#summaries[@]}" -gt 0 ]; then
            python scripts/render_validation_summary.py "${summaries[@]}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload release baseline artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-baseline-${{ github.run_id }}
          path: |
            runtime/validation/fixed-runner-preflight-summary.json
            runtime/validation/release-baseline-summary.json
            runtime/validation/release-r4-contract-summary.json
            runtime/validation/fixed-runner-release-capacity-summary.json
            runtime/perf/release-baseline/**
          retention-days: 90
          if-no-files-found: warn

      - name: Show sccache stats
        if: always()
        shell: bash
        run: sccache --show-stats || true
