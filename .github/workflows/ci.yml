name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SCCACHE_DIR: ${{ github.workspace }}/.sccache
  CONAN_HOME: ${{ github.workspace }}/.conan2-local

on:
  push:
    branches: ["main", "develop"]
  pull_request:

permissions:
  contents: read

jobs:
  linux-build-and-test:
    runs-on: ["self-hosted", "Linux", "X64"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 0

      - name: Restore sccache cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{ runner.os }}-default-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'sdk/CMakeLists.txt', 'proto/CMakeLists.txt') }}
          restore-keys: |
            sccache-${{ runner.os }}-default-
            sccache-${{ runner.os }}-

      - name: Show tool versions
        shell: bash
        run: |
          set -euo pipefail
          cmake --version
          ninja --version
          python3 --version

      - name: Detect sccache
        id: sccache
        shell: bash
        run: |
          if command -v sccache >/dev/null 2>&1; then
            sccache --version
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "sccache not found; continuing without compiler cache"
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Reset sccache stats
        if: steps.sccache.outputs.available == 'true'
        shell: bash
        run: sccache --zero-stats || true

      - name: Configure
        shell: bash
        run: |
          args=(cmake --preset default)
          if [ "${{ steps.sccache.outputs.available }}" = "true" ]; then
            args+=(-DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache)
          fi
          "${args[@]}"

      - name: Build
        shell: bash
        run: cmake --build --preset default --parallel

      - name: Test
        shell: bash
        run: ctest --preset default --timeout 300

      - name: R4 contract gate
        shell: bash
        run: python3 scripts/verify_r4_contract.py --build-dir build/default --skip-build --skip-arch-baseline --configuration Debug

      - name: Monitoring operability gate
        shell: bash
        run: python3 scripts/check_monitoring_operability.py --summary-path runtime/validation/ci-monitoring-operability-summary.json

      - name: Show sccache stats
        if: always() && steps.sccache.outputs.available == 'true'
        shell: bash
        run: sccache --show-stats || true
