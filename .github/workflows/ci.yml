name: Mainline / Build, Test & Governance

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SCCACHE_DIR: ${{ github.workspace }}/.sccache
  CONAN_HOME: ${{ github.workspace }}/.conan2-local
  BOOST_GATEWAY_CONAN_VENV: ${{ github.workspace }}/.venv/conan-2.8.1

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner JSON string or array, for example "ubuntu-latest" or ["self-hosted","Linux","X64"]'
        required: true
        default: '"ubuntu-latest"'

permissions:
  contents: read

jobs:
  linux-build-and-test:
    runs-on: ${{ fromJSON(inputs.runner || vars.CI_RUNNER || '"ubuntu-latest"') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore sccache cache
        id: restore-sccache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{ runner.os }}-release-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'sdk/CMakeLists.txt', 'proto/CMakeLists.txt', 'conanfile.py', 'conan/profiles/**', 'conan/remotes*.json', 'conan/locks/*.lock') }}-${{ github.sha }}
          restore-keys: |
            sccache-${{ runner.os }}-release-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'sdk/CMakeLists.txt', 'proto/CMakeLists.txt', 'conanfile.py', 'conan/profiles/**', 'conan/remotes*.json', 'conan/locks/*.lock') }}-
            sccache-${{ runner.os }}-release-
            sccache-${{ runner.os }}-

      - name: Restore Conan cache
        id: restore-conan
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CONAN_HOME }}
          key: conan-home-${{ runner.os }}-conan-2.8.1-release-${{ hashFiles('conanfile.py', 'conan/profiles/**', 'conan/remotes*.json', 'conan/locks/*.lock', 'scripts/bootstrap_conan.py', 'scripts/tools/ensure_conan_venv.py') }}

      - name: Show tool versions
        shell: bash
        run: |
          set -euo pipefail
          cmake --version
          ninja --version
          python3 --version

      - name: Install sccache
        shell: bash
        run: |
          set -euo pipefail
          sccache --version || sudo apt-get install -y sccache
          echo "SCCACHE_BIN=$(command -v sccache)" >> "$GITHUB_ENV"
          mkdir -p "$SCCACHE_DIR"
          sccache --version

      - name: Ensure Conan
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/tools/ensure_conan_venv.py \
            --venv "$BOOST_GATEWAY_CONAN_VENV" \
            --conan-version 2.8.1 \
            --recreate-if-python-mismatch \
            --github-env "$GITHUB_ENV" \
            --github-path "$GITHUB_PATH"
          "$BOOST_GATEWAY_CONAN_VENV/bin/conan" --version

      - name: Conan install
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$BOOST_GATEWAY_CONAN_VENV/bin:$PATH"
          python3 scripts/bootstrap_conan.py --conan-home "$CONAN_HOME" --allow-public --disable-example-internal
          conan install . \
            --profile:host conan/profiles/linux-gcc-x64 \
            --profile:build conan/profiles/linux-gcc-x64 \
            --lockfile conan/locks/linux-gcc-x64-release-nogrpc-nosqlite.lock \
            -o "&:with_grpc=False" \
            -o "&:with_raft_protobuf=True" \
            -o "&:with_sqlite=False" \
            --output-folder=build/conan-ci \
            --build=missing \
            -s build_type=Release

      - name: Reset sccache stats
        shell: bash
        run: sccache --zero-stats || true

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          : "${SCCACHE_BIN:?missing sccache path}"
          mkdir -p runtime/validation
          cmake -S . -B build/release -G Ninja \
            -DBOOST_DEPENDENCY_PROVIDER=conan \
            -DENABLE_TESTING=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=build/conan-ci/build/Release/generators/conan_toolchain.cmake \
            -DCMAKE_C_COMPILER_LAUNCHER="$SCCACHE_BIN" \
            -DCMAKE_CXX_COMPILER_LAUNCHER="$SCCACHE_BIN" \
            2>&1 | tee runtime/validation/ci-configure.log
          grep -F "Using Conan-provided dependency graph" runtime/validation/ci-configure.log

      - name: Verify sccache wiring
        shell: bash
        run: |
          : "${SCCACHE_BIN:?missing sccache path}"
          grep -F -n "$SCCACHE_BIN" build/release/CMakeCache.txt build/release/build.ninja

      - name: Record build start time
        shell: bash
        run: echo "BUILD_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        run: |
          cmake --build build/release --parallel
          mkdir -p runtime/perf/build-times
          sccache --show-stats --stats-format json > runtime/perf/build-times/sccache-stats.json

      - name: Test
        shell: bash
        run: ctest --test-dir build/release --output-on-failure --timeout 300

      - name: R4 contract gate
        shell: bash
        run: python3 scripts/gates/release/verify_r4_contract.py --build-dir build/release --skip-build --skip-arch-baseline --configuration Release

      - name: Monitoring operability gate
        shell: bash
        run: python3 scripts/gates/production/check_monitoring_operability.py --summary-path runtime/validation/ci-monitoring-operability-summary.json

      - name: Workflow Python CLI contract gate
        shell: bash
        run: python3 scripts/gates/governance/check_workflow_python_cli_contracts.py

      - name: Workflow catalog gate
        shell: bash
        run: python3 scripts/gates/governance/check_workflow_catalog.py

      - name: Next minor decision gate
        shell: bash
        run: python3 scripts/gates/governance/check_next_minor_decisions.py

      - name: Project TODO board gate
        shell: bash
        run: python3 scripts/manage_todos.py check

      - name: Evidence provenance contract gate
        shell: bash
        run: python3 scripts/gates/governance/check_evidence_provenance_contract.py

      - name: R5 Docker image policy contract gate
        shell: bash
        run: python3 scripts/gates/governance/check_r5_docker_image_policy_contract.py

      - name: Legacy/helper inventory gate
        shell: bash
        run: python3 scripts/gates/governance/check_legacy_helper_inventory.py

      - name: Show sccache stats
        if: always()
        shell: bash
        run: |
          if [ -f runtime/perf/build-times/sccache-stats.json ]; then
            cat runtime/perf/build-times/sccache-stats.json
          else
            sccache --show-stats || true
          fi

      - name: Capture build metrics
        if: always()
        shell: bash
        run: |
          mkdir -p runtime/perf/build-times
          now=$(date +%s)
          iso_now=$(date -Iseconds)
          duration=$(( now - BUILD_START_EPOCH ))
          cat > runtime/perf/build-times/build-time.json << EOF
          {
            "workflow": "ci",
            "runner_os": "${{ runner.os }}",
            "timestamp": "${iso_now}",
            "build_duration_seconds": ${duration}
          }
          EOF

      - name: Upload build metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-metrics
          path: runtime/perf/build-times/**
          if-no-files-found: warn

      - name: Save Conan cache
        if: always() && steps.restore-conan.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CONAN_HOME }}
          key: conan-home-${{ runner.os }}-conan-2.8.1-release-${{ hashFiles('conanfile.py', 'conan/profiles/**', 'conan/remotes*.json', 'conan/locks/*.lock', 'scripts/bootstrap_conan.py', 'scripts/tools/ensure_conan_venv.py') }}

      - name: Save sccache cache
        if: always() && steps.restore-sccache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{ runner.os }}-release-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'sdk/CMakeLists.txt', 'proto/CMakeLists.txt', 'conanfile.py', 'conan/profiles/**', 'conan/remotes*.json', 'conan/locks/*.lock') }}-${{ github.sha }}
