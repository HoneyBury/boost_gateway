name: Dependencies / Conan Graph Validation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner JSON string or array, for example "ubuntu-latest" or ["self-hosted","Linux","X64"]'
        required: true
        default: '["self-hosted","Linux","X64"]'
      conan_profile:
        description: "Repository Conan profile path relative to repo root"
        required: true
        default: "conan/profiles/linux-gcc-x64"
      build_type:
        description: "CMake/Conan build type"
        required: true
        default: "Release"
        type: choice
        options:
          - Debug
          - Release
      allow_public:
        description: "Allow public conancenter remote"
        required: true
        default: false
        type: boolean
      no_remote:
        description: "Use local Conan cache only"
        required: true
        default: false
        type: boolean
      use_existing_workspace:
        description: "Skip actions/checkout and reuse the self-hosted runner workspace clone"
        required: true
        default: true
        type: boolean
      enable_testing:
        description: "Configure with ENABLE_TESTING=ON"
        required: true
        default: false
        type: boolean
      with_sqlite:
        description: "Enable sqlite optional dependency in Conan graph"
        required: true
        default: false
        type: boolean
      conan_lockfile:
        description: "Optional Conan lockfile path relative to repo root"
        required: true
        default: "conan/locks/linux-gcc-x64-release-nogrpc-nosqlite.lock"

permissions:
  contents: read

jobs:
  conan-validate:
    runs-on: ${{ fromJSON(inputs.runner || vars.CONAN_VALIDATE_RUNNER || '["self-hosted","Linux","X64"]') }}

    steps:
      - name: Checkout
        if: inputs.use_existing_workspace != true
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 0

      - name: Verify existing workspace
        if: inputs.use_existing_workspace
        shell: bash
        run: |
          set -euo pipefail
          test -d .git
          git rev-parse --short HEAD
          git status --short --branch

      - name: Setup Ninja
        if: runner.os != 'Linux' || runner.arch != 'ARM64'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        if: runner.os != 'Linux' || runner.arch != 'ARM64'
        uses: jwlawson/actions-setup-cmake@v2
      - name: Setup Python
        if: runner.os == 'Linux' && runner.arch != 'ARM64'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ensure pinned Conan virtual environment
        shell: bash
        run: |
          set -euo pipefail
          args=(
            python scripts/tools/ensure_conan_venv.py
            --venv /opt/boost-gateway/tools/conan-2.8.1-py3.12
            --conan-version 2.8.1
            --github-env "$GITHUB_ENV"
            --github-path "$GITHUB_PATH"
          )
          if [ "${{ inputs.no_remote }}" = "true" ]; then
            args+=(--offline)
          fi
          "${args[@]}"

      - name: Resolve persistent runner caches
        shell: bash
        run: |
          set -euo pipefail
          python scripts/tools/resolve_runner_cache.py \
            --build-type "${{ inputs.build_type }}" \
            --profile "${{ inputs.conan_profile }}" \
            --lockfile "${{ inputs.conan_lockfile }}" \
            --github-env "$GITHUB_ENV" \
            --summary-path runtime/validation/runner-cache-identity.json

      - name: Bootstrap Conan home
        shell: bash
        run: |
          set -euo pipefail
          args=(python scripts/bootstrap_conan.py --conan-home "$CONAN_HOME" --disable-example-internal)
          if [ "${{ inputs.allow_public }}" = "true" ]; then
            args+=(--allow-public)
          fi
          if [ "${{ inputs.no_remote }}" = "true" ]; then
            args+=(--no-remote)
          fi
          "${args[@]}"

      - name: Conan install
        shell: bash
        run: |
          set -euo pipefail
          args=(conan install . --output-folder=build/conan-${{ inputs.build_type }} -s build_type=${{ inputs.build_type }} --profile:host "${{ inputs.conan_profile }}" --profile:build "${{ inputs.conan_profile }}" -o "&:with_grpc=False" -o "&:with_raft_protobuf=True" -o "&:with_sqlite=${{ inputs.with_sqlite && 'True' || 'False' }}")
          if [ -n "${{ inputs.conan_lockfile }}" ]; then
            args+=(--lockfile "${{ inputs.conan_lockfile }}")
          fi
          if [ "${{ inputs.no_remote }}" = "true" ]; then
            args+=(--build=never)
          else
            args+=(--build=missing)
          fi
          "${args[@]}"

      - name: Configure Conan build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p runtime/validation
          cmake -S . -B build/conan-validate-${{ inputs.build_type }} -G Ninja \
            -DBOOST_DEPENDENCY_PROVIDER=conan \
            -DENABLE_TESTING=${{ inputs.enable_testing && 'ON' || 'OFF' }} \
            -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} \
            -DCMAKE_TOOLCHAIN_FILE=build/conan-${{ inputs.build_type }}/build/${{ inputs.build_type }}/generators/conan_toolchain.cmake \
            2>&1 | tee runtime/validation/conan-validate-configure.log
          grep -F "Using Conan-provided dependency graph" runtime/validation/conan-validate-configure.log

      - name: Build Conan validation target
        shell: bash
        run: |
          set -euo pipefail
          target=project_v2
          if [ "${{ inputs.enable_testing }}" = "true" ]; then
            target=project_v2_unit_tests
          fi
          cmake --build build/conan-validate-${{ inputs.build_type }} --parallel --target "$target"

      - name: Upload Conan validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conan-validate-${{ github.run_id }}
          path: |
            build/conan-${{ inputs.build_type }}/**
            build/conan-validate-${{ inputs.build_type }}/**
          if-no-files-found: warn
