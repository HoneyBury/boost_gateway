name: Platform / macOS ARM64 Production Candidate

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner JSON array"
        required: true
        default: '["self-hosted","macOS","ARM64"]'

permissions:
  contents: read

jobs:
  build-test-package:
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: 90
    env:
      LOCKFILE: conan/locks/macos-apple-clang-arm64-release-nogrpc-nosqlite.lock

    steps:
      - uses: actions/checkout@v4

      - name: Verify host Python and resolve persistent runner tool paths
        shell: bash
        run: |
          set -euo pipefail
          command -v python3.12
          python3.12 -c 'import sys; assert sys.version_info[:2] == (3, 12)'
          test -n "${RUNNER_TOOL_CACHE:-}"
          cache_root="$RUNNER_TOOL_CACHE/boost-gateway"
          printf 'BOOST_GATEWAY_RUNNER_CACHE_ROOT=%s\n' "$cache_root" >> "$GITHUB_ENV"
          printf 'BOOST_GATEWAY_CONAN_VENV=%s\n' \
            "$cache_root/tools/conan-2.8.1-py3.12" >> "$GITHUB_ENV"

      - name: Verify native toolchain
        shell: bash
        run: |
          set -euo pipefail
          test "$(uname -m)" = arm64
          xcrun clang --version
          xcrun --show-sdk-version
          cmake --version
          ninja --version

      - name: Ensure offline Conan
        shell: bash
        run: |
          set -euo pipefail
          python3.12 scripts/tools/ensure_conan_venv.py \
            --venv "$BOOST_GATEWAY_CONAN_VENV" \
            --conan-version 2.8.1 \
            --offline \
            --github-env "$GITHUB_ENV" \
            --github-path "$GITHUB_PATH"

      - name: Resolve persistent runner cache
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$BOOST_GATEWAY_CONAN_VENV/bin:$PATH"
          python3.12 scripts/tools/resolve_runner_cache.py \
            --build-type Release \
            --profile conan/profiles/macos-apple-clang-arm64 \
            --lockfile "$LOCKFILE" \
            --cache-root "$BOOST_GATEWAY_RUNNER_CACHE_ROOT" \
            --github-env "$GITHUB_ENV" \
            --summary-path runtime/validation/macos-runner-cache-summary.json

      - name: Verify locked dependencies offline
        shell: bash
        run: |
          set -euo pipefail
          python3.12 scripts/bootstrap_conan.py --conan-home "$CONAN_HOME" --no-remote
          python3.12 scripts/tools/verify_conan_offline_install.py \
            --profile conan/profiles/macos-apple-clang-arm64 \
            --lockfile "$LOCKFILE" \
            --output-folder build/conan-macos-arm64 \
            --build-type Release \
            --conan-executable "$BOOST_GATEWAY_CONAN_VENV/bin/conan" \
            --candidate-revision "$GITHUB_SHA" \
            --summary-path runtime/validation/macos-conan-offline-summary.json

      - name: Configure and build
        shell: bash
        run: |
          cmake -S . -B build/macos-arm64-release -G Ninja \
            -DBOOST_DEPENDENCY_PROVIDER=conan \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DENABLE_TESTING=ON \
            -DCMAKE_TOOLCHAIN_FILE=build/conan-macos-arm64/build/Release/generators/conan_toolchain.cmake
          cmake --build build/macos-arm64-release --parallel

      - name: Bounded test
        run: ctest --test-dir build/macos-arm64-release --output-on-failure --timeout 300

      - name: R5 native process recovery drill
        shell: bash
        run: |
          set -euo pipefail
          python3.12 scripts/verify_preprod_recovery_drill.py \
            --build-dir build/macos-arm64-release \
            --configuration Release \
            --mode native-process \
            --step-timeout-seconds 300 \
            --candidate-revision "$GITHUB_SHA" \
            --summary-path runtime/validation/macos-arm64-r5-summary.json

      - name: Install and verify
        shell: bash
        run: |
          set -euo pipefail
          install_root="$RUNNER_TEMP/boost-gateway-v3.6.0-macos-arm64"
          cmake --install build/macos-arm64-release --prefix "$install_root"
          cp README.md CHANGELOG.md LICENSE "$install_root/"
          python3.12 scripts/verify_macos_arm64_package.py \
            --install-root "$install_root" \
            --lockfile "$LOCKFILE" \
            --candidate-revision "$GITHUB_SHA" \
            --summary-path runtime/validation/macos-arm64-summary.json
          (cd "$RUNNER_TEMP" && cmake -E tar czfv \
            "$GITHUB_WORKSPACE/boost-gateway-v3.6.0-macos-arm64.tar.gz" \
            --format=gnutar boost-gateway-v3.6.0-macos-arm64)

      - name: Verify archive and create SBOM
        shell: bash
        run: |
          python3.12 scripts/tools/verify_release_archive.py \
            --archive boost-gateway-v3.6.0-macos-arm64.tar.gz \
            --expected-root boost-gateway-v3.6.0-macos-arm64
          syft packages boost-gateway-v3.6.0-macos-arm64.tar.gz \
            -o spdx-json=boost-gateway-v3.6.0-macos-arm64.spdx.json
          shasum -a 256 \
            boost-gateway-v3.6.0-macos-arm64.tar.gz \
            boost-gateway-v3.6.0-macos-arm64.spdx.json > SHA256SUMS-macos-arm64.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: macos-arm64-${{ github.sha }}
          path: |
            boost-gateway-v3.6.0-macos-arm64.tar.gz
            boost-gateway-v3.6.0-macos-arm64.spdx.json
            SHA256SUMS-macos-arm64.txt
            runtime/validation/macos-runner-cache-summary.json
            runtime/validation/macos-conan-offline-summary.json
            runtime/validation/macos-arm64-summary.json
            runtime/validation/macos-arm64-r5-summary.json
            runtime/validation/r5-preprod-recovery-drill-record.json
            runtime/validation/r5-recovery-drill-record-check-summary.json
            runtime/validation/r5-post-recovery-sdk-full-flow-summary.json
            runtime/validation/process-logs
          retention-days: 30
