name: Production Resilience

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    - cron: "20 19 * * 2"
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner JSON string or array, for example "ubuntu-latest" or ["self-hosted","production-resilience"]'
        required: true
        default: '"ubuntu-latest"'
      configure_preset:
        description: "CMake configure preset"
        required: true
        default: "default"
      build_dir:
        description: "CMake build directory"
        required: true
        default: "build/default"
      configuration:
        description: "Build configuration"
        required: true
        default: "Debug"
      soak_profile:
        description: "Stability soak profile"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - short
          - medium
          - long
          - overnight
      baseline_profile:
        description: "Architecture gate profile"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release
      include_redis_live:
        description: "Run Redis live resilience checks"
        required: true
        default: false
        type: boolean
      include_operator_kind:
        description: "Run Operator kind rollback/delete checks"
        required: true
        default: false
        type: boolean
      include_runtime_http:
        description: "Run runtime HTTP observability checks"
        required: true
        default: false
        type: boolean
      include_release_baseline:
        description: "Collect release baseline"
        required: true
        default: false
        type: boolean
      include_capacity_baseline:
        description: "Collect capacity baseline"
        required: true
        default: false
        type: boolean
      perf_repetitions:
        description: "Repetitions per performance case"
        required: true
        default: "1"
      step_timeout_seconds:
        description: "Timeout for each P5 sub-gate"
        required: true
        default: "1200"
      kind_timeout_seconds:
        description: "Timeout for kind rollout/delete checks"
        required: true
        default: "1200"

permissions:
  contents: read

jobs:
  production-resilience:
    runs-on: ${{ fromJSON(inputs.runner || vars.PRODUCTION_RESILIENCE_RUNNER || '["self-hosted","Windows","X64"]') }}
    timeout-minutes: 720
    concurrency:
      group: production-resilience-${{ inputs.runner || vars.PRODUCTION_RESILIENCE_RUNNER || 'self-hosted-windows-x64' }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/boostgateway-operator/go.mod

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset ${{ inputs.configure_preset || 'default' }}

      - name: Production resilience gate
        shell: bash
        run: |
          set -euo pipefail
          args=(
            scripts/verify_production_resilience_gate.py
            --build-dir "${{ inputs.build_dir || 'build/default' }}"
            --configuration "${{ inputs.configuration || 'Debug' }}"
            --soak-profile "${{ inputs.soak_profile || 'smoke' }}"
            --baseline-profile "${{ inputs.baseline_profile || 'debug' }}"
            --perf-repetitions "${{ inputs.perf_repetitions || '1' }}"
            --step-timeout-seconds "${{ inputs.step_timeout_seconds || '1200' }}"
            --kind-timeout-seconds "${{ inputs.kind_timeout_seconds || '1200' }}"
            --summary-path runtime/validation/production-resilience-summary.json
          )
          if [ "${{ inputs.include_redis_live }}" = "true" ]; then
            args+=(--include-redis-live)
          fi
          if [ "${{ inputs.include_operator_kind }}" = "true" ]; then
            args+=(--include-operator-kind)
          fi
          if [ "${{ inputs.include_runtime_http }}" = "true" ]; then
            args+=(--include-runtime-http)
          fi
          if [ "${{ inputs.include_release_baseline }}" = "true" ]; then
            args+=(--include-release-baseline)
          fi
          if [ "${{ inputs.include_capacity_baseline }}" = "true" ]; then
            args+=(--include-capacity-baseline)
          fi
          python "${args[@]}"

      - name: Render production resilience summary
        if: always()
        shell: bash
        run: |
          summaries=()
          for path in \
            runtime/validation/p5-fixed-runner-preflight-summary.json \
            runtime/validation/production-resilience-summary.json \
            runtime/validation/p5-long-soak-summary.json \
            runtime/validation/p5-fault-data-recovery-summary.json \
            runtime/validation/p5-specialized-failure-summary.json \
            runtime/validation/p5-runtime-observability-summary.json \
            runtime/validation/p5-control-plane-kind-summary.json \
            runtime/validation/p5-release-baseline-summary.json \
            runtime/validation/gateway-observability-runtime-summary.json \
            runtime/perf/release-baseline/summary.json; do
            if [ -f "$path" ]; then
              summaries+=("$path")
            fi
          done
          if [ "${#summaries[@]}" -gt 0 ]; then
            python scripts/render_validation_summary.py "${summaries[@]}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload production resilience evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-resilience-${{ github.run_id }}
          path: |
            runtime/validation/p5-fixed-runner-preflight-summary.json
            runtime/validation/production-resilience-summary.json
            runtime/validation/p5-*-summary.json
            runtime/validation/gateway-observability-runtime-summary.json
            runtime/perf/v2-stability-soak/**
            runtime/perf/release-baseline/**
          if-no-files-found: warn
