name: Production Evidence

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CONAN_HOME: ${{ github.workspace }}/../.conan2-local

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner JSON string or array, for example "ubuntu-latest" or ["self-hosted","production-evidence"]'
        required: true
        default: '["self-hosted","Linux","X64"]'
      configure_preset:
        description: "CMake configure preset"
        required: true
        default: "default"
      build_dir:
        description: "CMake build directory"
        required: true
        default: "build/default"
      configuration:
        description: "Build configuration"
        required: true
        default: "Debug"
      soak_profile:
        description: "Stability soak profile"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - short
          - medium
      baseline_profile:
        description: "Architecture gate profile"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release
      include_redis_live:
        description: "Run Redis live tests"
        required: true
        default: false
        type: boolean
      include_operator_kind:
        description: "Run Operator kind smoke"
        required: true
        default: false
        type: boolean
      include_settlement_replay:
        description: "Run multi-process settlement replay"
        required: true
        default: false
        type: boolean
      include_release_baseline:
        description: "Collect release baseline"
        required: true
        default: false
        type: boolean
      include_capacity_baseline:
        description: "Collect capacity baseline"
        required: true
        default: false
        type: boolean
      include_observability_runtime:
        description: "Run runtime HTTP observability checks"
        required: true
        default: false
        type: boolean
      perf_repetitions:
        description: "Repetitions per performance case"
        required: true
        default: "1"
      step_timeout_seconds:
        description: "Timeout for each P6 sub-gate"
        required: true
        default: "5400"
      conan_profile:
        description: "Repository Conan profile path for fixed-runner reproducibility preflight"
        required: true
        default: "conan/profiles/linux-gcc-x64"
      conan_lockfile:
        description: "Conan lockfile path relative to repo root for reproducible fixed-runner preflight"
        required: true
        default: "conan/locks/linux-gcc-x64-release-nogrpc-nosqlite.lock"
      conan_build_type:
        description: "Conan preflight build type; keep Release for the Linux nosqlite lockfile"
        required: true
        default: "Release"
        type: choice
        options:
          - Release

permissions:
  contents: read

jobs:
  production-evidence:
    runs-on: ${{ fromJSON(inputs.runner || vars.PRODUCTION_EVIDENCE_RUNNER || '["self-hosted","Linux","X64"]') }}
    timeout-minutes: 720
    concurrency:
      group: production-evidence-${{ inputs.runner || vars.PRODUCTION_EVIDENCE_RUNNER || 'self-hosted-linux-x64' }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/boostgateway-operator/go.mod
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<2.9"
          conan --version

      - name: Fixed runner preflight
        shell: bash
        run: |
          set -euo pipefail
          args=(
            scripts/check_fixed_runner_environment.py
            --profile production-evidence
            --build-dir "${{ inputs.build_dir || 'build/default' }}"
            --summary-path runtime/validation/fixed-runner-preflight-summary.json
          )
          if [ "${{ inputs.include_redis_live }}" = "true" ]; then
            args+=(--require-redis)
          fi
          if [ "${{ inputs.include_operator_kind }}" = "true" ]; then
            args+=(--require-kind)
          fi
          python "${args[@]}"

      - name: Conan lockfile install preflight
        shell: bash
        run: |
          set -euo pipefail
          python scripts/bootstrap_conan.py
          args=(conan install . --output-folder=build/conan-production-evidence --build=missing -s build_type=${{ inputs.conan_build_type || 'Release' }} --profile:host "${{ inputs.conan_profile }}" --profile:build "${{ inputs.conan_profile }}" -o "&:with_grpc=False" -o "&:with_sqlite=False")
          if [ -n "${{ inputs.conan_lockfile }}" ]; then
            test -f "${{ inputs.conan_lockfile }}"
            args+=(--lockfile "${{ inputs.conan_lockfile }}")
          fi
          "${args[@]}"

      - name: Configure Conan validation build
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build/conan-production-evidence-cmake -G Ninja \
            -DBOOST_USE_CONAN_DEPS=ON \
            -DENABLE_TESTING=OFF \
            -DCMAKE_BUILD_TYPE=${{ inputs.conan_build_type || 'Release' }} \
            -DCMAKE_TOOLCHAIN_FILE=build/conan-production-evidence/build/${{ inputs.conan_build_type || 'Release' }}/generators/conan_toolchain.cmake

      - name: Build Conan validation target
        run: cmake --build build/conan-production-evidence-cmake --parallel --target project_v2

      - name: Conan install for main build
        shell: bash
        run: |
          set -euo pipefail
          build_type="${{ inputs.configuration || 'Debug' }}"
          lockfile=conan/locks/linux-gcc-x64-debug-nogrpc-nosqlite.lock
          if [ "$build_type" = "Release" ]; then
            lockfile=conan/locks/linux-gcc-x64-release-nogrpc-nosqlite.lock
          fi
          conan install . \
            --output-folder=build/conan-production-main \
            --build=missing \
            -s build_type="$build_type" \
            --profile:host "${{ inputs.conan_profile }}" \
            --profile:build "${{ inputs.conan_profile }}" \
            --lockfile "$lockfile" \
            -o "&:with_grpc=False" \
            -o "&:with_sqlite=False"

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p runtime/validation
          build_type="${{ inputs.configuration || 'Debug' }}"
          cmake --preset "${{ inputs.configure_preset || 'default' }}" \
            -DBOOST_USE_CONAN_DEPS=ON \
            -DCMAKE_TOOLCHAIN_FILE="build/conan-production-main/build/${build_type}/generators/conan_toolchain.cmake" \
            2>&1 | tee runtime/validation/production-evidence-configure.log
          grep -F "Using Conan-provided dependency graph" runtime/validation/production-evidence-configure.log

      - name: Production evidence gate
        shell: bash
        run: |
          set -euo pipefail
          args=(
            scripts/verify_production_evidence_gate.py
            --build-dir "${{ inputs.build_dir || 'build/default' }}"
            --configuration "${{ inputs.configuration || 'Debug' }}"
            --soak-profile "${{ inputs.soak_profile || 'smoke' }}"
            --baseline-profile "${{ inputs.baseline_profile || 'debug' }}"
            --perf-repetitions "${{ inputs.perf_repetitions || '1' }}"
            --step-timeout-seconds "${{ inputs.step_timeout_seconds || '1200' }}"
            --summary-path runtime/validation/production-evidence-summary.json
          )
          if [ "${{ inputs.include_redis_live }}" = "true" ]; then
            args+=(--include-redis-live)
          fi
          if [ "${{ inputs.include_operator_kind }}" = "true" ]; then
            args+=(--include-operator-kind)
          fi
          if [ "${{ inputs.include_settlement_replay }}" = "true" ]; then
            args+=(--include-settlement-replay)
          fi
          if [ "${{ inputs.include_release_baseline }}" = "true" ]; then
            args+=(--include-release-baseline)
          fi
          if [ "${{ inputs.include_capacity_baseline }}" = "true" ]; then
            args+=(--include-capacity-baseline)
          fi
          python "${args[@]}"

      - name: R0 production candidate aggregate
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          args=(
            scripts/verify_production_candidate_evidence.py
            --build-dir "${{ inputs.build_dir || 'build/default' }}"
            --configuration "${{ inputs.configuration || 'Debug' }}"
            --skip-build
            --step-timeout-seconds "${{ inputs.step_timeout_seconds || '1200' }}"
            --summary-path runtime/validation/r0-production-candidate-evidence-summary.json
          )
          if [ "${{ inputs.include_redis_live }}" = "true" ]; then
            args+=(--include-redis-live)
          fi
          if [ "${{ inputs.include_operator_kind }}" = "true" ]; then
            args+=(--include-kind)
          fi
          if [ "${{ inputs.include_observability_runtime }}" = "true" ]; then
            args+=(--include-runtime-http)
          fi
          if [ "${{ inputs.include_release_baseline }}" = "true" ]; then
            args+=(--include-release-baseline)
          fi
          if [ "${{ inputs.include_capacity_baseline }}" = "true" ]; then
            args+=(--include-capacity-baseline)
          fi
          python "${args[@]}"

      - name: Observability runtime evidence
        if: inputs.include_observability_runtime
        shell: bash
        run: |
          set -euo pipefail
          python scripts/verify_observability_gate.py \
            --build-dir "${{ inputs.build_dir || 'build/default' }}" \
            --configuration "${{ inputs.configuration || 'Debug' }}" \
            --skip-build \
            --include-runtime-http \
            --summary-path runtime/validation/p2-observability-runtime-summary.json

      - name: Render production evidence summary
        if: always()
        shell: bash
        run: |
          summaries=()
          for path in \
            runtime/validation/fixed-runner-preflight-summary.json \
            runtime/validation/production-evidence-summary.json \
            runtime/validation/r0-production-candidate-evidence-summary.json \
            runtime/validation/p6-stability-soak-summary.json \
            runtime/validation/p6-data-recovery-summary.json \
            runtime/validation/p6-specialized-e2e-summary.json \
            runtime/validation/p6-candidate-audit-summary.json \
            runtime/validation/p6-release-baseline-summary.json \
            runtime/validation/p2-observability-runtime-summary.json \
            runtime/validation/gateway-observability-runtime-summary.json \
            runtime/perf/release-baseline/summary.json; do
            if [ -f "$path" ]; then
              summaries+=("$path")
            fi
          done
          if [ "${#summaries[@]}" -gt 0 ]; then
            python scripts/render_validation_summary.py "${summaries[@]}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-evidence-${{ github.run_id }}
          path: |
            runtime/validation/fixed-runner-preflight-summary.json
            runtime/validation/production-evidence-summary.json
            runtime/validation/r0-production-candidate-evidence-summary.json
            runtime/validation/r0-*-summary.json
            runtime/validation/p6-*-summary.json
            runtime/validation/p2-observability-runtime-summary.json
            runtime/validation/gateway-observability-runtime-summary.json
            runtime/perf/v2-stability-soak/**
            runtime/perf/release-baseline/**
          if-no-files-found: warn
