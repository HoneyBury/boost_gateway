name: Infrastructure / Redis, Raft & Operator E2E

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CONAN_HOME: ${{ github.workspace }}/../.conan2-local

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner JSON string or array, for example "ubuntu-latest" or ["self-hosted","Linux","X64"]'
        required: true
        default: '["self-hosted","Linux","X64"]'
      build_preset:
        description: "CMake configure preset"
        required: true
        default: "default"
      build_dir:
        description: "CMake build directory"
        required: true
        default: "build/default"
      configuration:
        description: "Build configuration"
        required: true
        default: "Debug"
      specialized_profile:
        description: "Specialized E2E profile: default, redis-live, raft-ha, all"
        required: true
        default: "default"
        type: choice
        options:
          - default
          - redis-live
          - raft-ha
          - all
      include_redis_live:
        description: "Run Redis live tests"
        required: true
        default: false
        type: boolean
      include_operator_kind:
        description: "Run Operator kind smoke"
        required: true
        default: false
        type: boolean
      enable_conan_validation:
        description: "Run an opt-in Conan dependency validation before specialized E2E"
        required: true
        default: true
        type: boolean
      conan_profile:
        description: "Repository Conan profile path used when Conan validation is enabled"
        required: true
        default: "conan/profiles/linux-gcc-x64"
      conan_lockfile:
        description: "Optional Conan lockfile path relative to repo root"
        required: true
        default: "conan/locks/linux-gcc-x64-debug-nogrpc-nosqlite.lock"
      use_existing_workspace:
        description: "Reuse an already-clean workspace at the workflow commit"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  specialized-e2e:
    runs-on: ${{ fromJSON(inputs.runner || vars.SPECIALIZED_E2E_RUNNER || '["self-hosted","Linux","X64"]') }}

    steps:
      - name: Checkout
        if: inputs.use_existing_workspace != true
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify existing workspace
        if: inputs.use_existing_workspace
        shell: bash
        run: |
          set -euo pipefail
          test -d .git
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test -z "$(git status --porcelain)"

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/boostgateway-operator/go.mod
      - name: Show CMake version
        run: cmake --version

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        if: inputs.enable_conan_validation
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<2.9"
          conan --version

      - name: Conan validation preflight
        if: inputs.enable_conan_validation
        shell: bash
        run: |
          set -euo pipefail
          python scripts/bootstrap_conan.py
          args=(conan install . --output-folder=build/conan-specialized --build=missing -s build_type=${{ inputs.configuration }} --profile:host "${{ inputs.conan_profile }}" --profile:build "${{ inputs.conan_profile }}" -o "&:with_grpc=False" -o "&:with_sqlite=False")
          if [ -n "${{ inputs.conan_lockfile }}" ]; then
            args+=(--lockfile "${{ inputs.conan_lockfile }}")
          fi
          "${args[@]}"
          cmake -S . -B build/conan-specialized-cmake -G Ninja \
            -DBOOST_USE_CONAN_DEPS=ON \
            -DENABLE_TESTING=OFF \
            -DCMAKE_BUILD_TYPE=${{ inputs.configuration }} \
            -DCMAKE_TOOLCHAIN_FILE=build/conan-specialized/build/${{ inputs.configuration }}/generators/conan_toolchain.cmake
          cmake --build build/conan-specialized-cmake --parallel --target project_v2

      - name: Fixed runner preflight
        shell: bash
        run: |
          set -euo pipefail
          args=(
            scripts/check_fixed_runner_environment.py
            --profile specialized-e2e
            --build-dir "${{ inputs.build_dir }}"
            --summary-path runtime/validation/fixed-runner-preflight-summary.json
          )
          if [ "${{ inputs.include_redis_live }}" = "true" ]; then
            args+=(--require-redis)
          fi
          if [ "${{ inputs.include_operator_kind }}" = "true" ]; then
            args+=(--require-kind)
          fi
          python "${args[@]}"

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p runtime/validation
          if [ "${{ inputs.enable_conan_validation }}" = "true" ]; then
            cmake --preset "${{ inputs.build_preset }}" \
              -DBOOST_USE_CONAN_DEPS=ON \
              -DCMAKE_TOOLCHAIN_FILE=build/conan-specialized/build/${{ inputs.configuration }}/generators/conan_toolchain.cmake \
              2>&1 | tee runtime/validation/specialized-e2e-configure.log
            grep -F "Using Conan-provided dependency graph" runtime/validation/specialized-e2e-configure.log
          else
            cmake --preset "${{ inputs.build_preset }}"
          fi

      - name: Specialized E2E
        shell: bash
        run: |
          set -euo pipefail
          args=(
            scripts/verify_specialized_e2e.py
            --build-dir "${{ inputs.build_dir }}"
            --configuration "${{ inputs.configuration }}"
            --profile "${{ inputs.specialized_profile }}"
            --summary-path runtime/validation/specialized-e2e-summary.json
          )
          if [ "${{ inputs.include_redis_live }}" = "true" ]; then
            args+=(--include-redis-live)
          fi
          if [ "${{ inputs.include_operator_kind }}" = "true" ]; then
            args+=(--include-operator-kind)
          fi
          python "${args[@]}"

      - name: Render specialized E2E summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          summaries=()
          for path in \
            runtime/validation/fixed-runner-preflight-summary.json \
            runtime/validation/specialized-e2e-summary.json; do
            if [ -f "$path" ]; then
              summaries+=("$path")
            fi
          done
          if [ "${#summaries[@]}" -gt 0 ]; then
            python scripts/render_validation_summary.py "${summaries[@]}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload specialized E2E summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specialized-e2e-${{ github.run_id }}
          path: |
            runtime/validation/fixed-runner-preflight-summary.json
            runtime/validation/specialized-e2e-summary.json
          if-no-files-found: warn
