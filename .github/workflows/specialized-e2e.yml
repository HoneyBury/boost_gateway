name: Infrastructure / Redis, Raft & Operator E2E

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BOOST_GATEWAY_CANDIDATE_REVISION: ${{ github.sha }}
  BOOST_GATEWAY_CONAN_LOCKFILE: ${{ inputs.conan_lockfile || 'conan/locks/linux-gcc-x64-release-nogrpc-nosqlite.lock' }}

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner JSON string or array, for example "ubuntu-latest" or ["self-hosted","Linux","X64"]'
        required: true
        default: '["self-hosted","Linux","X64"]'
      build_preset:
        description: "CMake configure preset"
        required: true
        default: "release"
      build_dir:
        description: "CMake build directory"
        required: true
        default: "build/release"
      configuration:
        description: "Build configuration"
        required: true
        default: "Release"
      specialized_profile:
        description: "Specialized E2E profile: default, redis-live, raft-ha, all"
        required: true
        default: "default"
        type: choice
        options:
          - default
          - redis-live
          - raft-ha
          - all
      include_redis_live:
        description: "Run Redis live tests"
        required: true
        default: false
        type: boolean
      include_operator_kind:
        description: "Run Operator kind smoke"
        required: true
        default: false
        type: boolean
      enable_conan_validation:
        description: "Run an opt-in Conan dependency validation before specialized E2E"
        required: true
        default: true
        type: boolean
      conan_profile:
        description: "Repository Conan profile path used when Conan validation is enabled"
        required: true
        default: "conan/profiles/linux-gcc-x64"
      conan_lockfile:
        description: "Optional Conan lockfile path relative to repo root"
        required: true
        default: "conan/locks/linux-gcc-x64-release-nogrpc-nosqlite.lock"
      use_existing_workspace:
        description: "Reuse an already-clean workspace at the workflow commit"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  specialized-e2e:
    runs-on: ${{ fromJSON(inputs.runner || vars.SPECIALIZED_E2E_RUNNER || '["self-hosted","Linux","X64"]') }}

    steps:
      - name: Normalize stale Go cache permissions
        if: inputs.use_existing_workspace != true
        shell: bash
        run: |
          set -euo pipefail
          cache="$GITHUB_WORKSPACE/runtime/go-cache"
          if [ -d "$cache" ]; then
            docker run --rm --pull=never --network=none \
              -v "$cache:/cache" ubuntu:24.04 chmod -R a+rwX /cache
          fi

      - name: Checkout
        if: inputs.use_existing_workspace != true
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify existing workspace
        if: inputs.use_existing_workspace
        shell: bash
        run: |
          set -euo pipefail
          test -d .git
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test -z "$(git status --porcelain)"

      - name: Setup Ninja
        if: runner.os != 'Linux' || runner.arch != 'ARM64'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/boostgateway-operator/go.mod
          cache-dependency-path: operator/boostgateway-operator/go.sum
      - name: Show CMake version
        run: cmake --version

      - name: Setup Python
        if: runner.os == 'Linux' && runner.arch != 'ARM64'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify pinned offline Conan virtual environment
        if: inputs.enable_conan_validation
        shell: bash
        run: |
          set -euo pipefail
          python scripts/tools/ensure_conan_venv.py \
            --venv /opt/boost-gateway/tools/conan-2.8.1-py3.12 \
            --conan-version 2.8.1 \
            --offline \
            --github-env "$GITHUB_ENV" \
            --github-path "$GITHUB_PATH"

      - name: Bootstrap pinned kind and kubectl
        if: inputs.include_operator_kind
        shell: bash
        run: |
          python scripts/tools/bootstrap_kind_tools.py \
            --install-dir "/opt/boost-gateway/tools/kubernetes-v0.32.0-v1.36.1" \
            --github-path "$GITHUB_PATH"

      - name: Resolve persistent runner caches
        if: inputs.enable_conan_validation
        shell: bash
        run: |
          set -euo pipefail
          python scripts/tools/resolve_runner_cache.py \
            --build-type "${{ inputs.configuration }}" \
            --profile "${{ inputs.conan_profile }}" \
            --lockfile "${{ inputs.conan_lockfile }}" \
            --github-env "$GITHUB_ENV" \
            --summary-path runtime/validation/runner-cache-identity.json

      - name: Conan validation preflight
        if: inputs.enable_conan_validation
        shell: bash
        run: |
          set -euo pipefail
          python scripts/bootstrap_conan.py --conan-home "$CONAN_HOME" --no-remote
          python scripts/tools/verify_conan_offline_install.py \
            --profile "${{ inputs.conan_profile }}" \
            --lockfile "$BOOST_GATEWAY_CONAN_LOCKFILE" \
            --output-folder build/conan-specialized \
            --build-type "${{ inputs.configuration }}" \
            --candidate-revision "$GITHUB_SHA" \
            --summary-path runtime/validation/raft-conan-offline-summary.json
          cmake -S . -B build/conan-specialized-cmake -G Ninja \
            -DBOOST_DEPENDENCY_PROVIDER=conan \
            -DENABLE_TESTING=OFF \
            -DCMAKE_BUILD_TYPE=${{ inputs.configuration }} \
            -DCMAKE_TOOLCHAIN_FILE=build/conan-specialized/build/${{ inputs.configuration }}/generators/conan_toolchain.cmake
          cmake --build build/conan-specialized-cmake --parallel --target project_v2

      - name: Fixed runner preflight
        shell: bash
        run: |
          set -euo pipefail
          args=(
            scripts/check_fixed_runner_environment.py
            --profile specialized-e2e
            --build-dir "${{ inputs.build_dir }}"
            --summary-path runtime/validation/fixed-runner-preflight-summary.json
          )
          if [ "${{ inputs.include_redis_live }}" = "true" ]; then
            args+=(--require-redis)
          fi
          if [ "${{ inputs.include_operator_kind }}" = "true" ]; then
            args+=(--require-kind)
          fi
          python "${args[@]}"

      - name: Raft data recovery evidence
        if: inputs.specialized_profile != 'redis-live'
        shell: bash
        run: |
          python scripts/verify_data_recovery_gate.py \
            --build-dir "${{ inputs.build_dir }}" \
            --configuration "${{ inputs.configuration }}" \
            --skip-build \
            --summary-path runtime/validation/raft-data-recovery-summary.json

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p runtime/validation
          if [ "${{ inputs.enable_conan_validation }}" = "true" ]; then
            cmake --preset "${{ inputs.build_preset }}" \
              -DBOOST_DEPENDENCY_PROVIDER=conan \
              -DCMAKE_TOOLCHAIN_FILE=build/conan-specialized/build/${{ inputs.configuration }}/generators/conan_toolchain.cmake \
              2>&1 | tee runtime/validation/specialized-e2e-configure.log
            grep -F "Using Conan-provided dependency graph" runtime/validation/specialized-e2e-configure.log
          else
            cmake --preset "${{ inputs.build_preset }}"
          fi

      - name: Specialized E2E
        shell: bash
        run: |
          set -euo pipefail
          args=(
            scripts/verify_specialized_e2e.py
            --build-dir "${{ inputs.build_dir }}"
            --configuration "${{ inputs.configuration }}"
            --profile "${{ inputs.specialized_profile }}"
            --summary-path runtime/validation/specialized-e2e-summary.json
          )
          if [ "${{ inputs.include_redis_live }}" = "true" ]; then
            args+=(--include-redis-live)
          fi
          if [ "${{ inputs.include_operator_kind }}" = "true" ]; then
            args+=(--include-operator-kind)
          fi
          python "${args[@]}"

      - name: Render specialized E2E summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          summaries=()
          for path in \
            runtime/validation/fixed-runner-preflight-summary.json \
            runtime/validation/raft-conan-offline-summary.json \
            runtime/validation/specialized-e2e-summary.json \
            runtime/validation/raft-data-recovery-summary.json; do
            if [ -f "$path" ]; then
              summaries+=("$path")
            fi
          done
          if [ "${#summaries[@]}" -gt 0 ]; then
            python scripts/render_validation_summary.py "${summaries[@]}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload specialized E2E summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specialized-e2e-${{ github.run_id }}
          path: |
            runtime/validation/fixed-runner-preflight-summary.json
            runtime/validation/raft-conan-offline-summary.json
            runtime/validation/specialized-e2e-summary.json
            runtime/validation/raft-data-recovery-summary.json
          if-no-files-found: warn
