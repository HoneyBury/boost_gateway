name: Specialized E2E

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner label"
        required: true
        default: "ubuntu-latest"
      build_preset:
        description: "CMake configure preset"
        required: true
        default: "default"
      build_dir:
        description: "CMake build directory"
        required: true
        default: "build/default"
      configuration:
        description: "Build configuration"
        required: true
        default: "Debug"
      include_redis_live:
        description: "Run Redis live tests"
        required: true
        default: false
        type: boolean
      include_operator_kind:
        description: "Run Operator kind smoke"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  specialized-e2e:
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/boostgateway-operator/go.mod

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Fixed runner preflight
        shell: bash
        run: |
          set -euo pipefail
          args=(
            scripts/check_fixed_runner_environment.py
            --profile specialized-e2e
            --build-dir "${{ inputs.build_dir }}"
          )
          if [ "${{ inputs.include_redis_live }}" = "true" ]; then
            args+=(--require-redis)
          fi
          if [ "${{ inputs.include_operator_kind }}" = "true" ]; then
            args+=(--require-kind)
          fi
          python "${args[@]}"

      - name: Configure
        run: cmake --preset ${{ inputs.build_preset }}

      - name: Specialized E2E
        shell: bash
        run: |
          set -euo pipefail
          args=(
            scripts/verify_specialized_e2e.py
            --build-dir "${{ inputs.build_dir }}"
            --configuration "${{ inputs.configuration }}"
            --summary-path runtime/validation/specialized-e2e-summary.json
          )
          if [ "${{ inputs.include_redis_live }}" = "true" ]; then
            args+=(--include-redis-live)
          fi
          if [ "${{ inputs.include_operator_kind }}" = "true" ]; then
            args+=(--include-operator-kind)
          fi
          python "${args[@]}"

      - name: Render specialized E2E summary
        if: always()
        shell: bash
        run: |
          if [ -f runtime/validation/specialized-e2e-summary.json ]; then
            python scripts/render_validation_summary.py runtime/validation/specialized-e2e-summary.json --title "Specialized E2E" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload specialized E2E summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specialized-e2e-${{ inputs.runner }}
          path: runtime/validation/specialized-e2e-summary.json
          if-no-files-found: warn
