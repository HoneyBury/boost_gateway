name: Specialized E2E

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CONAN_HOME: ${{ github.workspace }}/.conan2-local

on:
  workflow_dispatch:
    inputs:
      build_preset:
        description: "CMake configure preset"
        required: true
        default: "default"
      build_dir:
        description: "CMake build directory"
        required: true
        default: "build/default"
      configuration:
        description: "Build configuration"
        required: true
        default: "Debug"
      specialized_profile:
        description: "Specialized E2E profile: default, redis-live, raft-ha, all"
        required: true
        default: "default"
        type: choice
        options:
          - default
          - redis-live
          - raft-ha
          - all
      include_redis_live:
        description: "Run Redis live tests"
        required: true
        default: false
        type: boolean
      include_operator_kind:
        description: "Run Operator kind smoke"
        required: true
        default: false
        type: boolean
      enable_conan_validation:
        description: "Run an opt-in Conan dependency validation before specialized E2E"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  specialized-e2e:
    runs-on: ["self-hosted", "Windows", "X64"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 0

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/boostgateway-operator/go.mod

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Show CMake version
        run: cmake --version

      - name: Setup Python
        if: inputs.enable_conan_validation
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        if: inputs.enable_conan_validation
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install conan
          conan --version

      - name: Conan validation preflight
        if: inputs.enable_conan_validation
        shell: pwsh
        run: |
          python scripts/bootstrap_conan.py
          conan install . --output-folder=build/conan-specialized --build=missing -s build_type=${{ inputs.configuration }}
          cmake -S . -B build/windows-ninja-specialized-conan -G Ninja \
            -DBOOST_USE_CONAN_DEPS=ON \
            -DENABLE_TESTING=OFF \
            -DCMAKE_BUILD_TYPE=${{ inputs.configuration }} \
            -DCMAKE_TOOLCHAIN_FILE=build/conan-specialized/build/${{ inputs.configuration }}/generators/conan_toolchain.cmake
          cmake --build build/windows-ninja-specialized-conan --parallel --target project_v2

      - name: Fixed runner preflight
        shell: pwsh
        run: |
          $args = @(
            'scripts/check_fixed_runner_environment.py',
            '--profile', 'specialized-e2e',
            '--build-dir', '${{ inputs.build_dir }}',
            '--summary-path', 'runtime/validation/fixed-runner-preflight-summary.json'
          )
          if ('${{ inputs.include_redis_live }}' -eq 'true') {
            $args += '--require-redis'
          }
          if ('${{ inputs.include_operator_kind }}' -eq 'true') {
            $args += '--require-kind'
          }
          python @args

      - name: Configure
        run: cmake --preset ${{ inputs.build_preset }}

      - name: Specialized E2E
        shell: pwsh
        run: |
          $args = @(
            'scripts/verify_specialized_e2e.py',
            '--build-dir', '${{ inputs.build_dir }}',
            '--configuration', '${{ inputs.configuration }}',
            '--profile', '${{ inputs.specialized_profile }}',
            '--summary-path', 'runtime/validation/specialized-e2e-summary.json'
          )
          if ('${{ inputs.include_redis_live }}' -eq 'true') {
            $args += '--include-redis-live'
          }
          if ('${{ inputs.include_operator_kind }}' -eq 'true') {
            $args += '--include-operator-kind'
          }
          python @args

      - name: Render specialized E2E summary
        if: always()
        shell: pwsh
        run: |
          $summaries = @(
            'runtime/validation/fixed-runner-preflight-summary.json',
            'runtime/validation/specialized-e2e-summary.json'
          ) | Where-Object { Test-Path $_ }
          if ($summaries.Count -gt 0) {
            python scripts/render_validation_summary.py $summaries | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          fi

      - name: Upload specialized E2E summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specialized-e2e-windows
          path: |
            runtime/validation/fixed-runner-preflight-summary.json
            runtime/validation/specialized-e2e-summary.json
          if-no-files-found: warn
