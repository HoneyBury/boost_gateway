name: Production / Gate Diagnostics

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Native production platform"
        required: true
        default: linux-x64
        type: choice
        options:
          - linux-x64
          - linux-arm64
          - macos-arm64
      gate:
        description: "Production gate to run"
        required: true
        default: "p6-evidence"
        type: choice
        options:
          - p5-resilience
          - p6-evidence
      runner:
        description: 'Runner JSON string or array, for example "ubuntu-latest" or ["self-hosted","Linux","X64"]'
        required: false
        default: ""
      configuration:
        description: "Build configuration"
        required: true
        default: "Release"
        type: choice
        options:
          - Debug
          - Release
      soak_profile:
        description: "Stability soak profile"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - short
          - medium
      baseline_profile:
        description: "Architecture gate profile"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release
      include_redis_live:
        description: "Run Redis live checks"
        required: true
        default: false
        type: boolean
      include_operator_kind:
        description: "Run Operator kind checks"
        required: true
        default: false
        type: boolean
      include_runtime_http:
        description: "Run P5 runtime HTTP observability checks"
        required: true
        default: false
        type: boolean
      include_observability_runtime:
        description: "Run P6 runtime HTTP observability checks"
        required: true
        default: false
        type: boolean
      include_settlement_replay:
        description: "Run P6 multi-process settlement replay"
        required: true
        default: false
        type: boolean
      include_release_baseline:
        description: "Collect release baseline"
        required: true
        default: false
        type: boolean
      include_capacity_baseline:
        description: "Collect capacity baseline"
        required: true
        default: false
        type: boolean
      perf_repetitions:
        description: "Repetitions per performance case"
        required: true
        default: "1"
      step_timeout_seconds:
        description: "Timeout for each production sub-gate"
        required: true
        default: "5400"
      kind_timeout_seconds:
        description: "Timeout for P5 kind rollout/delete checks"
        required: true
        default: "1200"
      conan_build_type:
        description: "Conan preflight build type; keep Release for the Linux nosqlite lockfile"
        required: true
        default: "Release"
        type: choice
        options:
          - Release

permissions:
  contents: read

jobs:
  production-gates:
    runs-on: ${{ fromJSON(inputs.runner || (inputs.platform == 'linux-x64' && '["self-hosted","Linux","X64","node-aoi-omen-gaming-laptop-16-am0xxx"]' || inputs.platform == 'linux-arm64' && '["self-hosted","Linux","ARM64","node-honeybury-m4-linux-arm64"]' || '["self-hosted","macOS","ARM64","macos-arm64-candidate"]')) }}
    timeout-minutes: 720
    concurrency:
      group: production-gates-${{ inputs.platform }}-${{ inputs.gate }}-${{ inputs.runner || vars.PRODUCTION_GATES_RUNNER || 'fixed-runner' }}
      cancel-in-progress: false

    steps:
      - name: Normalize stale Go cache permissions
        if: inputs.platform != 'macos-arm64'
        shell: bash
        run: |
          set -euo pipefail
          cache="$GITHUB_WORKSPACE/runtime/go-cache"
          if [ -d "$cache" ]; then
            docker run --rm --pull=never --network=none \
              -v "$cache:/cache" ubuntu:24.04 chmod -R a+rwX /cache
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve native production platform
        uses: ./.github/actions/resolve-production-platform
        with:
          platform: ${{ inputs.platform }}
          build-type: ${{ inputs.configuration }}

      - name: Reject Linux-only gate capabilities on macOS
        if: inputs.platform == 'macos-arm64'
        shell: bash
        run: test "${{ inputs.include_operator_kind }}" != true

      - name: Setup C++ Conan toolchain
        uses: ./.github/actions/setup-cpp-conan
        with:
          bootstrap-args: "--no-remote"
          conan-venv-offline: "true"
          conan-venv: ${{ env.BOOST_GATEWAY_CONAN_VENV }}
          cache-root: ${{ env.PRODUCTION_CACHE_ROOT }}
          cache-build-type: Release
          cache-profile: ${{ env.PRODUCTION_CONAN_PROFILE }}
          cache-lockfile: ${{ env.PRODUCTION_RELEASE_LOCKFILE }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/boostgateway-operator/go.mod
          cache-dependency-path: operator/boostgateway-operator/go.sum

      - name: Fixed runner preflight
        shell: bash
        run: |
          set -euo pipefail
          profile=production-evidence
          if [ "${{ inputs.gate }}" = "p5-resilience" ]; then
            profile=production-resilience
          fi
          args=(
            scripts/gates/infrastructure/check_fixed_runner_environment.py
            --profile "$profile"
            --build-dir "$PRODUCTION_BUILD_DIR"
            --summary-path runtime/validation/fixed-runner-preflight-summary.json
          )
          if [ "${{ inputs.include_redis_live }}" = "true" ]; then
            args+=(--require-redis)
          fi
          if [ "${{ inputs.include_operator_kind }}" = "true" ]; then
            args+=(--require-kind)
          fi
          python3 "${args[@]}"

      - name: Conan lockfile install preflight
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/bootstrap_conan.py --conan-home "$CONAN_HOME" --no-remote
          test "${{ inputs.conan_build_type || 'Release' }}" = Release
          args=(conan install . --output-folder=build/conan-production-gates --build=never --no-remote -s build_type=Release --profile:host "$PRODUCTION_CONAN_PROFILE" --profile:build "$PRODUCTION_CONAN_PROFILE" --lockfile "$PRODUCTION_RELEASE_LOCKFILE" -o "&:with_grpc=False" -o "&:with_raft_protobuf=True" -o "&:with_sqlite=False")
          "${args[@]}"

      - name: Configure Conan validation build
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build/conan-production-gates-cmake -G Ninja \
            -DBOOST_DEPENDENCY_PROVIDER=conan \
            -DENABLE_TESTING=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=build/conan-production-gates/build/Release/generators/conan_toolchain.cmake

      - name: Build Conan validation target
        run: cmake --build build/conan-production-gates-cmake --parallel --target project_v2

      # A diagnostic build can explicitly select Debug while its required Conan
      # preflight is Release; use its own OS/compiler/build-type namespace.
      - name: Resolve main-build persistent runner cache
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/tools/resolve_runner_cache.py \
            --build-type "$PRODUCTION_BUILD_TYPE" \
            --profile "$PRODUCTION_CONAN_PROFILE" \
            --lockfile "$PRODUCTION_CONAN_LOCKFILE" \
            --cache-root "$PRODUCTION_CACHE_ROOT" \
            --github-env "$GITHUB_ENV" \
            --summary-path runtime/validation/runner-cache-main-identity.json

      - name: Conan install for main build
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/bootstrap_conan.py --conan-home "$CONAN_HOME" --no-remote
          conan install . \
            --output-folder=build/conan-production-main \
            --build=never \
            --no-remote \
            -s build_type="$PRODUCTION_BUILD_TYPE" \
            --profile:host "$PRODUCTION_CONAN_PROFILE" \
            --profile:build "$PRODUCTION_CONAN_PROFILE" \
            --lockfile "$PRODUCTION_CONAN_LOCKFILE" \
            -o "&:with_grpc=False" \
            -o "&:with_raft_protobuf=True" \
            -o "&:with_sqlite=False"

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p runtime/validation
          # Each Conan install emits this generated user preset. This job performs
          # two installs, so avoid importing stale duplicate Conan presets.
          rm -f CMakeUserPresets.json
          cmake --preset "$PRODUCTION_CONFIGURE_PRESET" \
            -DBOOST_DEPENDENCY_PROVIDER=conan \
            -DCMAKE_TOOLCHAIN_FILE="build/conan-production-main/build/${PRODUCTION_BUILD_TYPE}/generators/conan_toolchain.cmake" \
            2>&1 | tee runtime/validation/production-gates-configure.log
          grep -F "Using Conan-provided dependency graph" runtime/validation/production-gates-configure.log

      - name: P5 production resilience gate
        if: inputs.gate == 'p5-resilience'
        shell: bash
        run: |
          set -euo pipefail
          args=(
            scripts/gates/production/verify_production_resilience_gate.py
            --build-dir "$PRODUCTION_BUILD_DIR"
            --configuration "$PRODUCTION_BUILD_TYPE"
            --soak-profile "${{ inputs.soak_profile || 'smoke' }}"
            --baseline-profile "${{ inputs.baseline_profile || 'release' }}"
            --perf-repetitions "${{ inputs.perf_repetitions || '1' }}"
            --step-timeout-seconds "${{ inputs.step_timeout_seconds || '1200' }}"
            --kind-timeout-seconds "${{ inputs.kind_timeout_seconds || '1200' }}"
            --summary-path runtime/validation/production-resilience-summary.json
          )
          if [ "${{ inputs.include_redis_live }}" = "true" ]; then
            args+=(--include-redis-live)
          fi
          if [ "${{ inputs.include_operator_kind }}" = "true" ]; then
            args+=(--include-operator-kind)
          fi
          if [ "${{ inputs.include_runtime_http }}" = "true" ]; then
            args+=(--include-runtime-http)
          fi
          if [ "${{ inputs.include_release_baseline }}" = "true" ]; then
            args+=(--include-release-baseline)
          fi
          if [ "${{ inputs.include_capacity_baseline }}" = "true" ]; then
            args+=(--include-capacity-baseline)
          fi
          python3 "${args[@]}"

      - name: P6 production evidence gate
        if: inputs.gate == 'p6-evidence'
        shell: bash
        run: |
          set -euo pipefail
          args=(
            scripts/gates/production/verify_production_evidence_gate.py
            --build-dir "$PRODUCTION_BUILD_DIR"
            --configuration "$PRODUCTION_BUILD_TYPE"
            --soak-profile "${{ inputs.soak_profile || 'smoke' }}"
            --baseline-profile "${{ inputs.baseline_profile || 'release' }}"
            --perf-repetitions "${{ inputs.perf_repetitions || '1' }}"
            --step-timeout-seconds "${{ inputs.step_timeout_seconds || '1200' }}"
            --summary-path runtime/validation/production-evidence-summary.json
          )
          if [ "${{ inputs.include_redis_live }}" = "true" ]; then
            args+=(--include-redis-live)
          fi
          if [ "${{ inputs.include_operator_kind }}" = "true" ]; then
            args+=(--include-operator-kind)
          fi
          if [ "${{ inputs.include_settlement_replay }}" = "true" ]; then
            args+=(--include-settlement-replay)
          fi
          if [ "${{ inputs.include_release_baseline }}" = "true" ]; then
            args+=(--include-release-baseline)
          fi
          if [ "${{ inputs.include_capacity_baseline }}" = "true" ]; then
            args+=(--include-capacity-baseline)
          fi
          python3 "${args[@]}"

      - name: Observability runtime evidence
        if: inputs.gate == 'p6-evidence' && inputs.include_observability_runtime
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/gates/production/verify_observability_gate.py \
            --build-dir "$PRODUCTION_BUILD_DIR" \
            --configuration "$PRODUCTION_BUILD_TYPE" \
            --skip-build \
            --include-runtime-http \
            --summary-path runtime/validation/p2-observability-runtime-summary.json

      - name: Render production gate summary
        if: always()
        shell: bash
        run: |
          summaries=()
          for path in \
            runtime/validation/fixed-runner-preflight-summary.json \
            runtime/validation/production-resilience-summary.json \
            runtime/validation/production-evidence-summary.json \
            runtime/validation/p5-long-soak-summary.json \
            runtime/validation/p5-fault-data-recovery-summary.json \
            runtime/validation/p5-specialized-failure-summary.json \
            runtime/validation/p5-runtime-observability-summary.json \
            runtime/validation/p5-control-plane-kind-summary.json \
            runtime/validation/p5-release-baseline-summary.json \
            runtime/validation/p6-stability-soak-summary.json \
            runtime/validation/p6-data-recovery-summary.json \
            runtime/validation/p6-specialized-e2e-summary.json \
            runtime/validation/p6-candidate-audit-summary.json \
            runtime/validation/p6-release-baseline-summary.json \
            runtime/validation/p2-observability-runtime-summary.json \
            runtime/validation/gateway-observability-runtime-summary.json \
            runtime/perf/release-baseline/summary.json; do
            if [ -f "$path" ]; then
              summaries+=("$path")
            fi
          done
          if [ "${#summaries[@]}" -gt 0 ]; then
            python3 scripts/tools/render_validation_summary.py "${summaries[@]}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload production gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-gates-${{ inputs.platform }}-${{ inputs.gate }}-${{ github.run_id }}
          path: |
            runtime/validation/fixed-runner-preflight-summary.json
            runtime/validation/production-resilience-summary.json
            runtime/validation/production-evidence-summary.json
            runtime/validation/p5-*-summary.json
            runtime/validation/p6-*-summary.json
            runtime/validation/p2-observability-runtime-summary.json
            runtime/validation/gateway-observability-runtime-summary.json
            runtime/validation/production-platform-summary.json
            runtime/perf/v2-stability-soak/**
            runtime/perf/release-baseline/**
          if-no-files-found: warn
