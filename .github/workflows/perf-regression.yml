name: Performance Regression

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SCCACHE_DIR: ${{ github.workspace }}/.sccache
  CONAN_HOME: ${{ github.workspace }}/../.conan2-local

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner JSON string or array, for example "ubuntu-latest" or ["self-hosted","Linux","X64"]'
        required: true
        default: '["self-hosted","Linux","X64"]'
      perf_preset:
        description: "Performance baseline preset"
        required: true
        default: "baseline"
        type: choice
        options:
          - smoke
          - baseline
          - capacity
      perf_repetitions:
        description: "Number of repetitions per case"
        required: true
        default: "1"
        type: choice
        options:
          - "1"
          - "3"

permissions:
  contents: read
  actions: read

jobs:
  perf-regression:
    runs-on: ${{ fromJSON(inputs.runner || vars.PERF_REGRESSION_RUNNER || '["self-hosted","Linux","X64"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<2.9"
          conan --version

      - name: Bootstrap Conan home
        shell: bash
        run: python scripts/bootstrap_conan.py --allow-public --disable-example-internal

      - name: Conan install
        shell: bash
        run: |
          set -euo pipefail
          conan install . \
            --profile:host conan/profiles/linux-gcc-x64 \
            --profile:build conan/profiles/linux-gcc-x64 \
            --lockfile conan/locks/linux-gcc-x64-release-nogrpc-nosqlite.lock \
            -o "&:with_grpc=False" \
            -o "&:with_sqlite=False" \
            --output-folder=build/conan-perf-regression \
            --build=missing \
            -s build_type=Release

      - name: Install sccache
        shell: bash
        run: |
          set -euo pipefail
          sccache --version || sudo apt-get install -y sccache
          echo "SCCACHE_BIN=$(command -v sccache)" >> "$GITHUB_ENV"
          mkdir -p "$SCCACHE_DIR"
          sccache --version

      - name: Restore sccache cache
        id: restore-sccache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{ runner.os }}-perf-regression-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**') }}-${{ github.sha }}
          restore-keys: |
            sccache-${{ runner.os }}-perf-regression-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**') }}-
            sccache-${{ runner.os }}-perf-regression-
            sccache-${{ runner.os }}-

      - name: Reset sccache stats
        shell: bash
        run: sccache --zero-stats || true

      - name: Configure (Release)
        shell: bash
        run: |
          set -euo pipefail
          : "${SCCACHE_BIN:?missing sccache path}"
          mkdir -p runtime/validation
          cmake --preset release \
            -DBOOST_USE_CONAN_DEPS=ON \
            -DCMAKE_TOOLCHAIN_FILE=build/conan-perf-regression/build/Release/generators/conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER="$SCCACHE_BIN" \
            -DCMAKE_CXX_COMPILER_LAUNCHER="$SCCACHE_BIN" \
            2>&1 | tee runtime/validation/perf-regression-configure.log

      - name: Verify Conan dependency provider
        shell: bash
        run: |
          grep -F "Using Conan-provided dependency graph" runtime/validation/perf-regression-configure.log

      - name: Verify sccache wiring
        shell: bash
        run: |
          : "${SCCACHE_BIN:?missing sccache path}"
          grep -F -n "$SCCACHE_BIN" build/release/CMakeCache.txt build/release/build.ninja

      - name: Record build start time
        shell: bash
        run: echo "BUILD_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build (Release)
        shell: bash
        run: |
          cmake --build --preset release --parallel
          mkdir -p runtime/perf/build-times
          sccache --show-stats --stats-format json > runtime/perf/build-times/sccache-stats.json

      - name: Run performance baseline
        id: perf
        shell: bash
        env:
          V2_RATE_LIMIT_CONNECTION: "100000"
          V2_RATE_LIMIT_MESSAGE_TYPE: "200000"
          V2_RATE_LIMIT_IP: "200000"
          V2_RATE_LIMIT_USER: "100000"
          V2_RATE_LIMIT_LOGIN: "50000"
        run: |
          OUTPUT_DIR="runtime/perf/ci-regression-$(date +%Y%m%d-%H%M%S)"
          python scripts/collect_v2_perf_baseline.py \
            --build-dir build/release \
            --run-preset ${{ inputs.perf_preset || 'baseline' }} \
            --repetitions ${{ inputs.perf_repetitions || '1' }} \
            --output-root "$OUTPUT_DIR" \
            2>&1 | tee perf_run.log

          echo "output_dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Evaluate performance gates
        id: gates
        shell: bash
        run: |
          SUMMARY_PATH="$(find runtime/perf -name 'summary.json' -type f | head -1)"
          if [ -z "$SUMMARY_PATH" ]; then
            echo "No summary.json found - performance run may have failed."
            exit 1
          fi

          GATES_FILE="config/perf/v2_arch_baseline_gates.json"
          SUMMARY_PATH="$SUMMARY_PATH" GATES_FILE="$GATES_FILE" GITHUB_STEP_SUMMARY="$GITHUB_STEP_SUMMARY" python - <<'PY'
          import json
          import os
          import sys

          with open(os.environ["SUMMARY_PATH"], encoding="utf-8") as f:
              summary = json.load(f)
          with open(os.environ["GATES_FILE"], encoding="utf-8") as f:
              gates_config = json.load(f)

          scenario_gates = gates_config.get("scenario_gates", {})
          aggregates = summary.get("case_aggregates", [])
          exit_code = 0
          report_lines = ["## Performance Gate Results", ""]
          report_lines.append("| Case | Metric | Observed | Warning | Critical | Verdict |")
          report_lines.append("| --- | --- | ---: | ---: | ---: | --- |")

          for agg in aggregates:
              case_name = agg.get("case_name", "")
              p99_ms = agg.get("latency_p99_ms", {}).get("median", 0)
              p99_us = p99_ms * 1000

              if "echo" in case_name:
                  gate = scenario_gates.get("echo_p99_us", {})
              elif "login" in case_name:
                  gate = scenario_gates.get("login_p99_us", {})
              elif "battle" in case_name:
                  gate = scenario_gates.get("battle_broadcast_p99_us", {})
              else:
                  continue

              warning_threshold = gate.get("warning", float("inf"))
              critical_threshold = gate.get("critical", float("inf"))

              if p99_us >= critical_threshold:
                  verdict = "FAIL (critical)"
                  exit_code = 1
              elif p99_us >= warning_threshold:
                  verdict = "WARN"
              else:
                  verdict = "PASS"

              report_lines.append(
                  f"| {case_name} | P99 | {p99_us:.0f}us | {warning_threshold}us | "
                  f"{critical_threshold}us | {verdict} |"
              )

          report = "\n".join(report_lines)
          print(report)

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as outf:
              outf.write(report + "\n")

          sys.exit(exit_code)
          PY
        continue-on-error: true

      - name: Generate performance report
        if: always()
        shell: bash
        run: |
          SUMMARY_PATH="$(find runtime/perf -name 'summary.json' -type f | head -1)"
          if [ -n "$SUMMARY_PATH" ]; then
            REPORT_DIR="$(dirname "$SUMMARY_PATH")"
            echo "## Performance Regression Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Workflow**: ${{ github.workflow }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **OS**: linux" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Preset**: ${{ inputs.perf_preset || 'baseline' }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Repetitions**: ${{ inputs.perf_repetitions || '1' }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Report**: See artifact \`perf-report\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            if [ -f "$REPORT_DIR/report.md" ]; then
              cat "$REPORT_DIR/report.md" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report
          path: |
            runtime/perf/**
            perf_run.log
          if-no-files-found: warn

      - name: Show sccache stats
        if: always()
        shell: bash
        run: |
          if [ -f runtime/perf/build-times/sccache-stats.json ]; then
            cat runtime/perf/build-times/sccache-stats.json
          else
            sccache --show-stats || true
          fi

      - name: Capture build metrics
        if: always()
        shell: bash
        run: |
          mkdir -p runtime/perf/build-times
          now=$(date +%s)
          iso_now=$(date -Iseconds)
          duration=$(( now - BUILD_START_EPOCH ))
          cat > runtime/perf/build-times/build-time.json << EOF
          {
            "workflow": "perf-regression",
            "runner_os": "${{ runner.os }}",
            "timestamp": "${iso_now}",
            "build_duration_seconds": ${duration}
          }
          EOF

      - name: Save sccache cache
        if: always() && steps.restore-sccache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{ runner.os }}-perf-regression-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**') }}-${{ github.sha }}
