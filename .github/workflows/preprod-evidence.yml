name: Production / Preproduction Evidence

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BOOST_GATEWAY_CANDIDATE_REVISION: ${{ github.sha }}

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Native Linux production platform"
        required: true
        default: linux-x64
        type: choice
        options:
          - linux-x64
          - linux-arm64
      runner:
        description: 'Runner JSON string or array, for example "ubuntu-latest" or ["self-hosted","Linux","X64"]'
        required: false
        default: ""
      build_parallelism:
        description: "Maximum concurrent C++ build jobs; use 2 on 8GiB/no-swap runners"
        required: true
        default: "2"
      recovery_mode:
        description: "R5 recovery drill mode; docker-compose is required for pre-production evidence"
        required: true
        default: "docker-compose"
        type: choice
        options:
          - docker-compose
          - bounded-local
      recovery_timeout_seconds:
        description: "Timeout for each R5 recovery operation"
        required: true
        default: "300"
      include_redis_recovery:
        description: "Stop Redis, require SDK degradation, then verify data and SDK recovery"
        required: true
        default: false
        type: boolean
      verify_redis_alert_transition:
        description: "Verify leaderboard Redis dependency alert inactive, pending, firing, then resolved"
        required: true
        default: false
        type: boolean
      redis_alert_firing_timeout_seconds:
        description: "Maximum Redis fault duration while waiting for the dependency alert to fire"
        required: true
        default: "240"
      docker_pull_policy:
        description: "R5 image policy: missing reuses cache, never is fully offline, always refreshes"
        required: true
        default: "never"
        type: choice
        options:
          - missing
          - never
          - always
      docker_pull_attempts:
        description: "Attempts for each R5 registry pull"
        required: true
        default: "3"
      tls_runs:
        description: "Number of R6 TLS readiness passes"
        required: true
        default: "2"
      tls_timeout_seconds:
        description: "Timeout for each R6 TLS readiness pass"
        required: true
        default: "240"

permissions:
  contents: read

jobs:
  preprod-evidence:
    runs-on: ${{ fromJSON(inputs.runner || (inputs.platform == 'linux-x64' && '["self-hosted","Linux","X64","node-aoi-omen-gaming-laptop-16-am0xxx"]' || '["self-hosted","Linux","ARM64","node-honeybury-m4-linux-arm64"]')) }}
    timeout-minutes: 180
    concurrency:
      group: preprod-evidence-${{ inputs.platform }}-${{ inputs.runner || 'fixed-runner' }}
      cancel-in-progress: false

    steps:
      - name: Normalize stale Go cache permissions
        shell: bash
        run: |
          set -euo pipefail
          cache="$GITHUB_WORKSPACE/runtime/go-cache"
          if [ -d "$cache" ]; then
            docker run --rm --pull=never --network=none \
              -v "$cache:/cache" ubuntu:24.04 chmod -R a+rwX /cache
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve native production platform
        uses: ./.github/actions/resolve-production-platform
        with:
          platform: ${{ inputs.platform }}
          build-type: Release

      - name: Setup Ninja
        if: runner.os != 'Linux' || runner.arch != 'ARM64'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        if: runner.os != 'Linux' || runner.arch != 'ARM64'
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup Python
        if: runner.os == 'Linux' && runner.arch != 'ARM64'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify isolated Conan
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/tools/ensure_conan_venv.py \
            --venv "$BOOST_GATEWAY_CONAN_VENV" \
            --conan-version 2.8.1 \
            --offline \
            --github-env "$GITHUB_ENV" \
            --github-path "$GITHUB_PATH"
          "$BOOST_GATEWAY_CONAN_VENV/bin/conan" --version

      - name: Resolve persistent runner caches
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/tools/resolve_runner_cache.py \
            --build-type Release \
            --profile "$PRODUCTION_CONAN_PROFILE" \
            --lockfile "$PRODUCTION_RELEASE_LOCKFILE" \
            --cache-root "$PRODUCTION_CACHE_ROOT" \
            --github-env "$GITHUB_ENV" \
            --summary-path runtime/validation/runner-cache-identity.json

      - name: Setup Docker Compose
        uses: docker/setup-compose-action@v1

      - name: Verify Docker Compose
        shell: bash
        run: |
          set -euo pipefail
          if docker compose version; then
            exit 0
          fi
          docker-compose version

      - name: Fixed runner preflight
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/gates/infrastructure/check_fixed_runner_environment.py \
            --profile production-evidence \
            --build-dir "$PRODUCTION_BUILD_DIR" \
            --summary-path "${{ github.workspace }}/runtime/validation/preprod-evidence-preflight-summary.json"

      - name: Conan lockfile install
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/bootstrap_conan.py --conan-home "$CONAN_HOME" --no-remote
          conan install . \
            --output-folder=build/conan-preprod-evidence \
            --build=never \
            --no-remote \
            -s build_type=Release \
            --profile:host "$PRODUCTION_CONAN_PROFILE" \
            --profile:build "$PRODUCTION_CONAN_PROFILE" \
            --lockfile "$PRODUCTION_RELEASE_LOCKFILE" \
            -o "&:with_grpc=False" \
            -o "&:with_raft_protobuf=True" \
            -o "&:with_sqlite=False"

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p runtime/validation
          cmake --preset "$PRODUCTION_CONFIGURE_PRESET" \
            -DBOOST_DEPENDENCY_PROVIDER=conan \
            -DCMAKE_TOOLCHAIN_FILE=build/conan-preprod-evidence/build/Release/generators/conan_toolchain.cmake \
            2>&1 | tee runtime/validation/preprod-evidence-configure.log
          grep -F "Using Conan-provided dependency graph" runtime/validation/preprod-evidence-configure.log

      - name: Build validation targets
        run: cmake --build "$PRODUCTION_BUILD_DIR" --config Release --parallel ${{ inputs.build_parallelism || '2' }}

      - name: Stage and build candidate Docker images
        shell: bash
        run: |
          set -euo pipefail
          if ! git diff --quiet || ! git diff --cached --quiet || \
             [ -n "$(git ls-files --others --exclude-standard)" ]; then
            echo "candidate worktree changed during build; refusing Docker evidence staging" >&2
            git status --short >&2
            git diff --stat >&2
            exit 1
          fi
          if [ "${{ inputs.docker_pull_policy || 'never' }}" = "never" ]; then
            docker image inspect ubuntu:24.04 >/dev/null
          fi
          python3 scripts/tools/prepare_docker_runtime_context.py \
            --build-dir "$PRODUCTION_BUILD_DIR" \
            --configuration Release \
            --lockfile "$PRODUCTION_RELEASE_LOCKFILE"
          DOCKER_DEFAULT_PLATFORM="$PRODUCTION_DOCKER_PLATFORM" docker compose \
            -f env/docker/docker-compose.yml \
            build --pull=false

      - name: R5 pre-production recovery drill
        shell: bash
        run: |
          set -euo pipefail
          args=(python scripts/verify_preprod_recovery_drill.py \
            --build-dir "$PRODUCTION_BUILD_DIR" \
            --configuration Release \
            --mode "${{ inputs.recovery_mode }}" \
            --step-timeout-seconds "${{ inputs.recovery_timeout_seconds }}" \
            --docker-pull-policy "${{ inputs.docker_pull_policy || 'never' }}" \
            --docker-pull-attempts "${{ inputs.docker_pull_attempts || '3' }}" \
            --docker-target-platform "$PRODUCTION_DOCKER_PLATFORM" \
            --candidate-revision "$BOOST_GATEWAY_CANDIDATE_REVISION" \
            --image-preflight-summary-path runtime/validation/r5-docker-image-preflight-summary.json \
            --summary-path runtime/validation/preprod-recovery-drill-summary.json)
          if [ "${{ inputs.include_redis_recovery }}" = "true" ] || \
             [ "${{ inputs.verify_redis_alert_transition }}" = "true" ]; then
            args+=(--include-redis-recovery)
          fi
          if [ "${{ inputs.verify_redis_alert_transition }}" = "true" ]; then
            args+=(--verify-redis-alert-transition \
              --redis-alert-firing-timeout-seconds "${{ inputs.redis_alert_firing_timeout_seconds || '240' }}")
          fi
          "${args[@]}"

      - name: R6 TLS pre-production multi-run
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/verify_tls_preprod_multi_run.py \
            --build-dir "$PRODUCTION_BUILD_DIR" \
            --configuration Release \
            --skip-build \
            --runs "${{ inputs.tls_runs }}" \
            --step-timeout-seconds "${{ inputs.tls_timeout_seconds }}" \
            --summary-path runtime/validation/tls-preprod-multi-run-summary.json

      - name: Render pre-production summary
        if: always()
        shell: bash
        run: |
          summaries=()
          for path in runtime/validation/runner-cache-identity.json runtime/validation/preprod-evidence-preflight-summary.json runtime/validation/preprod-recovery-drill-summary.json runtime/validation/tls-preprod-multi-run-summary.json; do
            if [ -f "$path" ]; then summaries+=("$path"); fi
          done
          if [ "${#summaries[@]}" -gt 0 ]; then
            python3 scripts/tools/render_validation_summary.py "${summaries[@]}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload pre-production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preprod-evidence-${{ inputs.platform }}-${{ github.run_id }}
          path: |
            runtime/validation/preprod-evidence-*-summary.json
            runtime/validation/runner-cache-identity.json
            runtime/validation/production-platform-summary.json
            runtime/validation/preprod-recovery-drill-summary.json
            runtime/validation/r5-docker-image-preflight-summary.json
            runtime/validation/r5-*-summary.json
            runtime/validation/r5-redis-alert-runtime-summary.json
            runtime/validation/r5-preprod-recovery-drill-record.json
            runtime/validation/monitoring-operability-summary.json
            runtime/validation/tls-preprod-multi-run-summary.json
            runtime/validation/r6-*.json
            runtime/tls-preprod/**
            runtime/perf/docker-production-snapshot/**
          retention-days: 90
          if-no-files-found: warn
