name: Release / Published Asset Verification

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RELEASE_TAG: ${{ inputs.tag }}
  EXPECTED_COMMIT: ${{ inputs.expected_commit }}

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Published production platform"
        required: true
        default: linux-x64
        type: choice
        options:
          - linux-x64
          - linux-arm64
          - macos-arm64
      tag:
        description: "Published release tag"
        required: true
        default: "v3.5.2"
      expected_commit:
        description: "Full commit SHA referenced by the tag"
        required: true
      runner:
        description: "Runner JSON string or array"
        required: false
        default: ""

permissions:
  contents: read
  attestations: read

jobs:
  verify-published-assets:
    runs-on: ${{ fromJSON(inputs.runner || (inputs.platform == 'linux-x64' && '["self-hosted","Linux","X64","node-aoi-omen-gaming-laptop-16-am0xxx"]' || inputs.platform == 'linux-arm64' && '["self-hosted","Linux","ARM64","node-honeybury-m4-linux-arm64"]' || '["self-hosted","macOS","ARM64","macos-arm64-candidate"]')) }}
    timeout-minutes: 30

    steps:
      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]]

      - name: Normalize stale Go cache permissions
        if: inputs.platform != 'macos-arm64'
        shell: bash
        run: |
          set -euo pipefail
          cache="$GITHUB_WORKSPACE/runtime/go-cache"
          if [ -d "$cache" ]; then
            docker run --rm --pull=never --network=none \
              -v "$cache:/cache" ubuntu:24.04 chmod -R a+rwX /cache
          fi

      - name: Checkout verification scripts from release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Resolve native production platform
        uses: ./.github/actions/resolve-production-platform
        with:
          platform: ${{ inputs.platform }}
          build-type: Release

      - name: Resolve published SDK and symbol assets
        shell: bash
        run: |
          set -euo pipefail
          case "$PRODUCTION_PLATFORM" in
            linux-x64)
              rid=linux-x64
              wheel=boost_gateway_sdk-4.2.0-py3-none-manylinux_2_35_x86_64.whl
              symbol=boost-gateway-${RELEASE_TAG}-linux-x64-debug-symbols.tar.gz
              ;;
            linux-arm64)
              rid=linux-arm64
              wheel=boost_gateway_sdk-4.2.0-py3-none-manylinux_2_39_aarch64.whl
              symbol=boost-gateway-${RELEASE_TAG}-linux-arm64-debug-symbols.tar.gz
              ;;
            macos-arm64)
              rid=osx-arm64
              wheel=boost_gateway_sdk-4.2.0-py3-none-macosx_26_0_arm64.whl
              symbol=boost-gateway-${RELEASE_TAG}-macos-arm64-dsym.tar.gz
              ;;
          esac
          {
            echo "SDK_RID=$rid"
            echo "SDK_WHEEL_ASSET=$wheel"
            echo "SYMBOL_ASSET=$symbol"
            echo "NUGET_ASSET=BoostGateway.Sdk.4.2.0.nupkg"
            echo "SDK_PROVENANCE_ASSET=sdk-package-provenance-${rid}.json"
            echo "NUGET_PROVENANCE_ASSET=sdk-package-provenance-multi-rid.json"
          } >> "$GITHUB_ENV"

      - name: Setup Python
        if: runner.os == 'Linux' && runner.arch != 'ARM64'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify immutable tag checkout
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"
          test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$EXPECTED_COMMIT"

      - name: Download published assets into an empty directory
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset_dir="$RUNNER_TEMP/boost-gateway-published-${{ github.run_id }}"
          mkdir -p "$asset_dir"
          test -z "$(find "$asset_dir" -mindepth 1 -maxdepth 1 -print -quit)"
          gh release download "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --dir "$asset_dir" \
            --pattern "boost-gateway-${RELEASE_TAG}-${PRODUCTION_ARCHIVE_PLATFORM}.tar.gz" \
            --pattern "boost-gateway-${RELEASE_TAG}-${PRODUCTION_ARCHIVE_PLATFORM}-sbom.spdx.json" \
            --pattern "$SYMBOL_ASSET" \
            --pattern "$SYMBOL_ASSET.spdx.json" \
            --pattern "$SDK_WHEEL_ASSET" \
            --pattern "$SDK_WHEEL_ASSET.spdx.json" \
            --pattern "$NUGET_ASSET" \
            --pattern "$NUGET_ASSET.spdx.json" \
            --pattern "$SDK_PROVENANCE_ASSET" \
            --pattern "$NUGET_PROVENANCE_ASSET" \
            --pattern SHA256SUMS.txt
          printf 'RELEASE_ASSET_DIR=%s\n' "$asset_dir" >> "$GITHUB_ENV"

      - name: Verify checksums and archive layout
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import os
          from pathlib import Path

          root = Path(os.environ["RELEASE_ASSET_DIR"])
          platform = os.environ["PRODUCTION_ARCHIVE_PLATFORM"]
          wanted = {
              f"boost-gateway-{os.environ['RELEASE_TAG']}-{platform}.tar.gz",
              f"boost-gateway-{os.environ['RELEASE_TAG']}-{platform}-sbom.spdx.json",
              os.environ["SYMBOL_ASSET"],
              os.environ["SYMBOL_ASSET"] + ".spdx.json",
              os.environ["SDK_WHEEL_ASSET"],
              os.environ["SDK_WHEEL_ASSET"] + ".spdx.json",
              os.environ["NUGET_ASSET"],
              os.environ["NUGET_ASSET"] + ".spdx.json",
              os.environ["SDK_PROVENANCE_ASSET"],
              os.environ["NUGET_PROVENANCE_ASSET"],
          }
          entries = {}
          for line in (root / "SHA256SUMS.txt").read_text(encoding="utf-8").splitlines():
              digest, name = line.split(None, 1)
              entries[name.strip().lstrip("*")] = digest
          if not wanted.issubset(entries):
              raise SystemExit(f"checksum manifest is missing platform assets: {sorted(wanted - set(entries))}")
          for name in wanted:
              actual = hashlib.sha256((root / name).read_bytes()).hexdigest()
              if actual != entries[name]:
                  raise SystemExit(f"checksum mismatch: {name}")
          PY
          python3 scripts/tools/verify_release_archive.py \
            --archive "$RELEASE_ASSET_DIR/boost-gateway-${RELEASE_TAG}-${PRODUCTION_ARCHIVE_PLATFORM}.tar.gz" \
            --expected-root "boost-gateway-${RELEASE_TAG}-${PRODUCTION_ARCHIVE_PLATFORM}"

      - name: Verify published runtime-symbol and SDK packages
        shell: bash
        run: |
          set -euo pipefail
          runtime="$RELEASE_ASSET_DIR/boost-gateway-${RELEASE_TAG}-${PRODUCTION_ARCHIVE_PLATFORM}.tar.gz"
          symbols="$RELEASE_ASSET_DIR/$SYMBOL_ASSET"
          if [[ "$PRODUCTION_PLATFORM" == linux-* ]]; then
            python3 scripts/tools/verify_debug_symbol_package.py \
              --runtime-archive "$runtime" \
              --symbols-archive "$symbols" \
              --candidate-revision "$EXPECTED_COMMIT" \
              --expected-platform "$PRODUCTION_ARCHIVE_PLATFORM" \
              --summary-path runtime/validation/published-symbol-verification-summary.json
          else
            python3 scripts/tools/verify_macos_dsym_package.py \
              --runtime-archive "$runtime" \
              --symbols-archive "$symbols" \
              --candidate-revision "$EXPECTED_COMMIT" \
              --summary-path runtime/validation/published-symbol-verification-summary.json
          fi
          dotnet --version
          python3 scripts/tools/verify_sdk_distribution_packages.py \
            --wheel "$RELEASE_ASSET_DIR/$SDK_WHEEL_ASSET" \
            --nuget "$RELEASE_ASSET_DIR/$NUGET_ASSET" \
            --rid "$SDK_RID" \
            --require-nuget \
            --summary-path runtime/validation/published-sdk-verification-summary.json

      - name: Verify published SBOM semantics
        shell: bash
        run: |
          python3 scripts/tools/harden_release_sbom.py verify \
            --sbom "$RELEASE_ASSET_DIR/boost-gateway-${RELEASE_TAG}-${PRODUCTION_ARCHIVE_PLATFORM}-sbom.spdx.json" \
            --archive "$RELEASE_ASSET_DIR/boost-gateway-${RELEASE_TAG}-${PRODUCTION_ARCHIVE_PLATFORM}.tar.gz" \
            --expected-root "boost-gateway-${RELEASE_TAG}-${PRODUCTION_ARCHIVE_PLATFORM}" \
            --lockfile "$PRODUCTION_RELEASE_LOCKFILE" \
            --policy config/release/sbom-policy.json \
            --summary-path runtime/validation/published-release-sbom-semantics-summary.json

      - name: Verify runtime consumer offline
        if: inputs.platform != 'macos-arm64'
        shell: bash
        run: |
          python3 scripts/tools/verify_release_package_consumer.py \
            --archive "$RELEASE_ASSET_DIR/boost-gateway-${RELEASE_TAG}-${PRODUCTION_ARCHIVE_PLATFORM}.tar.gz" \
            --expected-root "boost-gateway-${RELEASE_TAG}-${PRODUCTION_ARCHIVE_PLATFORM}" \
            --image ubuntu:24.04 \
            --expected-platform "$PRODUCTION_PLATFORM" \
            --summary-path runtime/validation/published-release-package-consumer-summary.json

      - name: Verify native macOS runtime consumer
        if: inputs.platform == 'macos-arm64'
        shell: bash
        run: |
          set -euo pipefail
          extract_root="$RUNNER_TEMP/published-macos-${GITHUB_RUN_ID}"
          rm -rf "$extract_root"
          mkdir -p "$extract_root"
          tar -xzf "$RELEASE_ASSET_DIR/boost-gateway-${RELEASE_TAG}-${PRODUCTION_ARCHIVE_PLATFORM}.tar.gz" -C "$extract_root"
          python3 scripts/tools/verify_macos_arm64_package.py \
            --install-root "$extract_root/boost-gateway-${RELEASE_TAG}-${PRODUCTION_ARCHIVE_PLATFORM}" \
            --lockfile "$PRODUCTION_RELEASE_LOCKFILE" \
            --candidate-revision "$EXPECTED_COMMIT" \
            --summary-path runtime/validation/published-release-package-consumer-summary.json

      - name: Install checksum-verified GitHub CLI for attestation verification
        shell: bash
        run: |
          set -euo pipefail
          gh_version=2.96.0
          case "$PRODUCTION_PLATFORM" in
            linux-x64)
              archive="gh_${gh_version}_linux_amd64.tar.gz"
              digest=83d5c2ccad5498f58bf6368acb1ab32588cf43ab3a4b1c301bf36328b1c8bd60
              executable="gh_${gh_version}_linux_amd64/bin/gh"
              ;;
            linux-arm64)
              archive="gh_${gh_version}_linux_arm64.tar.gz"
              digest=06f86ec7103d41993b76cd78072f43595c34aaa56506d971d9860e67140bf909
              executable="gh_${gh_version}_linux_arm64/bin/gh"
              ;;
            macos-arm64)
              archive="gh_${gh_version}_macOS_arm64.zip"
              digest=f23a0c37d963aacc3bed703ccbd59b41c5ca22101fab7f00eb2b7cad23aba463
              executable="gh_${gh_version}_macOS_arm64/bin/gh"
              ;;
          esac
          tool_dir="$RUNNER_TEMP/gh-${gh_version}-${{ github.run_id }}"
          mkdir -p "$tool_dir"
          curl --fail --location --retry 3 \
            "https://github.com/cli/cli/releases/download/v${gh_version}/${archive}" \
            --output "$tool_dir/$archive"
          python3 - "$tool_dir/$archive" "$digest" <<'PY'
          import hashlib
          import sys
          from pathlib import Path
          actual = hashlib.sha256(Path(sys.argv[1]).read_bytes()).hexdigest()
          if actual != sys.argv[2]:
              raise SystemExit(f"GitHub CLI checksum mismatch: {actual}")
          PY
          if [[ "$archive" = *.zip ]]; then
            ditto -x -k "$tool_dir/$archive" "$tool_dir"
          else
            tar -xzf "$tool_dir/$archive" -C "$tool_dir"
          fi
          printf 'VERIFICATION_GH=%s\n' "$tool_dir/$executable" >> "$GITHUB_ENV"

      - name: Verify provenance and SBOM attestations
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          signer='HoneyBury/boost_gateway/.github/workflows/release.yml'
          labels=(runtime symbol wheel nuget)
          assets=(
            "$RELEASE_ASSET_DIR/boost-gateway-${RELEASE_TAG}-${PRODUCTION_ARCHIVE_PLATFORM}.tar.gz"
            "$RELEASE_ASSET_DIR/$SYMBOL_ASSET"
            "$RELEASE_ASSET_DIR/$SDK_WHEEL_ASSET"
            "$RELEASE_ASSET_DIR/$NUGET_ASSET"
          )
          for index in "${!assets[@]}"; do
            label="${labels[$index]}"
            asset="${assets[$index]}"
            common=(
              "$asset" --repo "${{ github.repository }}" --format json
              --signer-workflow "$signer"
              --signer-digest "$EXPECTED_COMMIT"
              --source-digest "$EXPECTED_COMMIT"
              --source-ref "refs/tags/${RELEASE_TAG}"
            )
            "$VERIFICATION_GH" attestation verify "${common[@]}" \
              > "runtime/validation/published-${label}-provenance-verification.json"
            "$VERIFICATION_GH" attestation verify "${common[@]}" \
              --predicate-type https://spdx.dev/Document/v2.3 \
              > "runtime/validation/published-${label}-sbom-verification.json"
            python3 - "$asset" "$label" <<'PY'
          import hashlib
          import json
          import sys
          from pathlib import Path

          expected = hashlib.sha256(Path(sys.argv[1]).read_bytes()).hexdigest()
          label = sys.argv[2]
          for kind in ("provenance", "sbom"):
              path = Path(f"runtime/validation/published-{label}-{kind}-verification.json")
              results = json.loads(path.read_text(encoding="utf-8"))
              actual = results[0]["verificationResult"]["statement"]["subject"][0]["digest"]["sha256"]
              if actual != expected:
                  raise SystemExit(f"{label} {kind} attestation digest mismatch: {actual}")
          PY
          done

      - name: Verify published SBOM matches attested predicate
        shell: bash
        run: |
          set -euo pipefail
          labels=(runtime symbol wheel nuget)
          sboms=(
            "$RELEASE_ASSET_DIR/boost-gateway-${RELEASE_TAG}-${PRODUCTION_ARCHIVE_PLATFORM}-sbom.spdx.json"
            "$RELEASE_ASSET_DIR/$SYMBOL_ASSET.spdx.json"
            "$RELEASE_ASSET_DIR/$SDK_WHEEL_ASSET.spdx.json"
            "$RELEASE_ASSET_DIR/$NUGET_ASSET.spdx.json"
          )
          for index in "${!sboms[@]}"; do
            label="${labels[$index]}"
            python3 scripts/tools/harden_release_sbom.py verify-attestation \
              --sbom "${sboms[$index]}" \
              --attestation-verification "runtime/validation/published-${label}-sbom-verification.json" \
              --summary-path "runtime/validation/published-${label}-sbom-attestation-binding-summary.json"
          done

      - name: Render published asset summary
        shell: bash
        env:
          VERIFICATION_RUNNER: ${{ runner.name }}
        run: |
          set -euo pipefail
          archive="$RELEASE_ASSET_DIR/boost-gateway-${RELEASE_TAG}-${PRODUCTION_ARCHIVE_PLATFORM}.tar.gz"
          sbom="$RELEASE_ASSET_DIR/boost-gateway-${RELEASE_TAG}-${PRODUCTION_ARCHIVE_PLATFORM}-sbom.spdx.json"
          export ARCHIVE_SHA256="$(python3 -c 'import hashlib,sys; print(hashlib.sha256(open(sys.argv[1], "rb").read()).hexdigest())' "$archive")"
          export SBOM_SHA256="$(python3 -c 'import hashlib,sys; print(hashlib.sha256(open(sys.argv[1], "rb").read()).hexdigest())' "$sbom")"
          python3 - <<'PY'
          import json
          import os
          from datetime import UTC, datetime
          from pathlib import Path

          validation = Path("runtime/validation")
          consumer = json.loads(
              (validation / "published-release-package-consumer-summary.json").read_text(encoding="utf-8")
          )
          sbom_semantics = json.loads(
              (validation / "published-release-sbom-semantics-summary.json").read_text(encoding="utf-8")
          )
          symbol = json.loads(
              (validation / "published-symbol-verification-summary.json").read_text(encoding="utf-8")
          )
          sdk = json.loads(
              (validation / "published-sdk-verification-summary.json").read_text(encoding="utf-8")
          )
          bindings = {
              label: json.loads(
                  (validation / f"published-{label}-sbom-attestation-binding-summary.json").read_text(
                      encoding="utf-8"
                  )
              )
              for label in ("runtime", "symbol", "wheel", "nuget")
          }
          predicate_matches_published_sbom = all(
              item.get("predicate_matches_published_sbom") is True for item in bindings.values()
          )
          passed = (
              consumer.get("overall_pass") is True
              and sbom_semantics.get("overall_pass") is True
              and symbol.get("overall_pass") is True
              and sdk.get("overall_pass") is True
              and all(item.get("overall_pass") is True for item in bindings.values())
              and predicate_matches_published_sbom
          )
          summary = {
              "summary_version": 2,
              "generated_at": datetime.now(UTC).isoformat(timespec="seconds").replace("+00:00", "Z"),
              "overall_pass": passed,
              "passed": passed,
              "tag": os.environ["RELEASE_TAG"],
              "expected_commit": os.environ["EXPECTED_COMMIT"],
              "runner": os.environ["VERIFICATION_RUNNER"],
              "production_platform": os.environ["PRODUCTION_PLATFORM"],
              "archive_sha256": os.environ["ARCHIVE_SHA256"],
              "sbom_sha256": os.environ["SBOM_SHA256"],
              "runtime_consumer": consumer,
              "symbol_verification": symbol,
              "sdk_verification": sdk,
              "sbom_semantics": sbom_semantics,
              "predicate_matches_published_sbom": predicate_matches_published_sbom,
              "sbom_attestation_bindings": bindings,
              "provenance_attestation_verified": True,
              "sbom_attestation_verified": True,
          }
          (validation / "published-release-asset-verification-summary.json").write_text(
              json.dumps(summary, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          PY

      - name: Upload published asset verification
        uses: actions/upload-artifact@v4
        with:
          name: published-release-asset-verification-${{ inputs.platform }}-${{ github.run_id }}
          path: |
            runtime/validation/published-release-*.json
            runtime/validation/production-platform-summary.json
          retention-days: 90
