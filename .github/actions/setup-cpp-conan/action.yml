name: Setup C++ Conan Toolchain
description: Install Ninja, CMake, Python, Conan, and optionally bootstrap the repository Conan home.

inputs:
  python-version:
    description: Python version to install through actions/setup-python.
    required: false
    default: "3.12"
  conan-version:
    description: Exact Conan version installed in the isolated runner virtual environment.
    required: false
    default: "2.8.1"
  conan-venv-offline:
    description: Require the pinned Conan virtual environment to have been pre-created without installing from the network.
    required: false
    default: "false"
  conan-venv:
    description: Absolute path to the isolated Conan virtual environment.
    required: false
    default: /opt/boost-gateway/tools/conan-2.8.1-py3.12
  cache-root:
    description: Persistent root used for Conan and sccache namespaces.
    required: false
    default: /opt/boost-gateway
  run-bootstrap:
    description: Run scripts/bootstrap_conan.py after Conan is available.
    required: false
    default: "true"
  bootstrap-args:
    description: Extra arguments passed to scripts/bootstrap_conan.py.
    required: false
    default: "--allow-public --disable-example-internal"
  cache-build-type:
    description: Build type used to isolate the persistent Conan and sccache namespaces.
    required: false
    default: "Release"
  cache-profile:
    description: Conan profile included in the persistent cache identity.
    required: false
    default: "conan/profiles/linux-gcc-x64"
  cache-lockfile:
    description: Conan lockfile included in the persistent cache identity.
    required: false
    default: "conan/locks/linux-gcc-x64-release-nogrpc-nosqlite.lock"

runs:
  using: composite
  steps:
    - name: Setup Ninja
      if: runner.os != 'Linux' || runner.arch != 'ARM64'
      uses: seanmiddleditch/gha-setup-ninja@v5

    - name: Setup CMake
      if: runner.os != 'Linux' || runner.arch != 'ARM64'
      uses: jwlawson/actions-setup-cmake@v2

    - name: Setup Python
      if: runner.os != 'Linux' || runner.arch != 'ARM64'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Ensure Conan
      shell: bash
      run: |
        set -euo pipefail
        args=(
          python scripts/tools/ensure_conan_venv.py
          --venv "${{ inputs.conan-venv }}"
          --conan-version "${{ inputs.conan-version }}"
          --github-env "$GITHUB_ENV"
          --github-path "$GITHUB_PATH"
        )
        if [ "${{ inputs.conan-venv-offline }}" = "true" ]; then
          args+=(--offline)
        fi
        "${args[@]}"

    - name: Resolve persistent runner caches
      shell: bash
      run: |
        set -euo pipefail
        python scripts/tools/resolve_runner_cache.py \
          --build-type "${{ inputs.cache-build-type }}" \
          --profile "${{ inputs.cache-profile }}" \
          --lockfile "${{ inputs.cache-lockfile }}" \
          --cache-root "${{ inputs.cache-root }}" \
          --github-env "$GITHUB_ENV" \
          --summary-path runtime/validation/runner-cache-identity.json

    - name: Bootstrap Conan home
      if: inputs.run-bootstrap == 'true'
      shell: bash
      run: |
        set -euo pipefail
        python scripts/bootstrap_conan.py --conan-home "$CONAN_HOME" ${{ inputs.bootstrap-args }}
