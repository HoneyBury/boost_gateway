# Boost Gateway v2.6.0 — Redis Configuration
#
# Tuned for game-server caching workloads:
#   - Leaderboard data caching
#   - Session state cache
#   - Write-behind store buffering
#
# Max memory: 256 MB with allkeys-lru eviction.
# Persistence: RDB snapshots every 5 minutes (300 seconds) if at least
# 100 keys changed, or every 60 seconds if 10000+ keys changed.

# ============================================================================
# Memory Management
# ============================================================================

# Maximum memory Redis should use. When this limit is reached Redis will try
# to remove keys according to the eviction policy.
maxmemory 256mb

# When maxmemory is reached, remove all keys using an LRU approximation.
# This ensures the cache never grows unbounded and the hottest keys survive.
maxmemory-policy allkeys-lru

# Sampling size for LRU/TTL eviction (default 5). Higher = more accurate
# but more CPU. 10 is a good balance for game-server workloads.
maxmemory-samples 10

# ============================================================================
# Persistence — RDB Snapshots
# ============================================================================

# Save the DB to disk:
#   save <seconds> <changes>
#   Will save after the given number of seconds if at least the given number
#   of keys changed.
#
#   300 (5 min) after 100 changes  ← primary for leaderboard cache
#   60  (1 min) after 10000 changes ← high-churn protection
save 300 100
save 60 10000

# Filename for the RDB snapshot
dbfilename dump.rdb

# Working directory for the RDB file
dir /data

# Stop writing to RDB on last-save error? Game servers benefit from
# availability over consistency, so we continue serving.
stop-writes-on-bgsave-error no

# Compress RDB files with LZF
rdbcompression yes

# CRC64 checksum on RDB files
rdbchecksum yes

# ============================================================================
# AOF — Disabled (RDB-only for this workload)
# ============================================================================
appendonly no

# ============================================================================
# Network
# ============================================================================

# Bind to all interfaces (container-scoped; the Docker network provides
# isolation). In production K8s, this is acceptable behind the ClusterIP.
bind 0.0.0.0

# Protected mode is fine since Redis is on an isolated network
protected-mode yes

# Port (default)
port 6379

# TCP backlog — higher for game-server workloads
tcp-backlog 1024

# Timeout (seconds) — 0 = disabled. Game sessions may be long-lived, so we
# keep it disabled and let application-level heartbeats manage disconnects.
timeout 0

# Keepalive — 300 seconds to detect dead peers
tcp-keepalive 300

# ============================================================================
# General
# ============================================================================

# Run in background (no — Docker handles daemonization)
daemonize no

# Log level: notice (default). Use 'warning' in high-volume production.
loglevel notice

# Log file (empty = stdout, which Docker captures)
logfile ""

# Number of databases — game servers typically only need 1
databases 1

# ============================================================================
# Performance Tuning
# ============================================================================

# Positive hash table resize every time the ratio grows beyond this.
# Game server caches benefit from more aggressive resizing.
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# Slow log — log queries slower than 10 ms
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client output buffer limits — game clients can be chatty
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit pubsub 32mb 8mb 60
