# Boost Gateway v3.6.2 — Login Backend Deployment + Service + HPA
#
# Usage:
#   kubectl apply -f env/k8s/login-backend-deployment.yaml

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: login-backend-config
  namespace: boost-gateway
  labels:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    boost-gateway.io/backend: login
data:
  login_backend.json: |
    {
      "login_backend": {
        "port": 9202,
        "io_threads": 2,
        "metrics_log_interval_ms": 5000,
        "metrics_prometheus_path": "runtime/metrics/login_backend.prom",
        "metrics_json_path": "runtime/metrics/login_backend.json",
        "auth": {
          "provider": "dev",
          "token_prefix": "token:",
          "session_timeout_ms": 3600000
        },
        "tls": {
          "enabled": false,
          "cert_chain_path": "/app/certs/server.crt",
          "private_key_path": "/app/certs/server.key",
          "ca_cert_path": "/app/certs/ca.crt",
          "verify_mode": "none",
          "min_version": "1.2"
        }
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: login-backend
  namespace: boost-gateway
  labels:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "3.6.2"
    boost-gateway.io/backend: login
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: boost-gateway
      app.kubernetes.io/component: backend
      boost-gateway.io/backend: login
  template:
    metadata:
      labels:
        app.kubernetes.io/name: boost-gateway
        app.kubernetes.io/component: backend
        boost-gateway.io/backend: login
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: boost-gateway
                    app.kubernetes.io/component: backend
                    boost-gateway.io/backend: login
                topologyKey: kubernetes.io/hostname
      containers:
        - name: backend
          image: ghcr.io/boost-gateway/login-backend:v3.6.2
          imagePullPolicy: IfNotPresent
          args:
            - "9202"
          ports:
            - containerPort: 9202
              name: backend
              protocol: TCP
          env:
            - name: SERVICE_PORT
              value: "9202"
            - name: BOOST_LOG_LEVEL
              value: "info"
            - name: BACKEND_TLS_ENABLED
              value: "false"
            - name: BACKEND_TLS_CERT_CHAIN_PATH
              value: "/app/certs/server.crt"
            - name: BACKEND_TLS_PRIVATE_KEY_PATH
              value: "/app/certs/server.key"
            - name: BACKEND_TLS_CA_CERT_PATH
              value: "/app/certs/ca.crt"
            - name: BACKEND_TLS_VERIFY_MODE
              value: "none"
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: backend-tls-certs
              mountPath: /app/certs
              readOnly: true
            - name: logs
              mountPath: /app/logs
          resources:
            requests:
              cpu: "250m"
              memory: "64Mi"
            limits:
              cpu: "1000m"
              memory: "256Mi"
          livenessProbe:
            tcpSocket:
              port: 9202
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 9202
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
      volumes:
        - name: config
          configMap:
            name: login-backend-config
        - name: backend-tls-certs
          secret:
            secretName: backend-tls
            optional: true
        - name: logs
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: login-backend
  namespace: boost-gateway
  labels:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    boost-gateway.io/backend: login
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    boost-gateway.io/backend: login
  ports:
    - name: backend
      port: 9202
      targetPort: 9202
      protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: login-backend
  namespace: boost-gateway
  labels:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    boost-gateway.io/backend: login
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: login-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: login-backend
  namespace: boost-gateway
  labels:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    boost-gateway.io/backend: login
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: boost-gateway
      app.kubernetes.io/component: backend
      boost-gateway.io/backend: login
