# Boost Gateway v3.1.0 — Room Backend Deployment + Service + HPA
#
# Usage:
#   kubectl apply -f env/k8s/room-backend-deployment.yaml

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: room-backend-config
  namespace: boost-gateway
  labels:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    boost-gateway.io/backend: room
data:
  room_backend.json: |
    {
      "room_backend": {
        "port": 9302,
        "io_threads": 2,
        "metrics_log_interval_ms": 5000,
        "metrics_prometheus_path": "runtime/metrics/room_backend.prom",
        "metrics_json_path": "runtime/metrics/room_backend.json"
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: room-backend
  namespace: boost-gateway
  labels:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "3.1.0"
    boost-gateway.io/backend: room
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: boost-gateway
      app.kubernetes.io/component: backend
      boost-gateway.io/backend: room
  template:
    metadata:
      labels:
        app.kubernetes.io/name: boost-gateway
        app.kubernetes.io/component: backend
        boost-gateway.io/backend: room
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: boost-gateway
                    app.kubernetes.io/component: backend
                    boost-gateway.io/backend: room
                topologyKey: kubernetes.io/hostname
      containers:
        - name: backend
          image: ghcr.io/boost-gateway/room-backend:latest
          imagePullPolicy: Always
          args:
            - "9302"
          ports:
            - containerPort: 9302
              name: backend
              protocol: TCP
          env:
            - name: SERVICE_PORT
              value: "9302"
            - name: BOOST_LOG_LEVEL
              value: "info"
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: logs
              mountPath: /app/logs
          resources:
            requests:
              cpu: "250m"
              memory: "64Mi"
            limits:
              cpu: "1000m"
              memory: "256Mi"
          livenessProbe:
            tcpSocket:
              port: 9302
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 9302
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
      volumes:
        - name: config
          configMap:
            name: room-backend-config
        - name: logs
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: room-backend
  namespace: boost-gateway
  labels:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    boost-gateway.io/backend: room
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    boost-gateway.io/backend: room
  ports:
    - name: backend
      port: 9302
      targetPort: 9302
      protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: room-backend
  namespace: boost-gateway
  labels:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    boost-gateway.io/backend: room
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: room-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: room-backend
  namespace: boost-gateway
  labels:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    boost-gateway.io/backend: room
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: boost-gateway
      app.kubernetes.io/component: backend
      boost-gateway.io/backend: room
