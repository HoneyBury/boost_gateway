# v3.0.0: K8s Operator RBAC
# ServiceAccount, ClusterRole, and ClusterRoleBinding for the GameServer operator.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gameserver-operator
  namespace: boost-gateway
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gameserver-operator
rules:
  - apiGroups: ["gateway.boost.io"]
    resources: ["gameservers", "gameservers/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "pods", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gameserver-operator
subjects:
  - kind: ServiceAccount
    name: gameserver-operator
    namespace: boost-gateway
roleRef:
  kind: ClusterRole
  name: gameserver-operator
  apiGroup: rbac.authorization.k8s.io
