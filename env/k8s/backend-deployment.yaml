# Boost Gateway v2.6.0 — Generic Backend Deployment + Service (ConfigMap-driven)
#
# This is a template manifest for all 5 backend services: login, room, battle,
# matchmaking, and leaderboard. Each backend is adapted by overriding the
# environment variables and port numbers.
#
# Usage (example for login-backend):
#   kubectl apply -f env/k8s/backend-deployment.yaml    # deploys login-backend
#
# For other backends, either edit this file or maintain a separate copy with
# different metadata.name and selector labels. The template below is configured
# for login-backend; adapt the fields marked with "(per-service)" comments.

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config               # (per-service: rename per backend)
  namespace: boost-gateway
  labels:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
data:
  # Per-service config is loaded at runtime; include only the relevant file.
  login_backend.json: |               # (per-service: login_backend / room_backend / battle_backend / etc.)
    {
      "login_backend": {
        "port": 9202,
        "io_threads": 2,
        "metrics_log_interval_ms": 5000,
        "metrics_prometheus_path": "runtime/metrics/login_backend.prom",
        "metrics_json_path": "runtime/metrics/login_backend.json",
        "auth": {
          "provider": "dev",
          "token_prefix": "token:",
          "session_timeout_ms": 3600000
        }
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: login-backend                 # (per-service)
  namespace: boost-gateway
  labels:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "2.6.0"
    boost-gateway.io/backend: login   # (per-service: login / room / battle / matchmaking / leaderboard)
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: boost-gateway
      app.kubernetes.io/component: backend
      boost-gateway.io/backend: login   # (per-service)
  template:
    metadata:
      labels:
        app.kubernetes.io/name: boost-gateway
        app.kubernetes.io/component: backend
        boost-gateway.io/backend: login   # (per-service)
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: ghcr.io/boost-gateway/backend:latest
          imagePullPolicy: Always
          args:
            - "9202"                     # (per-service: port as CLI arg)
          ports:
            - containerPort: 9202         # (per-service)
              name: backend
              protocol: TCP
          env:
            - name: SERVICE_PORT
              value: "9202"              # (per-service)
            - name: BOOST_LOG_LEVEL
              value: "info"
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: logs
              mountPath: /app/logs
          resources:
            requests:
              cpu: "250m"
              memory: "64Mi"
            limits:
              cpu: "1000m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 9202                  # (per-service)
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 9202                  # (per-service)
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
      volumes:
        - name: config
          configMap:
            name: backend-config
        - name: logs
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: login-backend                  # (per-service)
  namespace: boost-gateway
  labels:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    boost-gateway.io/backend: login    # (per-service)
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    boost-gateway.io/backend: login    # (per-service)
  ports:
    - name: backend
      port: 9202                       # (per-service)
      targetPort: 9202                 # (per-service)
      protocol: TCP
