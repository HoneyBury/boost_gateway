# Boost Gateway v3.1.0 — Battle Backend Deployment + Service + HPA
#
# Usage:
#   kubectl apply -f env/k8s/battle-backend-deployment.yaml

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: battle-backend-config
  namespace: boost-gateway
  labels:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    boost-gateway.io/backend: battle
data:
  battle_backend.json: |
    {
      "battle_backend": {
        "port": 9303,
        "tickrate": 60,
        "io_threads": 2,
        "metrics_log_interval_ms": 5000,
        "metrics_prometheus_path": "runtime/metrics/battle_backend.prom",
        "metrics_json_path": "runtime/metrics/battle_backend.json",
        "archive_path": "/app/v2_archive"
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: battle-backend
  namespace: boost-gateway
  labels:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "3.1.0"
    boost-gateway.io/backend: battle
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: boost-gateway
      app.kubernetes.io/component: backend
      boost-gateway.io/backend: battle
  template:
    metadata:
      labels:
        app.kubernetes.io/name: boost-gateway
        app.kubernetes.io/component: backend
        boost-gateway.io/backend: battle
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: boost-gateway
                    app.kubernetes.io/component: backend
                    boost-gateway.io/backend: battle
                topologyKey: kubernetes.io/hostname
      containers:
        - name: backend
          image: ghcr.io/boost-gateway/battle-backend:latest
          imagePullPolicy: Always
          args:
            - "9303"
          ports:
            - containerPort: 9303
              name: backend
              protocol: TCP
          env:
            - name: SERVICE_PORT
              value: "9303"
            - name: BOOST_LOG_LEVEL
              value: "info"
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: logs
              mountPath: /app/logs
            - name: archive
              mountPath: /app/v2_archive
          resources:
            requests:
              cpu: "500m"
              memory: "128Mi"
            limits:
              cpu: "2000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 9303
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 9303
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
      volumes:
        - name: config
          configMap:
            name: battle-backend-config
        - name: logs
          emptyDir: {}
        - name: archive
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: battle-backend
  namespace: boost-gateway
  labels:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    boost-gateway.io/backend: battle
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    boost-gateway.io/backend: battle
  ports:
    - name: backend
      port: 9303
      targetPort: 9303
      protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: battle-backend
  namespace: boost-gateway
  labels:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    boost-gateway.io/backend: battle
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: battle-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: battle-backend
  namespace: boost-gateway
  labels:
    app.kubernetes.io/name: boost-gateway
    app.kubernetes.io/component: backend
    boost-gateway.io/backend: battle
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: boost-gateway
      app.kubernetes.io/component: backend
      boost-gateway.io/backend: battle
