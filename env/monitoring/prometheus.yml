# Boost Gateway v3.3.2 — Prometheus Scrape Configuration
#
# Scrapes HTTP metrics only from services that currently expose an HTTP
# management endpoint. v2 backends publish custom TCP protocols and do not
# expose /metrics directly.
#
# Usage:
#   docker compose -f env/docker/docker-compose.yml up -d prometheus
#   (The compose file mounts this as /etc/prometheus/prometheus.yml)

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: "boost-gateway"
    version: "3.3.2"

# Alertmanager configuration (placeholder — configure your own endpoint)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # - alertmanager:9093

scrape_configs:

  # ---------------------------------------------------------------
  # Gateway — client ingress
  # ---------------------------------------------------------------
  - job_name: "gateway"
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets:
          - "gateway:9080"
        labels:
          service: "gateway"
          tier: "ingress"

  # ---------------------------------------------------------------
  # Prometheus itself (for up=1 health)
  # ---------------------------------------------------------------
  - job_name: "prometheus"
    scrape_interval: 30s
    static_configs:
      - targets:
          - "localhost:9090"
        labels:
          service: "prometheus"
          tier: "monitoring"
