# Boost Gateway v2.6.0 — Prometheus Scrape Configuration
#
# Scrapes /metrics from all 6 backend services plus Prometheus itself.
# Alerting rules are maintained at: prometheus/alerts.yml
#
# Usage:
#   docker compose -f env/docker/docker-compose.yml up -d prometheus
#   (The compose file mounts this as /etc/prometheus/prometheus.yml)

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: "boost-gateway"
    version: "2.6.0"

# Alertmanager configuration (placeholder — configure your own endpoint)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # - alertmanager:9093

# Load alerting rules from the project's existing alerts file
rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:

  # ---------------------------------------------------------------
  # Gateway — client ingress
  # ---------------------------------------------------------------
  - job_name: "gateway"
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets:
          - "gateway:9080"
        labels:
          service: "gateway"
          tier: "ingress"

  # ---------------------------------------------------------------
  # Login Backend
  # ---------------------------------------------------------------
  - job_name: "login-backend"
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets:
          - "login-backend:9202"
        labels:
          service: "login-backend"
          tier: "backend"

  # ---------------------------------------------------------------
  # Room Backend
  # ---------------------------------------------------------------
  - job_name: "room-backend"
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets:
          - "room-backend:9302"
        labels:
          service: "room-backend"
          tier: "backend"

  # ---------------------------------------------------------------
  # Battle Backend
  # ---------------------------------------------------------------
  - job_name: "battle-backend"
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets:
          - "battle-backend:9303"
        labels:
          service: "battle-backend"
          tier: "backend"

  # ---------------------------------------------------------------
  # Matchmaking Backend
  # ---------------------------------------------------------------
  - job_name: "matchmaking-backend"
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets:
          - "matchmaking-backend:9304"
        labels:
          service: "matchmaking-backend"
          tier: "backend"

  # ---------------------------------------------------------------
  # Leaderboard Backend
  # ---------------------------------------------------------------
  - job_name: "leaderboard-backend"
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets:
          - "leaderboard-backend:9305"
        labels:
          service: "leaderboard-backend"
          tier: "backend"

  # ---------------------------------------------------------------
  # Prometheus itself (for up=1 health)
  # ---------------------------------------------------------------
  - job_name: "prometheus"
    scrape_interval: 30s
    static_configs:
      - targets:
          - "localhost:9090"
        labels:
          service: "prometheus"
          tier: "monitoring"
