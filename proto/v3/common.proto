// v3.0.0: Common message types shared across all services.
syntax = "proto3";
package boost.gateway.v3;

// Envelope for inter-service routing
message ServiceEnvelope {
  uint64 correlation_id = 1;
  string source_service = 2;   // "gateway", "login", "room", "battle", "match", "leaderboard"
  string target_service = 3;
  uint32 timeout_ms = 4;
  int32 error_code = 5;
  uint64 trace_id = 6;         // W3C trace context
  uint64 span_id = 7;
  // Payload type determines which field to use
  oneof payload {
    LoginPayload login = 20;
    RoomPayload room = 21;
    BattlePayload battle = 22;
    MatchPayload match = 23;
    LeaderboardPayload leaderboard = 24;
  }
}

message LoginPayload {
  oneof kind {
    LoginRequest login_request = 1;
    LoginResponse login_response = 2;
    TokenValidateRequest token_validate = 3;
    TokenValidateResponse token_validate_response = 4;
    SessionBindRequest session_bind = 5;
    SessionBindResponse session_bind_response = 6;
    SessionCloseRequest session_close = 7;
    SessionCloseResponse session_close_response = 8;
    TokenRefreshRequest token_refresh = 9;
    TokenRefreshResponse token_refresh_response = 10;
  }
}

message RoomPayload {
  oneof kind {
    RoomCreateRequest room_create = 1;
    RoomCreateResponse room_create_response = 2;
    RoomJoinRequest room_join = 3;
    RoomJoinResponse room_join_response = 4;
    RoomLeaveRequest room_leave = 5;
    RoomLeaveResponse room_leave_response = 6;
    RoomReadyRequest room_ready = 7;
    RoomReadyResponse room_ready_response = 8;
    RoomStartBattleRequest room_start_battle = 9;
    RoomStartBattleResponse room_start_battle_response = 10;
    RoomStatePush room_state_push = 11;
    RoomListRequest room_list = 12;
    RoomListResponse room_list_response = 13;
    RoomDetailRequest room_detail = 14;
    RoomDetailResponse room_detail_response = 15;
    RoomKickRequest room_kick = 16;
    RoomKickResponse room_kick_response = 17;
    RoomTransferOwnerRequest room_transfer_owner = 18;
    RoomTransferOwnerResponse room_transfer_owner_response = 19;
    RoomBattleFinishedRequest room_battle_finished = 20;
    RoomBattleFinishedResponse room_battle_finished_response = 21;
  }
}

message BattlePayload {
  oneof kind {
    BattleCreateRequest battle_create = 1;
    BattleCreateResponse battle_create_response = 2;
    BattleInputRequest battle_input = 3;
    BattleInputResponse battle_input_response = 4;
    BattleStateRequest battle_state = 5;
    BattleStateResponse battle_state_response = 6;
    BattleStatePush battle_state_push = 7;
    BattleFinishRequest battle_finish = 8;
    BattleFinishResponse battle_finish_response = 9;
    ReplayLoadRequest replay_load = 10;
    ReplayLoadResponse replay_load_response = 11;
  }
}

message MatchPayload {
  oneof kind {
    MatchJoinRequest match_join = 1;
    MatchJoinResponse match_join_response = 2;
    MatchLeaveRequest match_leave = 3;
    MatchStatusRequest match_status = 4;
    MatchStatusResponse match_status_response = 5;
    MatchFoundPush match_found = 6;
  }
}

message LeaderboardPayload {
  oneof kind {
    LeaderboardSubmitRequest submit = 1;
    LeaderboardSubmitResponse submit_response = 2;
    LeaderboardTopRequest top = 3;
    LeaderboardTopResponse top_response = 4;
    LeaderboardRankRequest rank = 5;
    LeaderboardRankResponse rank_response = 6;
  }
}
