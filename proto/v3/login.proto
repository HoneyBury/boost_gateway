// v3.0.0: Login service protocol definition.
syntax = "proto3";
package boost.gateway.v3;

message LoginRequest {
  string user_id = 1;
  string token = 2;
  string display_name = 3;
}

message LoginResponse {
  string user_id = 1;
  string display_name = 2;
  string role = 3;             // "player", "admin", "observer"
  bool is_duplicate = 4;
  string room_id = 5;          // for session resume
}

message RegisterAccountRequest {
  string user_id = 1;
  string credential = 2;
  string display_name = 3;
}

message RegisterAccountResponse {
  string status = 1;
  string user_id = 2;
  string display_name = 3;
}

message GuestLoginRequest {
  string display_name = 1;
}

message GuestLoginResponse {
  string status = 1;
  string user_id = 2;
  string display_name = 3;
  string token = 4;
}

message TokenValidateRequest {
  string token = 1;
  string user_id = 2;
}

message TokenValidateResponse {
  bool valid = 1;
}

message SessionBindRequest {
  string user_id = 1;
  uint64 session_id = 2;
  uint64 connection_id = 3;
}

message SessionBindResponse {
  string status = 1;
  string action = 2;
}

message SessionCloseRequest {
  string user_id = 1;
  uint64 session_id = 2;
}

message SessionCloseResponse {
  string status = 1;
  string action = 2;
}

message TokenRefreshRequest {
  string user_id = 1;
  string token = 2;
}

message TokenRefreshResponse {
  string status = 1;
  string user_id = 2;
  string new_token = 3;
  string refresh_token = 4;
  uint64 expires_at = 5;
}
